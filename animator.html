<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ANIMATOR — EDIT</title>
<style>
:root{
  --acid:#36FF00;
  --neon:#F9FF47;
  --grey:#888;
  --dim:#444;
  --black:#000;
  --white:#fff;
  --panel:#0C0C0C;
  --panel2:#161616;
  --border:rgba(255,255,255,0.08);
  --border-bright:rgba(54,255,0,0.3);
  --mono:'Menlo','Consolas',monospace;
  --jp:-apple-system,'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:var(--black);color:var(--white);
  font-family:var(--mono);font-size:11px;
  overflow:hidden;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  touch-action:none;
  overscroll-behavior:none;
}

#app{
  display:grid;
  grid-template-columns:72px 1fr 240px;
  grid-template-rows:36px 1fr 130px 32px;
  height:100vh;width:100vw;
}

/* ── トップバー ── */
#topbar{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  border-bottom:1px solid var(--border);
  background:var(--panel);
  font-size:10px;letter-spacing:0.25em;
  color:rgba(54,255,0,0.6);
}
#topbar .left,#topbar .right{display:flex;gap:14px;align-items:center;}
#topbar .title{color:var(--acid);font-weight:700;}
#topbar .sep{color:var(--dim);}
#topbar button{
  background:transparent;border:1px solid var(--border);
  color:rgba(255,255,255,0.7);
  font-family:var(--mono);font-size:9px;letter-spacing:0.15em;
  padding:4px 10px;cursor:pointer;
  transition:all 0.15s;
}
#topbar button:hover{border-color:var(--border-bright);color:var(--acid);}
#topbar button:active{background:rgba(54,255,0,0.1);}
#topbar button.on{
  background:rgba(54,255,0,0.12);
  border-color:var(--acid);
  color:var(--acid);
  box-shadow:0 0 8px rgba(54,255,0,0.35);
}

/* ── 左ツールバー ── */
#toolbar{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0;gap:4px;
  border-right:1px solid var(--border);
  background:var(--panel);
  overflow-y:auto;
}
#toolbar::-webkit-scrollbar{width:0;}
.tool{
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid transparent;
  background:transparent;color:rgba(255,255,255,0.5);
  cursor:pointer;
  transition:all 0.12s;
  position:relative;
}
.tool:hover{color:var(--white);background:rgba(255,255,255,0.04);}
.tool.on{
  color:var(--acid);
  background:rgba(54,255,0,0.08);
  border-color:rgba(54,255,0,0.3);
}
.tool svg{width:22px;height:22px;}
.tool .lbl{
  position:absolute;bottom:2px;left:0;right:0;
  font-size:8px;text-align:center;color:rgba(255,255,255,0.3);
  letter-spacing:0.05em;
}
.tool.on .lbl{color:var(--acid);}
.tool-sep{
  width:32px;height:1px;
  background:var(--border);
  margin:6px 0;
}

/* ── 左ツールバー内 縦UI ── */

/* PEN SIZE 縦 */
.tb-pen-stack{
  display:flex;flex-direction:column;gap:3px;
  align-items:center;
  padding:2px 0;
}
.tb-pen{
  width:44px;height:30px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--border);
  color:rgba(255,255,255,0.5);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:8px;
  letter-spacing:0.1em;
  transition:all 0.12s;
  position:relative;
}
.tb-pen:hover{border-color:rgba(54,255,0,0.3);color:var(--white);}
.tb-pen.on{
  border-color:var(--acid);
  background:rgba(54,255,0,0.08);
  color:var(--acid);
}
.tb-pen .dot{
  border-radius:50%;background:currentColor;
  margin-right:5px;display:block;flex-shrink:0;
}

/* INK COLOR 縦 */
.tb-ink-stack{
  display:flex;flex-direction:column;gap:3px;
  align-items:center;padding:2px 0;
}
.tb-ink{
  width:44px;height:24px;
  border:1px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;letter-spacing:0.1em;
  font-family:var(--jp);
  transition:all 0.12s;
}
.tb-ink:hover{border-color:rgba(54,255,0,0.3);}
.tb-ink.on{
  border-color:var(--acid);
  box-shadow:inset 0 0 0 1px var(--acid);
}
.tb-ink[data-c="black"]{background:#000;color:#fff;}
.tb-ink[data-c="blue"]{background:#a8d8ff;color:#003;}
.tb-ink[data-c="orange"]{background:#ffb060;color:#420;}

/* BACKGROUND 縦スライダー */
.tb-bg{
  display:flex;flex-direction:column;align-items:center;
  gap:6px;padding:6px 0;
  width:44px;
}
.tb-undoredo{
  width:38px;height:34px;
  background:transparent;border:1px solid var(--border);
  color:rgba(255,255,255,0.55);
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.12s;
  border-radius:2px;
}
.tb-undoredo:hover{border-color:var(--border-bright);color:var(--acid);}
.tb-undoredo:active{background:rgba(54,255,0,0.1);}
.tb-bg .lbl{
  font-size:8px;letter-spacing:0.15em;
  color:rgba(54,255,0,0.5);
}
.tb-bg .val{
  font-size:9px;color:var(--acid);
  font-family:var(--mono);
}
.tb-bg-track{
  width:24px;height:80px;
  background:linear-gradient(to top,#666,#fff);
  border:1px solid var(--border);
  position:relative;
  cursor:pointer;
}
.tb-bg-thumb{
  position:absolute;left:-4px;right:-4px;
  height:6px;
  background:var(--acid);
  border-radius:1px;
  transform:translateY(50%);
  pointer-events:none;
}

/* ── ステージ ── */
#stage{
  position:relative;
  background:#070707;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
#stage-info{
  position:absolute;top:8px;left:10px;
  font-size:9px;color:rgba(255,255,255,0.3);
  letter-spacing:0.2em;pointer-events:none;
  z-index:10;
}
#stage-info b{color:var(--acid);font-weight:400;}

#canvas-wrap{
  position:relative;
  background:transparent;
  /* 描画領域は中央に */
}
/* FRAMEレイヤー編集モード時のステージ枠（ピンク色のヒント） */
#stage.frame-edit{
  box-shadow:inset 0 0 0 2px rgba(255,111,181,0.55);
}
#stage.frame-edit::after{
  content:'FRAME LAYER EDIT';
  position:absolute;top:8px;right:12px;
  color:#FF6FB5;font-size:9px;letter-spacing:0.25em;
  background:rgba(0,0,0,0.6);padding:3px 8px;
  border:1px solid rgba(255,111,181,0.5);
  z-index:30;pointer-events:none;
}
.layer{
  position:absolute;top:0;left:0;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  image-rendering:crisp-edges;
  -ms-interpolation-mode:nearest-neighbor;
  touch-action:none;
}
#bg-layer{background:#fff;}
#draw-layer{cursor:crosshair;}

#stage-hud{
  position:absolute;bottom:8px;left:10px;
  font-size:9px;color:rgba(255,255,255,0.4);
  letter-spacing:0.15em;pointer-events:none;
  z-index:10;
}

/* ズームコントロール */
#zoom-ctl{
  position:absolute;bottom:8px;right:10px;
  display:flex;gap:4px;align-items:center;
  z-index:10;
}
#zoom-ctl button{
  width:24px;height:24px;
  background:rgba(0,0,0,0.6);
  border:1px solid var(--border);
  color:var(--acid);font-family:var(--mono);
  cursor:pointer;
}
#zoom-ctl .zval{
  font-size:9px;color:var(--acid);
  min-width:46px;text-align:center;
  letter-spacing:0.1em;
}

/* ── 右パネル ── */
#side{
  border-left:1px solid var(--border);
  background:var(--panel);
  overflow-y:auto;
  display:flex;flex-direction:column;
}
#side::-webkit-scrollbar{width:4px;}
#side::-webkit-scrollbar-thumb{background:rgba(54,255,0,0.3);}
.pnl{
  border-bottom:1px solid var(--border);
  padding:12px 14px;
}
.pnl-h{
  font-size:9px;letter-spacing:0.3em;
  color:rgba(54,255,0,0.6);
  margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.pnl-h .v{color:var(--white);font-size:10px;letter-spacing:0.05em;}

/* ペンサイズ */
.pen-row{display:flex;gap:6px;}
.pen-btn{
  flex:1;
  height:38px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--border);
  color:rgba(255,255,255,0.5);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;
  font-family:var(--mono);font-size:9px;
  transition:all 0.12s;
}
.pen-btn:hover{border-color:rgba(54,255,0,0.3);}
.pen-btn.on{
  border-color:var(--acid);
  background:rgba(54,255,0,0.08);
  color:var(--acid);
}
.pen-btn .dot{
  background:currentColor;
  border-radius:50%;
  display:block;
}

/* インクカラー（線色） */
.ink-row{display:flex;gap:6px;margin-bottom:6px;}
.ink-btn{
  flex:1;height:32px;
  border:1px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;
  transition:all 0.12s;
  position:relative;
}
.ink-btn:hover{border-color:rgba(54,255,0,0.3);}
.ink-btn.on{
  border-color:var(--acid);
  box-shadow:inset 0 0 0 1px var(--acid);
}
.ink-btn[data-c="black"]{background:#000;color:#fff;}
.ink-btn[data-c="blue"]{background:#a8d8ff;color:#003;}
.ink-btn[data-c="orange"]{background:#ffb060;color:#420;}

/* パレット（塗りつぶし48色） */
.palette{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:2px;
}
.pal-cell{
  aspect-ratio:1;
  cursor:pointer;
  border:1px solid transparent;
  transition:all 0.1s;
  position:relative;
}
.pal-cell:hover{transform:scale(1.15);z-index:2;}
.pal-cell.on{
  border-color:var(--acid);
  box-shadow:0 0 0 1px var(--acid);
  z-index:3;
}

/* 明度スライダー */
.slider-row{
  display:flex;align-items:center;gap:8px;
  font-size:9px;color:rgba(255,255,255,0.5);
  letter-spacing:0.1em;
}
.slider-row .lbl{flex:0 0 36px;}
.slider-row .val{flex:0 0 28px;text-align:right;color:var(--acid);}
input[type=range]{
  -webkit-appearance:none;
  flex:1;height:2px;
  background:rgba(255,255,255,0.1);
  outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--acid);cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:var(--acid);cursor:pointer;border:none;
}

/* ── モーダルダイアログ ── */
#modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  display:none;align-items:center;justify-content:center;
  z-index:1000;
  font-family:var(--mono);
}
#modal-overlay.show{display:flex;}
.modal-box{
  background:var(--panel);
  border:1px solid var(--acid);
  box-shadow:0 0 24px rgba(54,255,0,0.2);
  min-width:280px;max-width:400px;
  padding:24px;
}
.modal-msg{
  font-size:12px;
  color:var(--white);
  letter-spacing:0.05em;
  line-height:1.6;
  margin-bottom:20px;
  font-family:var(--jp);
}
.modal-btns{
  display:flex;gap:8px;justify-content:flex-end;
}
.modal-btn{
  background:transparent;
  border:1px solid var(--border);
  color:rgba(255,255,255,0.7);
  font-family:var(--mono);font-size:10px;letter-spacing:0.2em;
  padding:8px 16px;cursor:pointer;
  transition:all 0.15s;
}
.modal-btn:hover{border-color:var(--border-bright);color:var(--acid);}
.modal-btn.danger{
  border-color:rgba(229,80,80,0.4);
  color:rgba(229,80,80,0.9);
}
.modal-btn.danger:hover{
  background:rgba(229,80,80,0.1);
  border-color:rgba(229,80,80,1);
  color:rgba(255,150,150,1);
}
.modal-btn.primary{
  border-color:var(--acid);
  color:var(--acid);
}
.modal-btn.primary:hover{
  background:rgba(54,255,0,0.1);
}

/* ── ボトムバー ── */
#bottombar{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  border-top:1px solid var(--border);
  background:var(--panel);
  font-size:9px;color:rgba(255,255,255,0.4);
  letter-spacing:0.15em;
}

/* ── フレームストリップ ── */
#strip-area{
  grid-column:1/-1;
  background:var(--panel);
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:auto 1fr auto;
  grid-template-rows:24px 22px 1fr 14px;
  padding:0;
  overflow:hidden;
}
#strip-toolbar{
  grid-column:1/-1;
  display:flex;align-items:center;gap:8px;
  padding:0 12px;
  border-bottom:1px solid var(--border);
  font-size:9px;letter-spacing:0.2em;
  color:rgba(255,255,255,0.4);
  background:#0a0a0a;
  overflow-x:auto;
  white-space:nowrap;
  scrollbar-width:none;
}
#strip-toolbar::-webkit-scrollbar{display:none;}

/* ── 時間メモリ + ワークエリアトラック ── */
#time-track{
  grid-column:1/-1;
  position:relative;
  background:#080808;
  border-bottom:1px solid var(--border);
  overflow:hidden;
  height:22px;
  /* スクロール同期はJSで */
}
#time-track-inner{
  position:absolute;
  top:0;left:28px;height:100%; /* JSのsyncTimeTrackScrollで動的に更新 */
}
.time-tick{
  position:absolute;top:0;
  height:100%;
  /* 線は要素の右端、ラベルは線の左側に出す（日本のアニメシート慣習に合わせる） */
  border-right:1px solid rgba(255,255,255,0.12);
  font-family:var(--mono);
  font-size:8px;
  color:rgba(255,255,255,0.4);
  letter-spacing:0.05em;
  padding:3px 3px 0 0;
  pointer-events:none;
  white-space:nowrap;
  text-align:right;
  transform:translateX(-100%);
}
.time-tick.major{
  border-right-color:rgba(54,255,0,0.4);
  color:rgba(54,255,0,0.7);
}
.time-tick.tick-sec{
  border-right-color:rgba(255,255,255,0.25);
  color:rgba(255,255,255,0.55);
}

/* ワークエリア */
#work-area{
  position:absolute;
  top:0;height:100%;
  background:rgba(54,255,0,0.08);
  border-left:2px solid var(--neon);
  border-right:2px solid var(--neon);
  pointer-events:none;
  z-index:2;
}
.work-handle{
  position:absolute;
  top:0;height:100%;width:10px;
  background:rgba(249,255,71,0.3);
  cursor:ew-resize;
  pointer-events:auto;
  z-index:3;
  /* タッチでも掴みやすく不可視ヒット領域を広げる */
}
.work-handle::after{
  content:'';
  position:absolute;inset:0 -8px;
}
.work-handle:hover{background:rgba(249,255,71,0.6);}
.work-handle.active{background:var(--neon);}
#work-handle-l{left:-2px;}
#work-handle-r{right:-2px;}
#work-area-body{
  position:absolute;
  top:0;height:100%;
  left:8px;right:8px;
  pointer-events:auto;
  cursor:grab;
}
#work-area-body:active{cursor:grabbing;}

/* タイムライン上の現在位置インジケータ */
#timeline-cursor{
  position:absolute;top:0;
  width:1px;height:100%;
  background:var(--acid);
  z-index:4;
  box-shadow:0 0 6px var(--acid);
  cursor:ew-resize;
}
/* ドラッグハンドル（上部の三角マーカー） */
#timeline-cursor::before{
  content:'';
  position:absolute;top:0;left:50%;
  transform:translateX(-50%);
  width:10px;height:10px;
  background:var(--acid);
  clip-path:polygon(50% 100%,0 0,100% 0);
  pointer-events:auto;
}

#strip-toolbar .seg{display:flex;gap:4px;align-items:center;}
#strip-toolbar .sep{color:var(--dim);}
#strip-toolbar .lbl{color:rgba(54,255,0,0.5);}
#strip-toolbar button{
  background:transparent;border:1px solid var(--border);
  color:rgba(255,255,255,0.6);
  font-family:var(--mono);font-size:9px;letter-spacing:0.1em;
  padding:3px 8px;cursor:pointer;
  transition:all 0.12s;
}
#strip-toolbar button:hover{border-color:var(--border-bright);color:var(--acid);}
#strip-toolbar button.on{background:rgba(54,255,0,0.1);border-color:var(--acid);color:var(--acid);}
#strip-toolbar .play-btn{
  width:24px;height:18px;display:flex;align-items:center;justify-content:center;
  padding:0;
}
#strip-toolbar .play-btn svg{width:10px;height:10px;}
#strip-toolbar .fps-input{
  width:36px;background:#000;border:1px solid var(--border);
  color:var(--acid);text-align:center;font-family:var(--mono);
  font-size:10px;height:18px;
}
#strip-toolbar .frame-pos{
  color:var(--acid);min-width:60px;
}
#strip-toolbar .right{margin-left:auto;display:flex;gap:8px;align-items:center;}

#strip-prev,#strip-next{
  width:24px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;color:rgba(255,255,255,0.4);
  cursor:pointer;font-size:14px;
}
#strip-prev:hover,#strip-next:hover{color:var(--acid);}

#strip-wrap{
  position:relative;
  overflow:hidden;
}
#frame-strip{
  display:flex;align-items:stretch;gap:3px;
  padding:8px 4px;
  height:100%;
  overflow-x:scroll;overflow-y:hidden;
  scrollbar-width:none;
  scroll-behavior:auto;
  /* 指タッチでネイティブの横スクロール + ピンチを許可。
     ペン/マウスのみJSハンドラで操作する */
  touch-action:pan-x pinch-zoom;
  -webkit-overflow-scrolling:touch;
}
#frame-strip::-webkit-scrollbar{display:none;}

/* タイムラインの空白タッチ領域（最後のフレームの後ろ） */
.fc-empty-tail{
  flex-shrink:0;
  flex-grow:0;
  background:repeating-linear-gradient(
    90deg,
    transparent 0 7px,
    rgba(255,255,255,0.04) 7px 8px
  );
  border:1px dashed rgba(255,255,255,0.08);
  cursor:cell;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.fc-empty-tail:hover{
  background:repeating-linear-gradient(
    90deg,
    transparent 0 7px,
    rgba(54,255,0,0.08) 7px 8px
  );
  border-color:rgba(54,255,0,0.4);
}
.fc-empty-tail .lbl{
  font-size:8px;letter-spacing:0.2em;
  color:rgba(255,255,255,0.25);
  pointer-events:none;
}
.fc-empty-tail:hover .lbl{color:var(--acid);}

.fc{
  flex-shrink:0;
  width:80px;          /* JSで動的にwidthを上書き */
  position:relative;
  background:#050505;
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
  transition:border-color 0.1s, box-shadow 0.1s;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.fc:hover{border-color:rgba(54,255,0,0.4);}
.fc.active{
  border-color:var(--acid);
  box-shadow:0 0 0 1px var(--acid),0 0 12px rgba(54,255,0,0.3);
}
.fc.dragging{
  opacity:0.4;
  border-color:var(--neon);
}
.fc.selected, .fc-empty.selected{
  outline:2px solid #FF6FB5;
  outline-offset:-2px;
  box-shadow:0 0 10px rgba(255,111,181,0.45);
}
.fc.selected.active, .fc-empty.selected.active{
  outline-color:#FFB347;
  box-shadow:0 0 12px rgba(255,179,71,0.55);
}
.fc.drop-target-left{
  box-shadow:-3px 0 0 0 var(--neon);
}
.fc.drop-target-right{
  box-shadow:3px 0 0 0 var(--neon);
}
.fc-thumb{
  flex:1;
  background:#fff;
  position:relative;
  overflow:hidden;
}
.fc-thumb canvas{
  width:100%;height:100%;
  display:block;
  image-rendering:pixelated;
}
/* 内側仕切り線（コマ打ち2,3用） */
.fc-divs{
  position:absolute;inset:0;
  pointer-events:none;
  display:flex;
}
.fc-divs span{
  flex:1;
  border-left:1px dashed rgba(0,0,0,0.18);
}
.fc-divs span:first-child{border-left:none;}

/* 空ブロックセル */
.fc-empty{
  flex-shrink:0;
  position:relative;
  background:repeating-linear-gradient(
    135deg,
    rgba(255,255,255,0.02) 0 6px,
    rgba(255,255,255,0.06) 6px 12px
  );
  border:1px dashed rgba(255,255,255,0.15);
  cursor:cell;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.fc-empty:hover{
  border-color:rgba(54,255,0,0.4);
  background:repeating-linear-gradient(
    135deg,
    rgba(54,255,0,0.04) 0 6px,
    rgba(54,255,0,0.08) 6px 12px
  );
}
.fc-empty.active{
  border-color:var(--neon);
  box-shadow:0 0 0 1px var(--neon);
}
.fc-empty .fc-meta{
  margin-top:auto;
}
.fc-empty .fc-num{color:rgba(255,255,255,0.3);}
.fc-empty .fc-dur{color:rgba(249,255,71,0.5);}
/* duration 4以上のときの目盛り表示 */
.fc-ruler{
  position:absolute;left:0;right:0;bottom:18px;
  height:6px;
  display:flex;
  pointer-events:none;
}
.fc-ruler span{
  flex:1;
  border-left:1px solid rgba(54,255,0,0.25);
  border-bottom:1px solid rgba(54,255,0,0.25);
}
.fc-ruler span:first-child{border-left:none;}
/* スクラブ用 右端ハンドル */
.fc-handle{
  position:absolute;
  right:-1px;top:0;bottom:0;
  width:8px;
  cursor:ew-resize;
  background:transparent;
  z-index:5;
  touch-action:none; /* iPadでのコマ伸縮をブラウザスクロールより優先 */
}
.fc-handle::after{
  /* タッチ環境用の不可視ヒットエリア拡張 */
  content:'';
  position:absolute;inset:-4px -6px;
}
.fc-handle:hover{background:rgba(54,255,0,0.3);}
.fc-handle.active{background:var(--acid);}
.fc-meta{
  height:18px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4px;
  font-size:8px;letter-spacing:0.1em;
  color:rgba(255,255,255,0.5);
  background:rgba(0,0,0,0.6);
  border-top:1px solid rgba(255,255,255,0.05);
}
.fc.active .fc-meta{color:var(--acid);}
.fc-num{font-weight:400;}
.fc-dur{
  color:rgba(249,255,71,0.6);
  cursor:ew-resize;
  padding:0 2px;
}
.fc.active .fc-dur{color:var(--neon);}

/* 非表示トグルボタン */
.fc-vis-btn{
  position:absolute;
  top:3px;right:16px;
  width:13px;height:13px;
  background:rgba(0,0,0,0.65);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:2px;
  font-size:7px;line-height:13px;
  text-align:center;cursor:pointer;
  color:rgba(255,255,255,0.65);
  z-index:4;padding:0;
  display:none;
  touch-action:none;
}
.fc:hover .fc-vis-btn,.fc-vis-btn.off{display:block;}
.fc-vis-btn.off{
  color:rgba(255,80,80,0.9);
  border-color:rgba(255,80,80,0.5);
  background:rgba(60,0,0,0.65);
}
/* 非表示フレームのオーバーレイ */
.fc.fc-frame-hidden::after{
  content:'';
  position:absolute;inset:0;
  background:rgba(0,0,0,0.55);
  pointer-events:none;
  z-index:3;
}

/* "+" 追加ボタン */
.fc-add{
  flex-shrink:0;width:40px;
  background:transparent;
  border:1px dashed rgba(255,255,255,0.15);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.3);
  font-size:18px;
  transition:all 0.12s;
}
.fc-add:hover{
  border-color:var(--acid);
  color:var(--acid);
  background:rgba(54,255,0,0.04);
}

/* カスタムスクロールバー */
#strip-scrollbar{
  grid-column:1/-1;
  height:14px;
  background:rgba(255,255,255,0.03);
  border-top:1px solid var(--border);
  position:relative;
  cursor:default;
}
#strip-thumb{
  position:absolute;top:3px;height:8px;
  background:rgba(54,255,0,0.3);border-radius:4px;
  cursor:grab;min-width:24px;
  transition:background 0.15s;
}
#strip-thumb:hover{background:rgba(54,255,0,0.6);}
#strip-thumb:active{cursor:grabbing;background:var(--acid);}

/* オニオンスキンキャンバス */
#onion-prev,#onion-next{
  position:absolute;top:0;left:0;
  pointer-events:none;
  opacity:0.35;
  image-rendering:pixelated;
}
#onion-prev{filter:hue-rotate(0deg);}
#onion-next{filter:hue-rotate(0deg);}

#bottombar{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  border-top:1px solid var(--border);
  background:var(--panel);
  font-size:9px;color:rgba(255,255,255,0.4);
  letter-spacing:0.15em;
}
#bottombar .stat{display:flex;gap:14px;}
#bottombar .stat b{color:var(--acid);font-weight:400;}
#bottombar .save-state{
  font-size:9px;letter-spacing:0.2em;
}
#bottombar .save-state.saved{color:rgba(54,255,0,0.6);}
#bottombar .save-state.dirty{color:var(--neon);}
#bottombar .save-state.saving{color:rgba(255,255,255,0.6);}

/* タッチ最適化 */
@media (pointer:coarse){
  .tool{width:54px;height:54px;}
  .tool svg{width:26px;height:26px;}
  .tb-pen{height:34px;}
  .tb-ink{height:28px;}
  .pen-btn{height:44px;}
  .ink-btn{height:38px;}
  #app{grid-template-columns:78px 1fr 240px;}
}

/* iPad縦持ち時はサイドパネルを下に */
@media (max-width:900px) and (orientation:portrait){
  #app{
    grid-template-columns:78px 1fr;
    grid-template-rows:36px 1fr 180px 130px 32px;
  }
  #side{
    grid-column:1/-1;
    border-left:none;
    border-top:1px solid var(--border);
    flex-direction:row;
    overflow-x:auto;overflow-y:hidden;
  }
  .pnl{
    border-bottom:none;
    border-right:1px solid var(--border);
    flex-shrink:0;min-width:200px;
  }
}
</style>

er"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="fc-meta"><span class="fc-num">005</span><span class="fc-dur" title="コマ打ち（クリックで変更）">×12</span></div><div class="fc-handle" title="ドラッグでコマ打ち変更"></div></div><div class="fc-empty" data-idx="5" style="width: 101px;"><div class="fc-meta"><span class="fc-num">空</span><span class="fc-dur" title="コマ打ち（クリックで変更）">×8</span></div><div class="fc-handle" title="ドラッグでコマ打ち変更"></div></div><div class="fc" data-idx="6" style="width: 51px;"><div class="fc-thumb"><canvas width="80" height="45"></canvas></div><button class="fc-vis-btn" title="表示（タップで非表示）">●</button><div class="fc-divs"><span></span><span></span></div><div class="fc-meta"><span class="fc-num">007</span><span class="fc-dur" title="コマ打ち（クリックで変更）">×2</span></div><div class="fc-handle" title="ドラッグでコマ打ち変更"></div></div><div class="fc" data-idx="7" style="width: 291px;"><div class="fc-thumb"><canvas width="80" height="45"></canvas></div><button class="fc-vis-btn" title="表示（タップで非表示）">●</button><div class="fc-ruler"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="fc-meta"><span class="fc-num">008</span><span class="fc-dur" title="コマ打ち（クリックで変更）">×27</span></div><div class="fc-handle" title="ドラッグでコマ打ち変更"></div></div><div class="fc-empty-tail" style="flex-grow: 1; min-width: 200px;"><span class="lbl">+ TAP</span></div></div>
