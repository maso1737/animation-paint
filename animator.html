function exportPNG(opts){
  opts = opts || {};
  // オフスクリーン4Kキャンバス作成
  const ex = document.createElement('canvas');
  ex.width  = CFG.EXPORT_W;
  ex.height = CFG.EXPORT_H;
  const exCtx = ex.getContext('2d');
  exCtx.imageSmoothingEnabled = false;
  // 背景（透明オプション時はスキップ）
  if(!opts.transparentBG){
    exCtx.drawImage(bgCanvas, 0, 0, CFG.EXPORT_W, CFG.EXPORT_H);
  }
  // 描画レイヤー
  exCtx.drawImage(drawCanvas, 0, 0, CFG.EXPORT_W, CFG.EXPORT_H);
  // ダウンロード
  ex.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
    const tag = opts.transparentBG ? '_alpha' : '';
    a.href = url;
    a.download = `frame_${ts}_4k${tag}.png`;
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// ============================================================
// INDEXED DB (自動保存・複数フレーム対応)
// ストア構成:
//   STORE_FRAMES: key=frame.id, value={drawData, duration, width, height, savedAt}
//   STORE_META:   key='project', value={frameOrder:[id,...], currentFrame, fps, bgBright, frameIdCounter}
// ============================================================
let db = null;

function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(CFG.DB_NAME, CFG.DB_VERSION);
    req.onupgradeneeded = e => {
      const _db = e.target.result;
      // v1で作った旧ストアがあれば削除（互換切る）
      if(_db.objectStoreNames.contains('frames') && e.oldVersion < 2){
        _db.deleteObjectStore('frames');
      }
      if(!_db.objectStoreNames.contains(CFG.STORE_FRAMES)){
        _db.createObjectStore(CFG.STORE_FRAMES);
      }
      if(!_db.objectStoreNames.contains(CFG.STORE_META)){
        _db.createObjectStore(CFG.STORE_META);
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

// dirtyフレームだけを差分保存
async function flushSave(){
  if(!db) return;
  setSaveState('saving');
  try{
    // カレントフレームの最新内容を取り込む
    const cur = curFrame();
    if(cur) syncFrameFromCanvas(cur);

    const tx = db.transaction([CFG.STORE_FRAMES, CFG.STORE_META], 'readwrite');
    const fs = tx.objectStore(CFG.STORE_FRAMES);
    const ms = tx.objectStore(CFG.STORE_META);

    // dirtyフレームのみ保存（最初の保存時は全部）
    const targetIds = state.pendingSaveFrames.size > 0
      ? Array.from(state.pendingSaveFrames)
      : state.frames.map(f => f.id);

    for(const id of targetIds){
      const f = state.frames.find(x => x.id === id);
      if(!f) {
        // 削除された場合
        fs.delete(id);
        continue;
      }
      if(f.kind === 'empty'){
        fs.put({
          id: f.id,
          kind: 'empty',
          duration: f.duration,
          savedAt: Date.now(),
        }, f.id);
      } else {
        fs.put({
          id: f.id,
          kind: 'draw',
          drawData: new Uint8ClampedArray(f.drawData),
          duration: f.duration,
          width: CFG.WORK_W,
          height: CFG.WORK_H,
          savedAt: Date.now(),
        }, f.id);
      }
      f.dirty = false;
    }
    state.pendingSaveFrames.clear();

    // メタ
    ms.put({
      frameOrder: state.frames.map(f => ({ id: f.id, kind: f.kind, duration: f.duration })),
      currentFrame: state.currentFrame,
      fps: state.fps,
      bgBright: state.bgBright,
      frameIdCounter: frameIdCounter,
      workStart: state.workStart,
      workEnd: state.workEnd,
      cellBaseW: state.cellBaseW,
      cellStretchPerTick: state.cellStretchPerTick,
      frameLayer: {
        visible: state.frameLayer.visible,
        opacity: state.frameLayer.opacity,
        editMode: state.frameLayer.editMode,
        image: frameLayerToPNGDataURL(),
      },
      savedAt: Date.now(),
    }, 'project');

    await new Promise((res,rej) => {
      tx.oncomplete = res;
      tx.onerror    = () => rej(tx.error);
    });
    state.dirty = false;
    setSaveState('saved');
  }catch(err){
    console.error('save failed', err);
    setSaveState('dirty');
  }
}

async function loadProject(){
  if(!db) return false;
  try{
    const tx = db.transaction([CFG.STORE_FRAMES, CFG.STORE_META], 'readonly');
    const ms = tx.objectStore(CFG.STORE_META);
    const fs = tx.objectStore(CFG.STORE_FRAMES);

    const meta = await new Promise((res,rej) => {
      const r = ms.get('project');
      r.onsuccess = () => res(r.result);
      r.onerror   = () => rej(r.error);
    });
    if(!meta || !meta.frameOrder || meta.frameOrder.length === 0) return false;

    // 旧形式（id配列）と新形式（{id,kind,duration}配列）の両対応
    const orderItems = meta.frameOrder.map(item =>
      typeof item === 'object' ? item : { id: item, kind: 'draw' }
    );

    // 各フレームを順番にロード
    const loadedFrames = [];
    for(const oi of orderItems){
      const data = await new Promise((res,rej) => {
        const r = fs.get(oi.id);
        r.onsuccess = () => res(r.result);
        r.onerror   = () => rej(r.error);
      });
      if(!data) continue;
      // kind判定: dataにkindがあれば優先、なければoiから、それもなければ旧データなのでdraw
      const kind = data.kind || oi.kind || 'draw';
      if(kind === 'empty'){
        loadedFrames.push({
          id: data.id || oi.id,
          kind: 'empty',
          duration: data.duration || oi.duration || 1,
          dirty: false,
        });
        continue;
      }
      // draw kind
      const thumbCanvas = document.createElement('canvas');
      thumbCanvas.width = CFG.THUMB_W;
      thumbCanvas.height = CFG.THUMB_H;
      const f = {
        id: data.id,
        kind: 'draw',
        drawData: data.drawData ? new Uint8ClampedArray(data.drawData) : new Uint8ClampedArray(CFG.WORK_W * CFG.WORK_H * 4),
        thumbCanvas,
        duration: data.duration || 2,
        history: [],
        histIdx: -1,
        strokeCount: 0,
        dirty: false,
      };
      // サムネ生成
      const tc = thumbCanvas.getContext('2d');
      tc.imageSmoothingEnabled = false;
      tc.fillStyle = '#fff';
      tc.fillRect(0, 0, CFG.THUMB_W, CFG.THUMB_H);
      const tmp = document.createElement('canvas');
      tmp.width = CFG.WORK_W; tmp.height = CFG.WORK_H;
      tmp.getContext('2d').putImageData(
        new ImageData(new Uint8ClampedArray(f.drawData), CFG.WORK_W, CFG.WORK_H),
        0, 0
      );
      tc.drawImage(tmp, 0, 0, CFG.THUMB_W, CFG.THUMB_H);
      loadedFrames.push(f);
    }
    if(loadedFrames.length === 0) return false;

    state.frames = loadedFrames;
    state.currentFrame = Math.min(meta.currentFrame || 0, state.frames.length - 1);
    state.fps = meta.fps || 24;
    state.bgBright = meta.bgBright || 100;
    frameIdCounter = Math.max(meta.frameIdCounter || 0, ...loadedFrames.map(f => f.id));
    // ワークエリア
    if(typeof meta.workStart === 'number') state.workStart = meta.workStart;
    if(typeof meta.workEnd === 'number') state.workEnd = meta.workEnd;
    // セル幅設定
    if(typeof meta.cellBaseW === 'number') state.cellBaseW = meta.cellBaseW;
    if(typeof meta.cellStretchPerTick === 'number') state.cellStretchPerTick = meta.cellStretchPerTick;

    // UI反映
    document.getElementById('fps-input').value = state.fps;
    setBgBright(state.bgBright);

    // FRAMEレイヤー復元
    if(meta.frameLayer && typeof meta.frameLayer === 'object'){
      const fl = meta.frameLayer;
      if(typeof fl.visible === 'boolean') state.frameLayer.visible = fl.visible;
      if(typeof fl.opacity === 'number') state.frameLayer.opacity = fl.opacity;
      // 編集モードはアプリ起動時はOFFに戻す（不慮の上書き防止）
      state.frameLayer.editMode = false;
      const slider = document.getElementById('frame-opacity');
      if(slider) slider.value = Math.round(state.frameLayer.opacity * 100);
      await loadFrameLayerFromDataURL(fl.image || null);
      applyFrameLayerStyle();
    } else {
      applyFrameLayerStyle();
    }

    return true;
  }catch(err){
    console.error('load failed', err);
    return false;
  }
}

function setSaveState(s){
  const el = document.getElementById('save-state');
  el.className = 'save-state ' + s;
  el.textContent = s.toUpperCase();
}
function markFrameDirty(f){
  if(!f) return;
  f.dirty = true;
  state.pendingSaveFrames.add(f.id);
  scheduleSave();
}
function markMetaDirty(){
  state.dirty = true;
  scheduleSave();
}
function scheduleSave(){
  setSaveState('dirty');
  if(state.saveTimer) clearTimeout(state.saveTimer);
  state.saveTimer = setTimeout(flushSave, CFG.AUTOSAVE_DELAY);
}

// ============================================================
// FRAME STRIP SCROLLBAR
// ============================================================
function updateScrollThumb(){
  const strip = document.getElementById('frame-strip');
  const sb    = document.getElementById('strip-scrollbar');
  const thumb = document.getElementById('strip-thumb');
  if(!strip || !sb || !thumb) return;
  const totalW   = strip.scrollWidth;
  const visibleW = strip.clientWidth;
  const sbW      = sb.clientWidth;
  if(totalW <= visibleW){
    thumb.style.display = 'none';
    return;
  }
  thumb.style.display = 'block';
  const ratio = visibleW / totalW;
  const thumbW = Math.max(24, sbW * ratio);
  const maxLeft = sbW - thumbW;
  const thumbLeft = (strip.scrollLeft / (totalW - visibleW)) * maxLeft;
  thumb.style.width = thumbW + 'px';
  thumb.style.left  = thumbLeft + 'px';
}
// ============================================================
// WORK AREA (再生・書き出し範囲)
// ============================================================
function setupWorkArea(){
  const handleL = document.getElementById('work-handle-l');
  const handleR = document.getElementById('work-handle-r');
  const body    = document.getElementById('work-area-body');
  const inner   = document.getElementById('time-track-inner');

  // ハンドル/ボディ操作の共通関数
  function clientXToTick(clientX){
    // inner要素はscrollLeft分translateX(-)されている
    const innerRect = inner.getBoundingClientRect();
    const x = clientX - innerRect.left;
    return Math.max(0, Math.min(totalTicks(), Math.round(pxToTick(x))));
  }

  function setupHandleDrag(el, side){
    let active = null;
    el.addEventListener('pointerdown', e => {
      e.stopPropagation();
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      el.classList.add('active');
      active = { startX: e.clientX, origStart: state.workStart, origEnd: state.workEnd };
    });
    el.addEventListener('pointermove', e => {
      if(!active) return;
      const tick = clientXToTick(e.clientX);
      if(side === 'L'){
        state.workStart = Math.min(tick, state.workEnd - 1);
        state.workStart = Math.max(0, state.workStart);
      } else {
        state.workEnd = Math.max(tick, state.workStart + 1);
        state.workEnd = Math.min(totalTicks(), state.workEnd);
      }
      updateTimeTrack();
      updateDurInfo();
    });
    function endDrag(){
      if(!active) return;
      active = null;
      el.classList.remove('active');
      markMetaDirty();
    }
    el.addEventListener('pointerup', endDrag);
    el.addEventListener('pointercancel', endDrag);
  }
  setupHandleDrag(handleL, 'L');
  setupHandleDrag(handleR, 'R');

  // ボディドラッグで全体移動
  let bodyDrag = null;
  body.addEventListener('pointerdown', e => {
    e.stopPropagation();
    e.preventDefault();
    body.setPointerCapture(e.pointerId);
    bodyDrag = {
      startX: e.clientX,
      origStart: state.workStart,
      origEnd: state.workEnd,
    };
  });
  body.addEventListener('pointermove', e => {
    if(!bodyDrag) return;
    const newStartTick = clientXToTick(e.clientX) - (
      // 移動量をtick単位で計算
      0
    );
    // 移動量を計算（startXからの差分をtickに変換）
    const innerRect = inner.getBoundingClientRect();
    const dxPx = e.clientX - bodyDrag.startX;
    const startPx = tickToPx(bodyDrag.origStart);
    const newStart = Math.max(0, Math.min(totalTicks(), Math.round(pxToTick(startPx + dxPx))));
    const len = bodyDrag.origEnd - bodyDrag.origStart;
    const maxStart = Math.max(0, totalTicks() - len);
    const finalStart = Math.min(newStart, maxStart);
    state.workStart = finalStart;
    state.workEnd = finalStart + len;
    updateTimeTrack();
    updateDurInfo();
  });
  function endBodyDrag(){
    if(!bodyDrag) return;
    bodyDrag = null;
    markMetaDirty();
  }
  body.addEventListener('pointerup', endBodyDrag);
  body.addEventListener('pointercancel', endBodyDrag);

  // ============================================================
  // ペンスクラブで time-track 全体をタイムライン拡縮
  // (Alt+ホイール相当。タッチは従来の再生範囲操作)
  // ============================================================
  const timeTrack = document.getElementById('time-track');
  let penScaleDrag = null;
  timeTrack.addEventListener('pointerdown', e => {
    if(e.pointerType !== 'pen' && e.pointerType !== 'mouse') return;
    // work-handle や work-area-body への操作は優先させる（stopPropagation済み）
    penScaleDrag = {
      startX: e.clientX,
      origBaseW: state.cellBaseW,
      origStretch: state.cellStretchPerTick,
    };
    timeTrack.setPointerCapture(e.pointerId);
    e.preventDefault();
  }, {passive:false});
  timeTrack.addEventListener('pointermove', e => {
    if(!penScaleDrag) return;
    const dx = e.clientX - penScaleDrag.startX;
    const factor = 1 + dx * 0.008; // 右へ = 拡大
    state.cellBaseW = Math.max(40, Math.min(240, Math.round(penScaleDrag.origBaseW * factor)));
    state.cellStretchPerTick = Math.max(8, Math.min(60, Math.round(penScaleDrag.origStretch * factor)));
    buildStrip();
    updateTimeTrack();
  });
  function endPenScale(){
    penScaleDrag = null;
  }
  timeTrack.addEventListener('pointerup', endPenScale);
  timeTrack.addEventListener('pointercancel', endPenScale);

  // time-track 上のダブルクリック/ダブルタップ（work-area以外の空きエリア）→ 全範囲
  let trackDblT = 0;
  timeTrack.addEventListener('pointerdown', e => {
    // work-area内の操作は除外（そちらで個別処理済み）
    if(e.target.closest('#work-area')) return;
    const now = performance.now();
    if(now - trackDblT < 350){
      state.workStart = 0;
      state.workEnd = totalTicks();
      updateTimeTrack();
      updateDurInfo();
      markMetaDirty();
      trackDblT = 0;
    } else {
      trackDblT = now;
    }
  }, { passive: true });

  // ダブルタップで全範囲/最小範囲をサイクル
  let lastTapT = 0;
  let cycleState = 0; // 0=全範囲, 1=現在フレームのみ, 2=元の状態（保存値）
  let savedRange = null;
  body.addEventListener('pointerdown', e => {
    const now = performance.now();
    if(now - lastTapT < 350){
      // ダブルタップ
      if(cycleState === 0){
        savedRange = { start: state.workStart, end: state.workEnd };
        // 全範囲
        state.workStart = 0;
        state.workEnd = totalTicks();
        cycleState = 1;
      } else if(cycleState === 1){
        // 現在フレームのみ
        const startTick = state.frames.slice(0, state.currentFrame).reduce((s, f) => s + f.duration, 0);
        const dur = state.frames[state.currentFrame]?.duration || 1;
        state.workStart = startTick;
        state.workEnd = startTick + dur;
        cycleState = 2;
      } else {
        // 元に戻す
        if(savedRange){
          state.workStart = Math.min(savedRange.start, totalTicks());
          state.workEnd = Math.min(savedRange.end, totalTicks());
        } else {
          state.workStart = 0;
          state.workEnd = totalTicks();
        }
        cycleState = 0;
      }
      updateTimeTrack();
      updateDurInfo();
      markMetaDirty();
      lastTapT = 0;
    } else {
      lastTapT = now;
    }
  });
}

// ワークエリアを「総コマ数に合わせる」
function ensureWorkAreaValid(){
  const total = totalTicks();
  if(state.workEnd > total) state.workEnd = total;
  if(state.workStart >= state.workEnd) state.workStart = Math.max(0, state.workEnd - 1);
  if(total === 0){
    state.workStart = 0;
    state.workEnd = 0;
  }
}

// ============================================================
// 再生インジケーター ドラッグスクラブ
// ============================================================
function setupCursorScrub(){
  const cursor = document.getElementById('timeline-cursor');
  if(!cursor) return;
  let dragging = false;

  function scrubToClientX(clientX){
    // time-track-inner の bounding rect から px を求め tick に変換
    const inner = document.getElementById('time-track-inner');
    if(!inner) return;
    const rect = inner.getBoundingClientRect();
    const px = clientX - rect.left;
    const tick = Math.max(0, Math.min(totalTicks() - 1, Math.round(pxToTick(px))));
    // tickに対応するフレームを探して切替
    let acc = 0;
    for(let i = 0; i < state.frames.length; i++){
      acc += state.frames[i].duration;
      if(tick < acc){
        if(i !== state.currentFrame) switchToFrame(i);
        break;
      }
    }
    // カーソル位置を即時更新
    cursor.style.left = tickToPx(tick) + 'px';
  }

  cursor.addEventListener('pointerdown', e => {
    if(state.playing) return; // 再生中は無効
    e.preventDefault();
    e.stopPropagation();
    dragging = true;
    cursor.setPointerCapture(e.pointerId);
    scrubToClientX(e.clientX);
  });
  cursor.addEventListener('pointermove', e => {
    if(!dragging) return;
    scrubToClientX(e.clientX);
  });
  cursor.addEventListener('pointerup', () => { dragging = false; });
  cursor.addEventListener('pointercancel', () => { dragging = false; });

  // time-track の空き領域クリックでもスクラブ
  const track = document.getElementById('time-track');
  if(track){
    track.addEventListener('pointerdown', e => {
      if(state.playing) return;
      if(e.target === cursor) return; // カーソル自身はそちらで処理
      scrubToClientX(e.clientX);
    });
  }
}

function setupStripScroll(){
  const strip = document.getElementById('frame-strip');
  const sb    = document.getElementById('strip-scrollbar');
  const thumb = document.getElementById('strip-thumb');
  // ホイール: 横スクロール（ただしAlt時はセル伸縮なのでスキップ）
  strip.addEventListener('wheel', e => {
    if(e.altKey) return; // Alt+ホイールは別ハンドラ（セル伸縮）に任せる
    e.preventDefault();
    strip.scrollLeft += e.deltaY * 0.8 + e.deltaX;
    updateScrollThumb();
  }, { passive: false });
  strip.addEventListener('scroll', () => {
    updateScrollThumb();
    syncTimeTrackScroll();
  });
  // サムドラッグ
  let dragging = false, dragStartX = 0, dragStartScroll = 0;
  thumb.addEventListener('pointerdown', e => {
    dragging = true;
    thumb.setPointerCapture(e.pointerId);
    dragStartX = e.clientX;
    dragStartScroll = strip.scrollLeft;
    e.preventDefault();
  });
  thumb.addEventListener('pointermove', e => {
    if(!dragging) return;
    const dx = e.clientX - dragStartX;
    const totalW = strip.scrollWidth;
    const visW   = strip.clientWidth;
    const sbW    = sb.clientWidth;
    const thumbW = thumb.offsetWidth;
    const maxLeft = sbW - thumbW;
    if(maxLeft <= 0) return;
    strip.scrollLeft = dragStartScroll + (dx / maxLeft) * (totalW - visW);
    updateScrollThumb();
  });
  thumb.addEventListener('pointerup', () => dragging = false);
  thumb.addEventListener('pointercancel', () => dragging = false);
  // バー上クリック
  sb.addEventListener('pointerdown', e => {
    if(e.target !== sb) return;
    const rect = sb.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const sbW = sb.clientWidth;
    const totalW = strip.scrollWidth;
    const visW = strip.clientWidth;
    strip.scrollLeft = (clickX / sbW) * (totalW - visW);
    updateScrollThumb();
  });
}

// IN/OUT スクラブ
// IN: 前フレームの duration を変更（IN点を前後に動かす）
// OUT: 現在フレームの duration を変更（従来通り）
// ============================================================
(function setupInOutScrub(){
  function makeScrubHandler(el, which){
    let scrub = null;
    el.style.cursor = 'ew-resize';
    el.addEventListener('pointerdown', e => {
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      if(which === 'IN'){
        // IN スクラブ: 前フレームを対象
        const prevIdx = state.currentFrame - 1;
        if(prevIdx < 0) return; // フレーム0にはIN前がない
        const prev = state.frames[prevIdx];
        if(!prev) return;
        scrub = { startX: e.clientX, origDur: prev.duration, targetIdx: prevIdx };
      } else {
        // OUT スクラブ: 現在フレームを対象
        const f = state.frames[state.currentFrame];
        if(!f || f.kind === 'empty') return;
        scrub = { startX: e.clientX, origDur: f.duration, targetIdx: state.currentFrame };
      }
    });
    el.addEventListener('pointermove', e => {
      if(!scrub) return;
      const f = state.frames[scrub.targetIdx];
      if(!f) return;
      const dx = e.clientX - scrub.startX;
      let newDur = scrub.origDur + Math.round(dx / state.cellStretchPerTick);
      const otherTicks = totalTicks() - f.duration;
      const maxDur = Math.min(120, maxTicks() - otherTicks);
      newDur = Math.max(1, Math.min(maxDur, newDur));
      if(newDur !== f.duration){
        f.duration = newDur;
        enforceMaxDuration();
        markFrameDirty(f);
        buildStrip();
        updateFramePos();
        updateDurInfo();
        updateTimeTrack();
      }
    });
    function endScrub(){
      if(!scrub) return;
      const changed = state.frames[scrub.targetIdx]?.duration !== scrub.origDur;
      scrub = null;
      if(changed) pushTimelineHistory();
      markMetaDirty();
    }
    el.addEventListener('pointerup', endScrub);
    el.addEventListener('pointercancel', endScrub);
  }
  const inEl  = document.getElementById('frame-in');
  const outEl = document.getElementById('frame-pos');
  if(inEl)  makeScrubHandler(inEl,  'IN');
  if(outEl) makeScrubHandler(outEl, 'OUT');
})();

// 参照画像をFRAMEレイヤーに読み込み（contain フィット、センタリング）
document.getElementById('btn-frame-img').addEventListener('click', () => {

document.getElementById('frame-img-input').addEventListener('change', e => {
  const file = e.target.files && e.target.files[0];
  e.target.value = '';
  if(!file) return;
  const url = URL.createObjectURL(file);
  const im = new Image();
  im.onload = () => {
    const cw = CFG.WORK_W, ch = CFG.WORK_H;
    const scale = Math.min(cw / im.width, ch / im.height);
    const dw = Math.round(im.width * scale);
    const dh = Math.round(im.height * scale);
    const dx = Math.round((cw - dw) / 2);
    const dy = Math.round((ch - dh) / 2);
    frameLayerCtx.clearRect(0, 0, cw, ch);
    frameLayerCtx.drawImage(im, dx, dy, dw, dh);
    URL.revokeObjectURL(url);
    // 自動で表示ON・FRAMEモード維持
    state.frameLayer.visible = true;
    applyFrameLayerStyle();
    pushFrameLayerHistory();
  };
  im.onerror = () => URL.revokeObjectURL(url);
  im.src = url;
});

// フレーム分割（現在フレームを前半/後半2コマに分割）
function splitCurrentFrame(splitAt){
  const f = curFrame();
  if(!f || f.kind !== 'draw' || f.duration < 2) return;
  syncFrameFromCanvas(f);
  // splitAt: 前半に残すコマ数 (1..duration-1)。未指定なら中央
  let d1 = (typeof splitAt === 'number') ? Math.floor(splitAt) : Math.floor(f.duration / 2);
  d1 = Math.max(1, Math.min(f.duration - 1, d1));
  const d2 = f.duration - d1;
  // 現フレームを前半コマ数に縮める
  f.duration = d1;
  markFrameDirty(f);
  // 後半コマを同内容の新フレームとして直後に挿入
  const newF = createBlankFrame();
  newF.drawData = new Uint8ClampedArray(f.drawData);
  const tc = newF.thumbCanvas.getContext('2d');
  tc.drawImage(f.thumbCanvas, 0, 0);
  newF.duration = d2;
  state.frames.splice(state.currentFrame + 1, 0, newF);
  newF.dirty = true;
  state.pendingSaveFrames.add(newF.id);
  enforceMaxDuration();
  buildStrip();
  updateDurInfo();
  updateTimeTrack();
  scrollFrameIntoView(state.currentFrame);
  scheduleSave();
  pushTimelineHistory(); // タイムライン操作記録
}
document.getElementById('btn-split-frame').addEventListener('click', splitCurrentFrame);
document.getElementById('strip-prev').addEventListener('click', () => {
  if(state.currentFrame > 0){
    switchToFrame(state.currentFrame - 1);
    scrollFrameIntoView(state.currentFrame);
  }
});
document.getElementById('strip-next').addEventListener('click', () => {
  if(state.currentFrame < state.frames.length - 1){
    switchToFrame(state.currentFrame + 1);
    scrollFrameIntoView(state.currentFrame);
  }
});

// Alt+ホイールでセル幅伸縮（ストリップ全体のセル基準幅を拡大縮小）
document.getElementById('frame-strip').addEventListener('wheel', e => {
  if(e.altKey){
    e.preventDefault();
    e.stopPropagation();
    const factor = e.deltaY < 0 ? 1.1 : 0.91;
    state.cellBaseW = Math.max(40, Math.min(240, Math.round(state.cellBaseW * factor)));
    state.cellStretchPerTick = Math.max(8, Math.min(60, Math.round(state.cellStretchPerTick * factor)));
    buildStrip();
  }
}, { passive: false, capture: true });


// ============================================================
// タイムライン領域 2/3本指タップ → Undo/Redo（strip-area独立検出）
// stage と別要素なので個別にトラッキング
(function setupStripTapGestures(){
  const stripArea = document.getElementById('strip-area');
  if(!stripArea) return;
  const tps = new Map();
  let sessStart = 0, sessMax = 0;
  stripArea.addEventListener('pointerdown', e => {
    if(e.pointerType !== 'touch') return;
    const now = performance.now();
    if(tps.size === 0){ sessStart = now; sessMax = 0; }
    tps.set(e.pointerId, {x:e.clientX, y:e.clientY, sx:e.clientX, sy:e.clientY});
    if(tps.size > sessMax) sessMax = tps.size;
  }, {passive:true});
  stripArea.addEventListener('pointermove', e => {
    const p = tps.get(e.pointerId);
    if(p){ p.x = e.clientX; p.y = e.clientY; }
  }, {passive:true});
  function end(e){
    const p = tps.get(e.pointerId); if(!p) return;
    tps.delete(e.pointerId);
    if(tps.size === 0){
      const elapsed = performance.now() - sessStart;
      const moved = Math.hypot(p.x - p.sx, p.y - p.sy);
      if(elapsed < 300 && moved < 12){
        if(sessMax === 2) undo();
        else if(sessMax === 3) redo();
      }
      sessMax = 0;
    }
  }
  stripArea.addEventListener('pointerup', end, {passive:true});
  stripArea.addEventListener('pointercancel', end, {passive:true});
})();

// ============================================================
// KEYBOARD
// ============================================================
window.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return;
  if((e.ctrlKey||e.metaKey) && e.key === 'z'){ e.preventDefault(); undo(); return; }
  if((e.ctrlKey||e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))){ e.preventDefault(); redo(); return; }
  if(e.key === 'b' || e.key === 'B'){ document.querySelector('.tool[data-tool="pen"]').click(); }
  if(e.key === 'e' || e.key === 'E'){ document.querySelector('.tool[data-tool="erase"]').click(); }
  if(e.key === 'g' || e.key === 'G'){ document.querySelector('.tool[data-tool="fill"]').click(); }
  if(e.key === '1'){ document.querySelector('.tb-pen[data-size="1"]').click(); }
  if(e.key === '2'){ document.querySelector('.tb-pen[data-size="2"]').click(); }
  if(e.key === '3'){ document.querySelector('.tb-pen[data-size="20"]').click(); }
  if(e.key === 'o' || e.key === 'O'){ document.getElementById('btn-onion').click(); }
  if(e.key === 'n' || e.key === 'N'){ document.getElementById('btn-add-frame').click(); }
  if(e.key === 'd' || e.key === 'D'){ document.getElementById('btn-dup-frame').click(); }
  if(e.key === 's' || e.key === 'S'){ splitCurrentFrame(); }
  if(e.key === 'w' || e.key === 'W'){
    // ワークエリアを全範囲にリセット
    state.workStart = 0;
    state.workEnd = totalTicks();
    updateTimeTrack();
    updateDurInfo();
    markMetaDirty();
  }
  if(e.key === ' '){
    e.preventDefault();
    document.getElementById('btn-play').click();
  }
  if(e.key === 'ArrowLeft'){
    e.preventDefault();
    document.getElementById('strip-prev').click();
  }
  if(e.key === 'ArrowRight'){
    e.preventDefault();
    document.getElementById('strip-next').click();
  }
  if(e.key === 'Delete' || e.key === 'Backspace'){
    e.preventDefault();
    if(state.selectedFrameIds && state.selectedFrameIds.size > 0){
      deleteSelectedFrames();
    } else {
      deleteCurrentFrame();
    }
  }
  if((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')){
    e.preventDefault();
    copySelectedFrames();
  }
  if((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')){
    e.preventDefault();
    pasteFramesAfterCurrent();
  }
  if(e.key === 'Escape'){
    clearFrameSelection();
  }
  if(e.key === 'f' || e.key === 'F'){
    // F: FRAMEレイヤー編集モードをトグル
    document.getElementById('btn-frame-edit').click();
  }
});

// ============================================================
// INIT
// ============================================================
window.addEventListener('resize', () => {
  if(state.fitMode) fitToStage();
});

(async function init(){
  fitToStage();
  setupStripScroll();
  setupWorkArea();
  setupCursorScrub();
  try{
    db = await openDB();
    // URL ?id=xxx で来た場合は EXCHANGE DB から受信して上書き読込
    const urlId = new URLSearchParams(location.search).get('id');
    let loadedFromExchange = false;
    if(urlId){
      try{
        const rec = await exGet(urlId);
        if(rec){
          await applyProjectJSON(rec);
          loadedFromExchange = true;
          // URLからidパラメータを除去（再読込時に二重適用しないため）
          history.replaceState(null,'','animator.html');
        }
      }catch(e){ console.warn('exchange load failed', e); }
    }
    if(!loadedFromExchange){
      const loaded = await loadProject();
      if(!loaded){
        state.frames = [createBlankFrame()];
        state.currentFrame = 0;
        state.pendingSaveFrames.add(state.frames[0].id);
      }
    }
  }catch(err){
    console.warn('IndexedDB unavailable:', err);
    state.frames = [createBlankFrame()];
    state.currentFrame = 0;
  }
  // ワークエリア初期化: 全範囲
  ensureWorkAreaValid();
  if(state.workEnd === 0){
    state.workStart = 0;
    state.workEnd = totalTicks();
  }
  // カレントフレームをキャンバスに反映
  buildStrip();
  loadFrameToCanvas(curFrame());
  updateStripUI();
  updateOnion();
  updateStats();
  updateFramePos();
  updateDurInfo();
  updateTimeTrack();
  // FRAMEレイヤー初期表示
  applyFrameLayerStyle();
  // 初回保存
  if(state.pendingSaveFrames.size > 0) scheduleSave();
  // タイムライン履歴の初期スナップ（ロード後の状態を記録）
  pushTimelineHistory();
  state.lastEditWas = 'canvas'; // 初期はキャンバスUNDO優先
})();

// ページ離脱前に強制保存
window.addEventListener('beforeunload', e => {
  if(state.dirty || state.pendingSaveFrames.size > 0){
    flushSave();
  }
});
