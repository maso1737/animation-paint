<script>
// ============================================================
// CONFIG
// ============================================================
const CFG = {
  // 内部作業解像度 (16:9, 2K相当)
  WORK_W: 2048,
  WORK_H: 1152,
  // 書き出し解像度 (4K)
  EXPORT_W: 3840,
  EXPORT_H: 2160,
  // 履歴保持数（フレーム単位）
  HISTORY_MAX: 50,
  // 自動保存遅延 (ms)
  AUTOSAVE_DELAY: 800,
  // サムネイルサイズ
  THUMB_W: 80,
  THUMB_H: 45,
  // タイムライン最大尺（秒）
  MAX_DURATION_SEC: 15,
  // IndexedDB
  DB_NAME: 'animator',
  DB_VERSION: 2,
  STORE_FRAMES: 'frames',
  STORE_META:   'meta',
};

// 48色パレット (アニメ塗りでよく使う系統)
const PALETTE_48 = [
  // 肌系 (5)
  '#FFF0E0','#FCE5CE','#F8C99B','#E8A87C','#C68863',
  // 髪・赤系 (8)
  '#3B2C2A','#5C3A36','#8B4543','#C04848','#E55B47','#F08A6E','#FFB89B','#FFD8C2',
  // 黄〜橙 (4)
  '#FFD93D','#FFC857','#FFA94D','#FF8730',
  // 緑系 (7)
  '#E8F5D0','#C5E384','#9DCB5C','#6FAF3A','#4A8B2D','#2E5F1F','#1F3F12',
  // 青系（影・空） (7)
  '#F0F8FF','#E8F4FF','#BFDFFF','#8BB8E8','#5C8FCC','#3D6FA8','#1F4A7C',
  // 紫 (4)
  '#D4B6E8','#A881C5','#7C5BA0','#553B7A',
  // 赤系（影・口） (5)
  '#FFE0E0','#FFD0D0','#FF9090','#E55050','#A02020',
  // ニュートラル (8)
  '#FFFFFF','#E0DDD5','#B5B0A4','#888373','#4F4B40','#2A2722','#1A1815','#000000',
];

// インクカラー
const INK = {
  black:  '#000000',
  blue:   '#A8D8FF',  // 下書き用うすい水色
  orange: '#FFB060',  // 指示用オレンジ
};

// ============================================================
// MODAL DIALOG (confirm/alertの代替)
// iPadのHTMLビューアアプリで confirm() がブロックされる対策
// ============================================================
function showModal({msg, buttons}){
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-overlay');
    const msgEl = document.getElementById('modal-msg');
    const btnsEl = document.getElementById('modal-btns');
    msgEl.textContent = msg;
    btnsEl.innerHTML = '';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'modal-btn ' + (b.variant || '');
      btn.textContent = b.label;
      btn.addEventListener('click', () => {
        overlay.classList.remove('show');
        resolve(b.value);
      });
      btnsEl.appendChild(btn);
    });
    overlay.classList.add('show');
  });
}
async function modalConfirm(msg){
  const r = await showModal({
    msg,
    buttons: [
      { label: 'CANCEL', value: false },
      { label: 'OK',     value: true, variant: 'primary' },
    ]
  });
  return r === true;
}
async function modalAlert(msg){
  await showModal({
    msg,
    buttons: [{ label: 'OK', value: true, variant: 'primary' }]
  });
}

// ============================================================
// STATE
// ============================================================
const state = {
  tool: 'pen',          // 'pen'|'erase'|'fill'
  // ツールごとに独立したサイズ記憶
  penSize: 2,           // 1|2|20
  eraseSize: 20,        // 1|2|20
  inkColor: 'black',    // 'black'|'blue'|'orange'
  fillColor: '#000000',
  bgBright: 100,
  // ズームとパン
  zoom: 1,
  fitMode: true,
  panX: 0,              // 表示オフセット (px)
  panY: 0,
  // フレーム管理
  frames: [],
  currentFrame: 0,
  fps: 24,
  strokeCount: 0,
  dirty: false,
  saveTimer: null,
  pendingSaveFrames: new Set(),
  // 再生
  playing: false,
  playStartTime: 0,
  playStartFrame: 0,
  loop: true,
  // オニオンスキン
  onionOn: false,
  // ストローク補正の強さ (0=なし, 推奨: 3)
  smoothing: 3,
  // セル基準幅 (px)。Alt+ホイール で変更可能
  cellBaseW: 80,
  // duration 4以上のときの「1コマあたり伸びる量」 (px)
  cellStretchPerTick: 20,
  // ワークエリア（再生・書き出し範囲）: コマ単位
  workStart: 0,    // 開始コマ番号（0始まり）
  workEnd: 0,      // 終了コマ番号（exclusive）
  // 'select' | 'edit' などモード判別。当面 edit のみ
  mode: 'edit',
  // キャンバス左右反転（表示のみ）
  flipped: false,
  // 左右ミラー描画
  mirrorOn: false,
  // ミラー軸 (x座標, キャンバス座標系)。デフォルトは中央。
  mirrorAxisX: 1024,
  // TIME表示単位: 'frames'=コマ数, 'seconds'=秒
  timeUnit: 'frames',
  // 直前の操作種別: 'canvas' | 'timeline' → undo/redo のターゲット切替に使用
  lastEditWas: 'canvas',
  // 複数選択中のフレームID集合（id基準で安定）
  selectedFrameIds: new Set(),
  // FRAMEレイヤー（全コマ共通の下絵レイヤー、書き出しに含まれない）
  frameLayer: {
    visible: true,
    opacity: 0.4,    // 0..1
    editMode: false, // true = 描画ターゲットがframeLayerになる
  },
  // COMPOSER から戻ってきた追記データ（keyframes/markers）。再exportで保持。
  // shape: { keyframes:{x:[],y:[],s:[],ax:[],ay:[]}, markers:[{frame,label}] }
  composerData: null,
  // プロジェクトID（PROJECT_v1 連携用、起動時に生成）
  projectId: null,
};

// ============================================================
// FRAME LAYER (全コマ共通の下絵レイヤー)
// ============================================================
function applyFrameLayerStyle(){
  const fl = state.frameLayer;
  frameLayerCanvas.style.display = fl.visible ? 'block' : 'none';
  // 編集モード中はやや明るめに、通常時はopacityのまま
  frameLayerCanvas.style.opacity = fl.editMode ? Math.max(0.6, fl.opacity) : fl.opacity;
  // 編集モードを示すトップバーボタン状態
  const btn = document.getElementById('btn-frame-edit');
  if(btn) btn.classList.toggle('on', fl.editMode);
  const visBtn = document.getElementById('btn-frame-vis');
  if(visBtn){
    visBtn.classList.toggle('on', fl.visible);
    visBtn.textContent = fl.visible ? '●' : '✕';
  }
  // 編集中は描画レイヤーを少しフェードして区別
  drawCanvas.style.opacity = fl.editMode ? 0.45 : 1;
  // ステージにモード表示
  const stageEl = document.getElementById('stage');
  if(stageEl) stageEl.classList.toggle('frame-edit', fl.editMode);
}
function scheduleFrameLayerSave(){
  // FRAMEレイヤー画像はメタに乗っているのでmetaを汚す
  if(typeof markMetaDirty === 'function') markMetaDirty();
  else if(typeof scheduleSave === 'function') scheduleSave();
}
function clearFrameLayer(){
  frameLayerCtx.clearRect(0, 0, CFG.WORK_W, CFG.WORK_H);
  scheduleFrameLayerSave();
}
function frameLayerToPNGDataURL(){
  // 空(全透明)ならnull
  const img = frameLayerCtx.getImageData(0, 0, CFG.WORK_W, CFG.WORK_H);
  let hasContent = false;
  const d = img.data;
  for(let i = 3; i < d.length; i += 4){
    if(d[i] !== 0){ hasContent = true; break; }
  }
  if(!hasContent) return null;
  return frameLayerCanvas.toDataURL('image/png');
}
function loadFrameLayerFromDataURL(dataURL){
  return new Promise((resolve) => {
    if(!dataURL){
      frameLayerCtx.clearRect(0, 0, CFG.WORK_W, CFG.WORK_H);
      resolve();
      return;
    }
    const im = new Image();
    im.onload = () => {
      frameLayerCtx.clearRect(0, 0, CFG.WORK_W, CFG.WORK_H);
      frameLayerCtx.drawImage(im, 0, 0, CFG.WORK_W, CFG.WORK_H);
      resolve();
    };
    im.onerror = () => resolve();
    im.src = dataURL;
  });
}

// ============================================================
// FRAME LAYER HISTORY (FRAMEレイヤー独立 Undo/Redo)
// ============================================================
const flHistory = [];
let flHistIdx = -1;
const FL_HIST_MAX = 20;

function pushFrameLayerHistory(){
  // 現在のframeLayerCtxピクセルをスナップ
  const snap = frameLayerCtx.getImageData(0, 0, CFG.WORK_W, CFG.WORK_H);
  if(flHistIdx < flHistory.length - 1) flHistory.splice(flHistIdx + 1);
  flHistory.push(snap);
  if(flHistory.length > FL_HIST_MAX) flHistory.shift();
  flHistIdx = flHistory.length - 1;
  scheduleFrameLayerSave();
}
function undoFrameLayer(){
  if(flHistIdx <= 0) return;
  flHistIdx--;
  frameLayerCtx.putImageData(flHistory[flHistIdx], 0, 0);
  scheduleFrameLayerSave();
}
function redoFrameLayer(){
  if(flHistIdx >= flHistory.length - 1) return;
  flHistIdx++;
  frameLayerCtx.putImageData(flHistory[flHistIdx], 0, 0);
  scheduleFrameLayerSave();
}

// ============================================================
// FRAME SELECTION (複数選択 + コピペ)
// ============================================================
let frameClipboard = null; // {frames:[{kind,duration,hidden,drawData(Uint8ClampedArray|null)}]}

function toggleFrameSelection(id){
  if(state.selectedFrameIds.has(id)) state.selectedFrameIds.delete(id);
  else state.selectedFrameIds.add(id);
  refreshSelectionUI();
}
function clearFrameSelection(){
  if(state.selectedFrameIds.size === 0) return;
  state.selectedFrameIds.clear();
  refreshSelectionUI();
}
function pruneSelection(){
  // 削除されたフレームIDをセットから除去
  const live = new Set(state.frames.map(f => f.id));
  for(const id of Array.from(state.selectedFrameIds)){
    if(!live.has(id)) state.selectedFrameIds.delete(id);
  }
}
function refreshSelectionUI(){
  document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const f = state.frames[idx];
    if(!f) return;
    el.classList.toggle('selected', state.selectedFrameIds.has(f.id));
  });
}
function getSelectedIndices(){
  // selectedFrameIds → 昇順index配列
  const out = [];
  state.frames.forEach((f, i) => {
    if(state.selectedFrameIds.has(f.id)) out.push(i);
  });
  return out;
}

function copySelectedFrames(){
  const indices = getSelectedIndices();
  // 選択がなければ currentFrame をコピー
  const targets = indices.length > 0 ? indices : [state.currentFrame];
  // 編集中のフレームを最新化
  const cur = curFrame();
  if(cur) syncFrameFromCanvas(cur);
  frameClipboard = {
    frames: targets.map(i => {
      const f = state.frames[i];
      if(f.kind === 'empty'){
        return { kind: 'empty', duration: f.duration };
      }
      return {
        kind: 'draw',
        duration: f.duration,
        hidden: !!f.hidden,
        drawData: f.drawData ? new Uint8ClampedArray(f.drawData) : null,
      };
    }),
  };
}

function pasteFramesAfterCurrent(){
  if(!frameClipboard || !frameClipboard.frames.length) return;
  // 現フレームを最新化
  const cur = curFrame();
  if(cur) syncFrameFromCanvas(cur);
  const insertAt = state.currentFrame + 1;
  const newFrames = frameClipboard.frames.map(cf => {
    if(cf.kind === 'empty'){
      const ef = createBlankFrame();
      ef.kind = 'empty';
      ef.drawData = null;
      ef.duration = cf.duration;
      return ef;
    }
    const f = createBlankFrame();
    f.duration = cf.duration;
    f.hidden = cf.hidden;
    if(cf.drawData){
      f.drawData = new Uint8ClampedArray(cf.drawData);
      // サムネ更新
      const tmp = document.createElement('canvas');
      tmp.width = CFG.WORK_W; tmp.height = CFG.WORK_H;
      const tctx = tmp.getContext('2d');
      tctx.putImageData(new ImageData(new Uint8ClampedArray(f.drawData), CFG.WORK_W, CFG.WORK_H), 0, 0);
      const tc = f.thumbCanvas.getContext('2d');
      tc.imageSmoothingEnabled = false;
      tc.fillStyle = '#fff';
      tc.fillRect(0, 0, CFG.THUMB_W, CFG.THUMB_H);
      tc.drawImage(tmp, 0, 0, CFG.THUMB_W, CFG.THUMB_H);
    }
    f.dirty = true;
    state.pendingSaveFrames.add(f.id);
    return f;
  });
  state.frames.splice(insertAt, 0, ...newFrames);
  // 貼り付けたフレームを新たな選択にして、最初をcurrentに
  state.selectedFrameIds = new Set(newFrames.map(f => f.id));
  state.currentFrame = insertAt;
  enforceMaxDuration();
  loadFrameToCanvas(curFrame());
  buildStrip();
  updateDurInfo();
  updateTimeTrack();
  scheduleSave();
  pushTimelineHistory();
}

// 選択フレームを insertIdx へ一括移動。元位置は同 duration の empty 置換（長さ維持）
function moveSelectedFrames(insertIdx){
  const indices = getSelectedIndices();
  if(indices.length === 0) return;
  // 編集中フレームを最新化
  const cur = curFrame();
  if(cur) syncFrameFromCanvas(cur);
  // 移動するフレーム参照を集める
  const moving = indices.map(i => state.frames[i]);
  // 元位置を同 duration の empty に置換（length 不変なので insertIdx 有効）
  for(const i of indices){
    const f = state.frames[i];
    const ef = createBlankFrame();
    ef.kind = 'empty';
    ef.drawData = null;
    ef.duration = f.duration;
    state.frames[i] = ef;
  }
  // 挿入
  state.frames.splice(insertIdx, 0, ...moving);
  // 移動後の新先頭を current に
  state.currentFrame = insertIdx;
  loadFrameToCanvas(curFrame());
  buildStrip();
  if(typeof updateStripUI === 'function') updateStripUI();
  if(typeof updateFramePos === 'function') updateFramePos();
  updateDurInfo();
  updateTimeTrack();
  if(typeof markMetaDirty === 'function') markMetaDirty();
  scheduleSave();
  pushTimelineHistory();
}

async function deleteSelectedFrames(){
  const indices = getSelectedIndices();
  if(indices.length === 0){
    return deleteCurrentFrame();
  }
  // 後ろから削除（drawは empty 化、empty は splice）
  // deleteCurrentFrame と同じ振る舞いを再現するため、各idxにフォーカスを移して個別削除
  // 末尾から削除すると state.currentFrame が安定
  indices.sort((a,b) => b - a);
  state.selectedFrameIds.clear();
  for(const i of indices){
    state.currentFrame = i;
    await deleteCurrentFrame();
  }
}

// ツール現在サイズ取得（ツールに応じて切替）
function currentToolSize(){
  return state.tool === 'erase' ? state.eraseSize : state.penSize;
}

let frameIdCounter = 0;
function newFrameId(){ return ++frameIdCounter; }

// ============================================================
// DOM
// ============================================================
const stage      = document.getElementById('stage');
const wrap       = document.getElementById('canvas-wrap');
const bgCanvas   = document.getElementById('bg-layer');
const drawCanvas = document.getElementById('draw-layer');
const onionPrev  = document.getElementById('onion-prev');
const onionNext  = document.getElementById('onion-next');
const frameLayerCanvas = document.getElementById('frame-layer');
const bgCtx      = bgCanvas.getContext('2d');
const drawCtx    = drawCanvas.getContext('2d', { willReadFrequently: true });
const onionPrevCtx = onionPrev.getContext('2d');
const onionNextCtx = onionNext.getContext('2d');
const frameLayerCtx = frameLayerCanvas.getContext('2d', { willReadFrequently: true });

// 内部解像度設定
function setupCanvas(){
  [bgCanvas, drawCanvas, onionPrev, onionNext, frameLayerCanvas].forEach(c => {
    c.width  = CFG.WORK_W;
    c.height = CFG.WORK_H;
  });
  // 背景白
  bgCtx.fillStyle = '#fff';
  bgCtx.fillRect(0, 0, CFG.WORK_W, CFG.WORK_H);
  // アンチエイリアスOFF
  [drawCtx, bgCtx, onionPrevCtx, onionNextCtx, frameLayerCtx].forEach(c => {
    c.imageSmoothingEnabled = false;
  });
}
setupCanvas();

// ============================================================
// FIT / ZOOM
// ============================================================
function fitToStage(){
  const sw = stage.clientWidth;
  const sh = stage.clientHeight;
  const margin = 24;
  const scale = Math.min(
    (sw - margin * 2) / CFG.WORK_W,
    (sh - margin * 2) / CFG.WORK_H
  );
  state.zoom = scale;
  state.fitMode = true;
  state.panX = 0;
  state.panY = 0;
  applyZoom();
}
function applyZoom(){
  const w = CFG.WORK_W * state.zoom;
  const h = CFG.WORK_H * state.zoom;
  wrap.style.width  = w + 'px';
  wrap.style.height = h + 'px';
  // パンによるオフセット (中央配置 + pan) + 表示反転
  const sx = state.flipped ? -1 : 1;
  wrap.style.transform = `translate(${state.panX}px, ${state.panY}px) scaleX(${sx})`;
  wrap.style.transformOrigin = '50% 50%';
  [bgCanvas, drawCanvas, onionPrev, onionNext, frameLayerCanvas].forEach(c => {
    c.style.width  = w + 'px';
    c.style.height = h + 'px';
  });
  document.getElementById('info-zoom').textContent =
    state.fitMode ? 'FIT' : Math.round(state.zoom*100)+'%';
  document.getElementById('zoom-val').textContent =
    Math.round(state.zoom*100)+'%';
  updateMirrorGuide();
}

// ミラー軸ガイドラインをズーム・パン・flipに追従させる
function updateMirrorGuide(){
  const guide = document.getElementById('mirror-guide');
  if(!guide) return;
  if(!state.mirrorOn){ guide.style.display = 'none'; return; }
  guide.style.display = 'block';
  // canvas-wrap の画面上の bounding rect から軸の screen X を計算
  const stageRect = stage.getBoundingClientRect();
  const wrapRect  = wrap.getBoundingClientRect();
  let screenX;
  if(state.flipped){
    // flip時: mirrorAxisX は canvas右から数える
    screenX = wrapRect.right - state.mirrorAxisX * state.zoom;
  } else {
    screenX = wrapRect.left + state.mirrorAxisX * state.zoom;
  }
  const guideLeft = screenX - stageRect.left;
  guide.style.left = guideLeft + 'px';
  guide.style.transform = 'none';
}

// ============================================================
// COORDINATE TRANSFORM
// 画面座標 → キャンバス座標（整数）
// ============================================================
function toCanvasCoord(clientX, clientY){
  const r = drawCanvas.getBoundingClientRect();
  let x = (clientX - r.left) / r.width  * CFG.WORK_W;
  const y = (clientY - r.top)  / r.height * CFG.WORK_H;
  // 表示反転中はx座標を反転
  if(state.flipped) x = CFG.WORK_W - 1 - x;
  // 整数化（アンチエイリアスOFFのため）
  return { x: Math.floor(x), y: Math.floor(y) };
}

// ミラー描画用: x座標を軸で反転（キャンバス範囲内にクランプ）
function mirrorX(x){
  const axis = state.mirrorAxisX || (CFG.WORK_W / 2);
  return Math.max(0, Math.min(CFG.WORK_W - 1, Math.round(axis * 2 - x)));
}

// ============================================================
// PIXEL DRAWING (アンチエイリアスOFF)
// ============================================================

// 1pxドット（中心1pxのみ）
function drawDot1(ctx, x, y, color){
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 1, 1);
}
// 2pxドット（2x2正方形）
function drawDot2(ctx, x, y, color){
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 2, 2);
}
// 20pxドット（円形、ピクセル単位）
function drawDot20(ctx, x, y, color){
  ctx.fillStyle = color;
  const r = 10;
  // 整数ピクセルで円を埋める
  for(let dy = -r; dy < r; dy++){
    for(let dx = -r; dx < r; dx++){
      // 中心からの距離。dx+0.5, dy+0.5 でピクセル中心
      const ddx = dx + 0.5, ddy = dy + 0.5;
      if(ddx*ddx + ddy*ddy <= r*r){
        ctx.fillRect(x + dx, y + dy, 1, 1);
      }
    }
  }
}

function drawDot(ctx, x, y, size, color){
  if(size === 1) drawDot1(ctx, x, y, color);
  else if(size === 2) drawDot2(ctx, x, y, color);
  else drawDot20(ctx, x, y, color);
}

// ブレゼンハム直線で2点間を補間
function drawLine(ctx, x0, y0, x1, y1, size, color){
  const dx = Math.abs(x1 - x0);
  const dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1;
  const sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  let x = x0, y = y0;
  while(true){
    drawDot(ctx, x, y, size, color);
    if(x === x1 && y === y1) break;
    const e2 = 2 * err;
    if(e2 > -dy){ err -= dy; x += sx; }
    if(e2 <  dx){ err += dx; y += sy; }
  }
}

// ============================================================
// ERASER (消しゴム = 透明クリア)
// ============================================================
function eraseDot(ctx, x, y, size){
  if(size === 1){
    ctx.clearRect(x, y, 1, 1);
  } else if(size === 2){
    ctx.clearRect(x, y, 2, 2);
  } else {
    const r = 10;
    for(let dy = -r; dy < r; dy++){
      for(let dx = -r; dx < r; dx++){
        const ddx = dx + 0.5, ddy = dy + 0.5;
        if(ddx*ddx + ddy*ddy <= r*r){
          ctx.clearRect(x + dx, y + dy, 1, 1);
        }
      }
    }
  }
}
function eraseLine(ctx, x0, y0, x1, y1, size){
  const dx = Math.abs(x1 - x0);
  const dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1;
  const sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  let x = x0, y = y0;
  while(true){
    eraseDot(ctx, x, y, size);
    if(x === x1 && y === y1) break;
    const e2 = 2 * err;
    if(e2 > -dy){ err -= dy; x += sx; }
    if(e2 <  dx){ err += dx; y += sy; }
  }
}

// ============================================================
// FLOOD FILL
// 描画レイヤーに対するスキャンラインフィル
// targetColorと一致するピクセルをfillColorに置換
// ============================================================
function floodFill(startX, startY, fillHex){
  if(startX < 0 || startY < 0 || startX >= CFG.WORK_W || startY >= CFG.WORK_H) return;
  const ctx = activeDrawCtx();
  const img = ctx.getImageData(0, 0, CFG.WORK_W, CFG.WORK_H);
  const data = img.data;
  const W = CFG.WORK_W, H = CFG.WORK_H;
  const idx = (x,y) => (y * W + x) * 4;
  const startI = idx(startX, startY);
  const tR = data[startI], tG = data[startI+1], tB = data[startI+2], tA = data[startI+3];
  // 塗る色
  const fc = hexToRgb(fillHex);
  // 既に同色なら何もしない
  if(tR === fc.r && tG === fc.g && tB === fc.b && tA === 255) return;
  // スキャンライン
  const stack = [[startX, startY]];
  const matches = (i) =>
    data[i] === tR && data[i+1] === tG && data[i+2] === tB && data[i+3] === tA;
  while(stack.length){
    const [x, y] = stack.pop();
    let lx = x;
    while(lx >= 0 && matches(idx(lx,y))) lx--;
    lx++;
    let spanAbove = false, spanBelow = false;
    while(lx < W && matches(idx(lx,y))){
      const i = idx(lx,y);
      data[i] = fc.r; data[i+1] = fc.g; data[i+2] = fc.b; data[i+3] = 255;
      if(y > 0){
        if(matches(idx(lx, y-1))){
          if(!spanAbove){ stack.push([lx, y-1]); spanAbove = true; }
        } else spanAbove = false;
      }
      if(y < H-1){
        if(matches(idx(lx, y+1))){
          if(!spanBelow){ stack.push([lx, y+1]); spanBelow = true; }
        } else spanBelow = false;
      }
      lx++;
    }
  }
  ctx.putImageData(img, 0, 0);
}

function hexToRgb(hex){
  const h = hex.replace('#','');
  return {
    r: parseInt(h.substr(0,2), 16),
    g: parseInt(h.substr(2,2), 16),
    b: parseInt(h.substr(4,2), 16),
  };
}

// ============================================================
// HISTORY (Undo/Redo) — カレントフレーム単位
// ImageDataのスナップショット方式
// ============================================================
function snapshot(){
  return drawCtx.getImageData(0, 0, CFG.WORK_W, CFG.WORK_H);
}
function restoreSnap(snap){
  drawCtx.putImageData(snap, 0, 0);
}
// カレントセル取得（フレーム or 空）
function curFrame(){ return state.frames[state.currentFrame]; }
// 「描画フレーム」のみが必要な箇所で使う
function curDrawFrame(){
  const f = curFrame();
  return (f && f.kind === 'draw') ? f : null;
}

function pushHistory(){
  const f = curDrawFrame();
  if(!f) return;
  if(f.histIdx < f.history.length - 1){
    f.history = f.history.slice(0, f.histIdx + 1);
  }
  f.history.push(snapshot());
  if(f.history.length > CFG.HISTORY_MAX){
    f.history.shift();
  }
  f.histIdx = f.history.length - 1;
  f.strokeCount++;
  syncFrameFromCanvas(f);
  updateStats();
  markFrameDirty(f);
  state.lastEditWas = 'canvas'; // キャンバス操作を記録
}

// ============================================================
// TIMELINE UNDO/REDO
// ============================================================
const tlHistory = [];   // タイムライン操作履歴
let tlHistIdx = -1;     // 現在位置
const TL_HIST_MAX = 20;

// 現在のタイムライン状態をスナップショット（drawDataはref、historyはshallow copy）
function snapshotTL(){
  return state.frames.map(f => {
    const s = {
      id: f.id, kind: f.kind, duration: f.duration, hidden: !!f.hidden,
    };
    if(f.kind === 'draw'){
      s.drawData    = f.drawData;          // syncFrameFromCanvas が新Array割当するので参照で安全
      s.thumbCanvas = f.thumbCanvas;
      s.history     = (f.history || []).slice(); // shallow copy（各snap自体は不変）
      s.histIdx     = f.histIdx;
      s.strokeCount = f.strokeCount || 0;
    }
    return s;
  });
}

// タイムライン操作後に呼ぶ（AFTER変更）
function pushTimelineHistory(){
  if(tlHistIdx < tlHistory.length - 1) tlHistory.splice(tlHistIdx + 1);
  tlHistory.push(snapshotTL());
  if(tlHistory.length > TL_HIST_MAX) tlHistory.shift();
  tlHistIdx = tlHistory.length - 1;
  state.lastEditWas = 'timeline';
}

function restoreTL(snap){
  state.frames = snap.map(s => {
    if(s.kind === 'empty'){
      return { id: s.id, kind: 'empty', duration: s.duration, dirty: true };
    }
    return {
      id: s.id, kind: 'draw',
      duration: s.duration, hidden: s.hidden,
      drawData: s.drawData, thumbCanvas: s.thumbCanvas,
      history: (s.history || []).slice(), histIdx: s.histIdx,
      strokeCount: s.strokeCount || 0, dirty: true,
    };
  });
  state.currentFrame = Math.min(state.currentFrame, Math.max(0, state.frames.length - 1));
  const cf = state.frames[state.currentFrame];
  if(cf) loadFrameToCanvas(cf);
  ensureWorkAreaValid();
  buildStrip();
  updateStripUI();
  updateFramePos();
  updateDurInfo();
  updateTimeTrack();
  updateOnion();
  scheduleSave();
}

function undoTimeline(){
  if(tlHistIdx <= 0) return;
  tlHistIdx--;
  restoreTL(tlHistory[tlHistIdx]);
}
function redoTimeline(){
  if(tlHistIdx >= tlHistory.length - 1) return;
  tlHistIdx++;
  restoreTL(tlHistory[tlHistIdx]);
}

function undo(){
  // FRAMEレイヤー編集中は専用履歴を使う
  if(state.frameLayer.editMode){
    undoFrameLayer();
    return;
  }
  if(state.lastEditWas === 'timeline'){
    undoTimeline();
  } else {
    const f = curDrawFrame();
    if(f && f.histIdx > 0){
      f.histIdx--;
      restoreSnap(f.history[f.histIdx]);
      syncFrameFromCanvas(f);
      updateStats();
      markFrameDirty(f);
    } else {
      undoTimeline();
    }
  }
}
function redo(){
  if(state.frameLayer.editMode){
    redoFrameLayer();
    return;
  }
  if(state.lastEditWas === 'timeline'){
    redoTimeline();
  } else {
    const f = curDrawFrame();
    if(f && f.histIdx < (f.history?.length || 0) - 1){
      f.histIdx++;
      restoreSnap(f.history[f.histIdx]);
      syncFrameFromCanvas(f);
      updateStats();
      markFrameDirty(f);
    } else {
      redoTimeline();
    }
  }
}
function updateStats(){
  const f = curDrawFrame();
  if(!f){
    document.getElementById('hist-count').textContent = '0';
    document.getElementById('stroke-count').textContent = '0';
    return;
  }
  document.getElementById('hist-count').textContent = f.histIdx + 1;
  document.getElementById('stroke-count').textContent = f.strokeCount;
}

// ============================================================
// FRAME MANAGEMENT
// ============================================================

// 新規描画フレーム
function createBlankFrame(){
  const id = newFrameId();
  const drawData = new Uint8ClampedArray(CFG.WORK_W * CFG.WORK_H * 4);
  const thumbCanvas = document.createElement('canvas');
  thumbCanvas.width = CFG.THUMB_W;
  thumbCanvas.height = CFG.THUMB_H;
  return {
    id,
    kind: 'draw',
    drawData, thumbCanvas,
    duration: 2,
    history: [],
    histIdx: -1,
    strokeCount: 0,
    dirty: true,
    hidden: false,  // 非表示フラグ
  };
}

// 新規空ブロック
function createEmptyBlock(duration = 1){
  return {
    id: newFrameId(),
    kind: 'empty',
    duration,
    dirty: true,
  };
}

// drawCanvasの内容をフレームに同期（drawフレームのみ）
function syncFrameFromCanvas(frame){
  if(!frame || frame.kind !== 'draw') return;
  const img = drawCtx.getImageData(0, 0, CFG.WORK_W, CFG.WORK_H);
  frame.drawData = new Uint8ClampedArray(img.data);
  const tc = frame.thumbCanvas.getContext('2d');
  tc.imageSmoothingEnabled = false;
  tc.fillStyle = '#fff';
  tc.fillRect(0, 0, CFG.THUMB_W, CFG.THUMB_H);
  tc.drawImage(drawCanvas, 0, 0, CFG.THUMB_W, CFG.THUMB_H);
}

// フレーム→キャンバス。空ブロックの場合は白紙に
function loadFrameToCanvas(frame){
  if(!frame) return;
  if(frame.kind === 'empty'){
    drawCtx.clearRect(0, 0, CFG.WORK_W, CFG.WORK_H);
    return;
  }
  const img = new ImageData(
    new Uint8ClampedArray(frame.drawData),
    CFG.WORK_W, CFG.WORK_H
  );
  drawCtx.putImageData(img, 0, 0);
  if(frame.history.length === 0){
    frame.history.push(snapshot());
    frame.histIdx = 0;
  }
}

// 空ブロックを描画フレームに昇格させる
// 描画開始時に呼ばれる
function promoteEmptyToFrame(idx){
  const e = state.frames[idx];
  if(!e || e.kind !== 'empty') return null;
  const newF = createBlankFrame();
  newF.duration = e.duration;
  state.frames[idx] = newF;
  state.pendingSaveFrames.delete(e.id);
  state.pendingSaveFrames.add(newF.id);
  // IndexedDBから旧emptyを削除（保存されてた場合）
  if(db){
    try {
      const tx = db.transaction(CFG.STORE_FRAMES, 'readwrite');
      tx.objectStore(CFG.STORE_FRAMES).delete(e.id);
    } catch(err){}
  }
  return newF;
}

// フレーム切替
// 描画中でも安全に切り替え可能
function switchToFrame(idx){
  if(idx < 0 || idx >= state.frames.length) return;
  if(idx === state.currentFrame && state.frames[idx]){
    // 念のため再描画は行う
  }
  // 描画中ならまずストロークを確定
  if(drawing){
    endStroke();
  }
  // カレントフレームの最新状態を保存
  const cur = curFrame();
  if(cur) syncFrameFromCanvas(cur);

  state.currentFrame = idx;
  const f = state.frames[idx];
  loadFrameToCanvas(f);
  updateStripUI();
  updateOnion();
  updateStats();
  updateFramePos();
  updateDurInfo();
  updateTimeTrack();
}

// フレーム追加（カレントの直後）
function addFrame(copyFromCurrent = false){
  const newF = createBlankFrame();
  const insertAt = state.currentFrame + 1;
  if(copyFromCurrent && curFrame()){
    // 現在のフレームの内容をコピー
    const src = curFrame();
    syncFrameFromCanvas(src); // 念のため最新を吸い上げ
    newF.drawData = new Uint8ClampedArray(src.drawData);
    // サムネイルも複製
    const tc = newF.thumbCanvas.getContext('2d');
    tc.drawImage(src.thumbCanvas, 0, 0);
    newF.duration = src.duration;
  }
  state.frames.splice(insertAt, 0, newF);
  newF.dirty = true;
  state.pendingSaveFrames.add(newF.id);
  // ワークエリア更新（新規追加で範囲が伸びた場合）
  if(state.workEnd === totalTicks() - newF.duration){
    state.workEnd = totalTicks();
  }
  ensureWorkAreaValid();
  buildStrip();
  switchToFrame(insertAt);
  scrollFrameIntoView(insertAt);
  scheduleSave();
  pushTimelineHistory(); // タイムライン操作記録
}

// 現在フレーム削除
async function deleteCurrentFrame(){
  // 確認ダイアログなし版
  if(state.frames.length <= 1){
    await modalAlert('最低1フレーム必要です。');
    return;
  }
  // 確認なし即削除：描画フレームを「空ブロック」に置き換え（タイムライン尺を維持）
  if(drawing) endStroke();
  const removed = state.frames[state.currentFrame];
  if(removed.kind === 'draw'){
    // 空ブロックに変換（drawDataは持たない）
    const emptyBlock = {
      id: removed.id,
      kind: 'empty',
      duration: removed.duration,
      history: [],
      histIdx: -1,
      thumbCanvas: removed.thumbCanvas, // サムネは使わないが保持
    };
    state.frames[state.currentFrame] = emptyBlock;
    // IndexedDBからdrawデータを削除
    if(db){
      try {
        const tx = db.transaction(CFG.STORE_FRAMES, 'readwrite');
        tx.objectStore(CFG.STORE_FRAMES).delete(removed.id);
      } catch(e){ console.warn(e); }
    }
    markMetaDirty();
  } else {
    // 既に空ブロックの場合は完全削除
    state.frames.splice(state.currentFrame, 1);
    if(db){
      try {
        const tx = db.transaction(CFG.STORE_FRAMES, 'readwrite');
        tx.objectStore(CFG.STORE_FRAMES).delete(removed.id);
      } catch(e){ console.warn(e); }
    }
    if(state.currentFrame >= state.frames.length){
      state.currentFrame = state.frames.length - 1;
    }
  }
  // 直接フレームをロード（switchToFrameを使うと削除前の内容がこのフレームに上書きされるバグになる）
  ensureWorkAreaValid();
  buildStrip();
  loadFrameToCanvas(curFrame());
  updateStripUI();
  updateOnion();
  updateStats();
  updateFramePos();
  updateDurInfo();
  updateTimeTrack();
  markMetaDirty();
  pushTimelineHistory(); // タイムライン操作記録
}

// セル幅計算
function cellWidthFor(duration){
  // 1〜3コマは固定幅（仕切り線で表現）
  // 4コマ以上はセル幅を伸ばす
  if(duration <= 3) return state.cellBaseW;
  return state.cellBaseW + (duration - 3) * state.cellStretchPerTick;
}

// タイムライン総コマ数
function totalTicks(){
  return state.frames.reduce((s, f) => s + f.duration, 0);
}
// 最大コマ数（=最大15秒×fps）
function maxTicks(){
  return CFG.MAX_DURATION_SEC * state.fps;
}
// あるidxのフレームの開始ティック
function frameStartTick(idx){
  let t = 0;
  for(let i = 0; i < idx && i < state.frames.length; i++) t += state.frames[i].duration;
  return t;
}
// あるticksに対応する frame index と そのフレーム内オフセットtick
function tickToFrameIdx(tick){
  let acc = 0;
  for(let i = 0; i < state.frames.length; i++){
    if(tick < acc + state.frames[i].duration) return { idx: i, offset: tick - acc };
    acc += state.frames[i].duration;
  }
  return { idx: state.frames.length - 1, offset: 0 };
}
// タイムラインの総ピクセル幅
function timelineTotalPx(){
  let w = 0;
  for(const f of state.frames) w += cellWidthFor(f.duration) + 3; // gap=3
  return w;
}
// あるtickに対応するピクセルx位置
function tickToPx(tick){
  let acc = 0; let pxAcc = 0;
  for(const f of state.frames){
    if(tick <= acc + f.duration){
      const inCell = (tick - acc) / f.duration;
      return pxAcc + cellWidthFor(f.duration) * inCell;
    }
    acc += f.duration;
    pxAcc += cellWidthFor(f.duration) + 3;
  }
  return pxAcc;
}
// あるピクセルxに対応するtick
function pxToTick(px){
  let pxAcc = 0; let tickAcc = 0;
  for(const f of state.frames){
    const w = cellWidthFor(f.duration);
    if(px < pxAcc + w){
      const inCell = Math.max(0, (px - pxAcc) / w);
      return tickAcc + Math.round(inCell * f.duration);
    }
    pxAcc += w + 3;
    tickAcc += f.duration;
  }
  return tickAcc;
}

// ストリップDOM構築
function buildStrip(){
  const strip = document.getElementById('frame-strip');
  strip.innerHTML = '';
  state.frames.forEach((f, i) => {
    const isEmpty = f.kind === 'empty';
    const cell = document.createElement('div');
    cell.className = isEmpty ? 'fc-empty' : 'fc';
    if(i === state.currentFrame) cell.classList.add('active');
    cell.dataset.idx = i;
    cell.style.width = cellWidthFor(f.duration) + 'px';

    if(!isEmpty){
      const thumb = document.createElement('div');
      thumb.className = 'fc-thumb';
      thumb.appendChild(f.thumbCanvas);
      cell.appendChild(thumb);

      // 表示/非表示トグルボタン
      const visBtn = document.createElement('button');
      visBtn.className = 'fc-vis-btn' + (f.hidden ? ' off' : '');
      visBtn.title = f.hidden ? '非表示（タップで表示）' : '表示（タップで非表示）';
      visBtn.textContent = f.hidden ? '✕' : '●';
      visBtn.addEventListener('pointerdown', e => e.stopPropagation());
      visBtn.addEventListener('click', e => {
        e.stopPropagation();
        f.hidden = !f.hidden;
        markFrameDirty(f);
        buildStrip();
      });
      cell.appendChild(visBtn);
      if(f.hidden) cell.classList.add('fc-frame-hidden');

      // 内側仕切り線（duration 2,3用）
      if(f.duration >= 2 && f.duration <= 3){
        const divs = document.createElement('div');
        divs.className = 'fc-divs';
        for(let k = 0; k < f.duration; k++){
          divs.appendChild(document.createElement('span'));
        }
        cell.appendChild(divs);
      }
      // 目盛り（duration 4以上用）
      if(f.duration >= 4){
        const ruler = document.createElement('div');
        ruler.className = 'fc-ruler';
        for(let k = 0; k < f.duration; k++){
          ruler.appendChild(document.createElement('span'));
        }
        cell.appendChild(ruler);
      }
    }

    const meta = document.createElement('div');
    meta.className = 'fc-meta';
    const label = isEmpty ? '空' : String(i+1).padStart(3,'0');
    meta.innerHTML =
      `<span class="fc-num">${label}</span>` +
      `<span class="fc-dur" title="コマ打ち（クリックで変更）">×${f.duration}</span>`;
    cell.appendChild(meta);

    // 右端スクラブハンドル（空でも duration 変更可能）
    const handle = document.createElement('div');
    handle.className = 'fc-handle';
    handle.title = 'ドラッグでコマ打ち変更';
    cell.appendChild(handle);
    setupScrubHandle(handle, cell, f, i);

    // セル本体: タップで切替（or 空→描画フレーム昇格）
    setupCellInteraction(cell, f, i);

    // 選択状態を反映
    if(state.selectedFrameIds && state.selectedFrameIds.has(f.id)){
      cell.classList.add('selected');
    }

    // Shift+クリック → 複数選択トグル
    // Alt+クリック → クリック位置で分割
    cell.addEventListener('click', e => {
      if(e.target.closest('.fc-dur') || e.target.closest('.fc-vis-btn') || e.target.closest('.fc-handle')) return;
      if(e.altKey){
        if(f.kind !== 'draw' || f.duration < 2) return;
        e.stopPropagation();
        const rect = cell.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const ratio = Math.max(0, Math.min(1, x / rect.width));
        const at = Math.round(f.duration * ratio);
        if(state.currentFrame !== i) switchToFrame(i);
        splitCurrentFrame(at);
        return;
      }
      if(e.shiftKey){
        e.stopPropagation();
        toggleFrameSelection(f.id);
        return;
      }
      // 通常クリックは選択をクリア
      if(state.selectedFrameIds && state.selectedFrameIds.size > 0){
        state.selectedFrameIds.clear();
        document.querySelectorAll('#frame-strip .selected').forEach(el => el.classList.remove('selected'));
      }
    }, true);

    // duration変更（クリックでサイクル: 1, 2, 3）
    meta.querySelector('.fc-dur').addEventListener('click', e => {
      e.stopPropagation();
      // 4コマ以上に伸ばされている場合は誤タップ防止のため無効
      if(f.duration > 3) return;
      const cycle = [1, 2, 3];
      const cur = cycle.indexOf(f.duration);
      if(cur === -1){
        f.duration = 1;
      } else {
        f.duration = cycle[(cur + 1) % cycle.length];
      }
      // 全体尺の上限チェック
      enforceMaxDuration();
      markFrameDirty(f);
      buildStrip();
      updateDurInfo();
      updateTimeTrack();
    });

    strip.appendChild(cell);
  });

  // タイムライン末尾の空タッチ領域
  const tail = document.createElement('div');
  tail.className = 'fc-empty-tail';
  tail.innerHTML = '<span class="lbl">+ TAP</span>';
  tail.style.flexGrow = '1';
  tail.style.minWidth = '200px';
  setupEmptyTail(tail);
  strip.appendChild(tail);

  updateScrollThumb();
  updateTimeTrack();
}

// 全体尺が上限超えてないか確認、超えてたら最後のフレームを縮める
function enforceMaxDuration(){
  const max = maxTicks();
  let total = totalTicks();
  if(total <= max) return;
  // 最後のフレームから順に削っていく
  for(let i = state.frames.length - 1; i >= 0 && total > max; i--){
    const reduce = Math.min(state.frames[i].duration - 1, total - max);
    state.frames[i].duration -= reduce;
    total -= reduce;
    markFrameDirty(state.frames[i]);
    if(state.frames[i].duration < 1){
      state.frames[i].duration = 1;
    }
  }
}

// セル本体: タップで切替、長押し＋移動でドラッグ
function setupCellInteraction(cell, frame, idx){
  let dragStart = null;
  let dragging = false;
  let isTouch = false;
  cell.addEventListener('pointerdown', e => {
    if(e.target.classList.contains('fc-dur')) return;
    if(e.target.classList.contains('fc-handle')) return;
    isTouch = (e.pointerType === 'touch');
    // 指の場合: ネイティブスクロールに任せる（preventDefaultしない、capture もしない）
    if(isTouch){
      // タップ判定だけ（短時間+小移動で switchToFrame）
      dragStart = { x: e.clientX, y: e.clientY, t: performance.now(), tap: true };
      dragging = false;
      return;
    }
    // ペン/マウス: 即フレーム切替 + ドラッグ並び替え準備
    e.preventDefault();
    cell.setPointerCapture(e.pointerId);
    dragStart = { x: e.clientX, y: e.clientY, t: performance.now(), tap: false };
    dragging = false;
    handleCellTap(idx);
  });
  cell.addEventListener('pointermove', e => {
    if(!dragStart) return;
    const dx = Math.abs(e.clientX - dragStart.x);
    if(isTouch){
      // 指: 動いたらタップキャンセル
      if(dx > 6) dragStart.tap = false;
      return;
    }
    // ペン/マウス: ドラッグ判定
    if(!dragging && dx > 8){
      dragging = true;
      cell.classList.add('dragging');
    }
    if(dragging){
      const target = findDropTarget(e.clientX);
      document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty').forEach(el => {
        el.classList.remove('drop-target-left', 'drop-target-right');
      });
      if(target && target.cell !== cell){
        target.cell.classList.add(target.before ? 'drop-target-left' : 'drop-target-right');
      }
      // 複数選択中なら他の選択セルも半透明にする
      if(state.selectedFrameIds.has(frame.id) && state.selectedFrameIds.size > 1){
        document.querySelectorAll('#frame-strip .fc.selected, #frame-strip .fc-empty.selected').forEach(el => {
          el.classList.add('dragging');
        });
      }
    }
  });
  cell.addEventListener('pointerup', e => {
    if(!dragStart) return;
    if(isTouch){
      // 指: タップなら切替
      if(dragStart.tap){
        const elapsed = performance.now() - dragStart.t;
        if(elapsed < 400){
          handleCellTap(idx);
        }
      }
      dragStart = null;
      return;
    }
    // ペン/マウス: ドラッグなら並び替え
    if(dragging){
      const target = findDropTarget(e.clientX);
      document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty').forEach(el => {
        el.classList.remove('drop-target-left', 'drop-target-right', 'dragging');
      });
      if(target && target.cell !== cell){
        let toIdx = parseInt(target.cell.dataset.idx);
        if(!target.before) toIdx++;
        // 複数選択中で、ドラッグ元セルが選択に含まれる場合 → 一括移動（元位置にempty）
        if(state.selectedFrameIds.has(frame.id) && state.selectedFrameIds.size > 0){
          moveSelectedFrames(toIdx);
        } else {
          const fromIdx = idx;
          if(toIdx > fromIdx) toIdx--;
          if(toIdx !== fromIdx){
            const [moved] = state.frames.splice(fromIdx, 1);
            state.frames.splice(toIdx, 0, moved);
            state.currentFrame = toIdx;
            buildStrip();
            updateStripUI();
            updateFramePos();
            updateDurInfo();
            markMetaDirty();
            pushTimelineHistory();
          }
        }
      }
    }
    dragStart = null;
    dragging = false;
  });
  cell.addEventListener('pointercancel', () => {
    dragStart = null;
    dragging = false;
    cell.classList.remove('dragging');
    document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty').forEach(el => {
      el.classList.remove('drop-target-left', 'drop-target-right');
    });
  });
}

// セルがタップされたときの処理（描画フレーム=切替、空=昇格）
function handleCellTap(idx){
  const f = state.frames[idx];
  if(!f) return;
  if(f.kind === 'empty'){
    // 空ブロックを描画フレームに昇格
    promoteEmptyToFrame(idx);
    buildStrip();
    switchToFrame(idx);
    markMetaDirty();
    scheduleSave();
  } else {
    switchToFrame(idx);
  }
}

// ドロップ位置検索: pointerのclientXからどのセル境界かを判定
function findDropTarget(clientX){
  const cells = document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty');
  for(const c of cells){
    const r = c.getBoundingClientRect();
    if(clientX >= r.left && clientX <= r.right){
      return { cell: c, before: clientX < r.left + r.width / 2 };
    }
  }
  return null;
}

// スクラブハンドル: ドラッグでduration増減
function setupScrubHandle(handle, cell, frame, idx){
  let scrubStart = null;
  handle.addEventListener('pointerdown', e => {
    e.stopPropagation();
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    handle.classList.add('active');
    scrubStart = {
      x: e.clientX,
      origDur: frame.duration,
      origCellW: cellWidthFor(frame.duration),
    };
  });
  handle.addEventListener('pointermove', e => {
    if(!scrubStart) return;
    const dx = e.clientX - scrubStart.x;
    let newDur = scrubStart.origDur + Math.round(dx / state.cellStretchPerTick);
    newDur = Math.max(1, Math.min(120, newDur));
    // 上限: 全体15秒
    const otherTicks = totalTicks() - frame.duration;
    const allowedMax = Math.min(120, maxTicks() - otherTicks);
    if(newDur > allowedMax) newDur = allowedMax;
    if(newDur !== frame.duration){
      frame.duration = newDur;
      cell.style.width = cellWidthFor(newDur) + 'px';
      const durEl = cell.querySelector('.fc-dur');
      if(durEl) durEl.textContent = '×' + newDur;
    }
  });
  function endScrub(e){
    if(!scrubStart) return;
    const changed = frame.duration !== scrubStart.origDur;
    scrubStart = null;
    handle.classList.remove('active');
    buildStrip();
    markFrameDirty(frame);
    if(changed) pushTimelineHistory(); // 変更があった場合のみ記録
    updateDurInfo();
    updateTimeTrack();
  }
  handle.addEventListener('pointerup', endScrub);
  handle.addEventListener('pointercancel', endScrub);
}

// 末尾の空タッチ領域: 任意位置タッチで「前フレームを伸ばす + 新フレーム」
function setupEmptyTail(tail){
  tail.addEventListener('pointerdown', e => {
    // 指でのタップは無効（ネイティブスクロール優先・誤動作防止）
    if(e.pointerType === 'touch') return;
    e.preventDefault();
    const tailRect = tail.getBoundingClientRect();
    const xInTail = e.clientX - tailRect.left;
    const existingTicks = totalTicks();
    // tail 内の 1コマあたりの想定幅
    const ticksInTail = Math.max(1, Math.round(xInTail / state.cellStretchPerTick));
    let targetTicks = existingTicks + ticksInTail;
    // 上限チェック
    const max = maxTicks();
    if(targetTicks > max) targetTicks = max;
    if(targetTicks <= existingTicks){
      // 余裕がない場合: 上限到達
      return;
    }
    // 前のフレーム/ブロックの duration を伸ばす
    const last = state.frames[state.frames.length - 1];
    if(last){
      const needed = targetTicks - existingTicks;
      // needed-1 を前のフレームに足し、1コマを新フレームに
      last.duration += Math.max(0, needed - 1);
      markFrameDirty(last);
    }
    // 新フレーム1コマ分追加（描画開始位置）
    const newF = createBlankFrame();
    newF.duration = 1;
    state.frames.push(newF);
    newF.dirty = true;
    state.pendingSaveFrames.add(newF.id);
    // ワークエリアを末尾まで広げる
    if(state.workEnd >= existingTicks){
      state.workEnd = totalTicks();
    }
    ensureWorkAreaValid();
    buildStrip();
    switchToFrame(state.frames.length - 1);
    scrollFrameIntoView(state.frames.length - 1);
    scheduleSave();
  });
}

function updateStripUI(){
  document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    el.classList.toggle('active', idx === state.currentFrame);
  });
}

function updateFramePos(){
  // IN = 現在フレームの開始ティック（1始まり表記）
  const inTick  = state.frames.slice(0, state.currentFrame).reduce((s, f) => s + f.duration, 0);
  // OUT = 現在フレームの終端ティック
  const outTick = inTick + (state.frames[state.currentFrame]?.duration || 1);
  const inSec   = (inTick  / state.fps).toFixed(2);
  const outSec  = (outTick / state.fps).toFixed(2);
  const inEl = document.getElementById('frame-in');
  if(inEl) inEl.textContent = String(inTick + 1).padStart(3,'0');
  document.getElementById('frame-pos').textContent =
    String(outTick).padStart(3,'0') + 'コマ / ' + outSec + 's';
}

// 全体時間と現在時間表示
function fmtTimeMs(ms){
  const sec = Math.floor(ms/1000);
  const mm = String(Math.floor(sec/60)).padStart(2,'0');
  const ss = String(sec%60).padStart(2,'0');
  const cs = String(Math.floor((ms%1000)/10)).padStart(2,'0');
  return `${mm}:${ss}.${cs}`;
}
function ticksToMs(ticks){
  return Math.round(ticks / state.fps * 1000);
}
function updateDurInfo(){
  const total = totalTicks();
  const totalSec = (total / state.fps).toFixed(2);
  if(state.timeUnit === 'frames'){
    document.getElementById('dur-info').textContent =
      `${String(total).padStart(3,'0')} コマ`;
  } else {
    document.getElementById('dur-info').textContent =
      `${totalSec} s`;
  }
}

function scrollFrameIntoView(idx){
  const cell = document.querySelector(`#frame-strip [data-idx="${idx}"]`);
  if(cell && typeof cell.scrollIntoView === 'function') {
    cell.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
  }
}

// ============================================================
// TIME TRACK (時間メモリ + ワークエリア)
// ============================================================
function updateTimeTrack(){
  const inner = document.getElementById('time-track-inner');
  if(!inner) return;
  const totalPx = timelineTotalPx();
  inner.style.width = totalPx + 'px';
  // 既存の目盛を削除して再構築
  inner.querySelectorAll('.time-tick').forEach(el => el.remove());

  const total = totalTicks();
  const fps = state.fps;
  // ズームレベルに応じて小目盛間隔を変える（1コマ単位まで対応）
  const pxPerTick = state.cellStretchPerTick;
  let minorEvery;
  if(pxPerTick >= 12)     minorEvery = 1;   // 1コマ単位
  else if(pxPerTick >= 5) minorEvery = 3;   // 3コマ単位
  else                    minorEvery = 6;   // 6コマ単位
  // メジャーラベル間隔を画面密度に合わせて自動選択 (1k=1コマ仕様, 24k=1s)
  // 最低 50px 間隔でラベルが出るよう [1,3,6,12,24,48,96,192] から選択
  const minLabelPx = 50;
  const majorCandidates = [1, 3, 6, 12, 24, 48, 96, 192];
  let majorEvery = 24;
  for(const m of majorCandidates){
    if(m * pxPerTick >= minLabelPx){ majorEvery = m; break; }
  }
  // sub-major (半major) — 最低 24px 確保できれば
  let subMajor = 0;
  for(const m of majorCandidates){
    if(m < majorEvery && m * pxPerTick >= 24 && majorEvery % m === 0){ subMajor = m; }
  }

  for(let t = minorEvery; t <= total; t += minorEvery){
    const x = tickToPx(t);
    const tick = document.createElement('div');
    tick.className = 'time-tick';
    if(t % majorEvery === 0){
      tick.classList.add('major');
      if(state.timeUnit === 'frames'){
        tick.textContent = t + 'k'; // 1コマ=1k (24k=1s @24fps)
      } else {
        const s = t / fps;
        tick.textContent = s < 10 ? s.toFixed(1) + 's' : Math.round(s) + 's';
      }
    } else if(subMajor > 0 && t % subMajor === 0){
      tick.classList.add('tick-sec'); // sub-major (薄ラベルなし)
    }
    tick.style.left = x + 'px';
    inner.appendChild(tick);
  }
  // ワークエリア配置
  const workArea = document.getElementById('work-area');
  if(workArea){
    const sx = tickToPx(state.workStart);
    const ex = tickToPx(state.workEnd);
    workArea.style.left = sx + 'px';
    workArea.style.width = Math.max(0, ex - sx) + 'px';
  }
  // タイムラインカーソル
  const cursor = document.getElementById('timeline-cursor');
  if(cursor){
    const curT = state.frames.slice(0, state.currentFrame).reduce((s, f) => s + f.duration, 0);
    cursor.style.left = tickToPx(curT) + 'px';
  }
  syncTimeTrackScroll();
}

// ストリップのscrollLeftと time-track-inner を同期
// strip-wrap（strip-prevの右隣）の左端に合わせてオフセットを計算
function syncTimeTrackScroll(){
  const strip = document.getElementById('frame-strip');
  const inner = document.getElementById('time-track-inner');
  const track = document.getElementById('time-track');
  const stripWrap = document.getElementById('strip-wrap');
  if(!strip || !inner) return;
  // strip-wrap の左端 - time-track の左端 + frame-strip の padding-left(4px)
  let offsetLeft = 28; // デフォルト: strip-prev(24px) + padding(4px)
  if(track && stripWrap){
    const tRect = track.getBoundingClientRect();
    const wRect = stripWrap.getBoundingClientRect();
    offsetLeft = Math.round(wRect.left - tRect.left) + 4;
  }
  inner.style.left = offsetLeft + 'px';
  inner.style.transform = `translateX(${-strip.scrollLeft}px)`;
}

// ============================================================
// ONION SKIN
// 前後フレームを半透明で表示
// ============================================================
function updateOnion(){
  if(!state.onionOn){
    onionPrevCtx.clearRect(0,0,CFG.WORK_W,CFG.WORK_H);
    onionNextCtx.clearRect(0,0,CFG.WORK_W,CFG.WORK_H);
    return;
  }
  // 前: drawフレームのみを探す（空ブロック・非表示は飛ばす）
  onionPrevCtx.clearRect(0,0,CFG.WORK_W,CFG.WORK_H);
  let prevDraw = null;
  for(let i = state.currentFrame - 1; i >= 0; i--){
    if(state.frames[i].kind === 'draw' && !state.frames[i].hidden){ prevDraw = state.frames[i]; break; }
  }
  if(prevDraw){
    const img = new ImageData(
      tintImageData(prevDraw.drawData, 220, 60, 60),
      CFG.WORK_W, CFG.WORK_H
    );
    onionPrevCtx.putImageData(img, 0, 0);
  }
  // 後: drawフレームのみを探す（非表示は飛ばす）
  onionNextCtx.clearRect(0,0,CFG.WORK_W,CFG.WORK_H);
  let nextDraw = null;
  for(let i = state.currentFrame + 1; i < state.frames.length; i++){
    if(state.frames[i].kind === 'draw' && !state.frames[i].hidden){ nextDraw = state.frames[i]; break; }
  }
  if(nextDraw){
    const img = new ImageData(
      tintImageData(nextDraw.drawData, 60, 120, 220),
      CFG.WORK_W, CFG.WORK_H
    );
    onionNextCtx.putImageData(img, 0, 0);
  }
}

// drawDataのうち不透明ピクセルを指定色に置き換えた新しいImageData配列を返す
function tintImageData(srcData, r, g, b){
  const out = new Uint8ClampedArray(srcData.length);
  for(let i = 0; i < srcData.length; i += 4){
    if(srcData[i+3] > 0){
      out[i] = r; out[i+1] = g; out[i+2] = b; out[i+3] = srcData[i+3];
    }
  }
  return out;
}

// ============================================================
// PLAYBACK
// ============================================================
let playRAF = 0;
function play(){
  if(state.frames.length === 0) return;
  // ワークエリアが妥当か確認
  ensureWorkAreaValid();
  if(state.workEnd <= state.workStart) return;
  state.playing = true;
  state.playStartTime = performance.now();
  state.playStartFrame = state.currentFrame;
  document.getElementById('btn-play').classList.add('on');
  // 再生中はオニオンスキン消す
  const onionWas = state.onionOn;
  state.onionOn = false;
  updateOnion();
  state._onionWasOn = onionWas;
  const tickMs = 1000 / state.fps;
  // ワークエリア範囲のtick
  const startTick = state.workStart;
  const endTick = state.workEnd; // exclusive
  const rangeTicks = endTick - startTick;

  // 範囲内のtickから idx と「実描画フレームidx」を返す
  // 空ブロックの場合は直前のdrawフレームを返す
  function frameToShowAt(tick){
    let acc = 0;
    let lastDrawIdx = -1;
    for(let i = 0; i < state.frames.length; i++){
      const f = state.frames[i];
      if(f.kind === 'draw' && !f.hidden) lastDrawIdx = i;
      acc += f.duration;
      if(tick < acc){
        return { idx: i, showIdx: (f.kind === 'draw' && !f.hidden) ? i : lastDrawIdx };
      }
    }
    return { idx: state.frames.length - 1, showIdx: lastDrawIdx };
  }

  let lastShown = -1;
  let lastTick  = -1;
  const playCursor = document.getElementById('timeline-cursor');
  function loop(now){
    if(!state.playing) return;
    const elapsed = now - state.playStartTime;
    let t = elapsed;
    if(state.loop){
      t = t % (rangeTicks * tickMs);
    } else if(t >= rangeTicks * tickMs){
      stop();
      return;
    }
    const tick = startTick + Math.floor(t / tickMs);

    // カーソルを1コマ単位でリアルタイム更新（毎RAF）
    if(tick !== lastTick){
      lastTick = tick;
      if(playCursor) playCursor.style.left = tickToPx(tick) + 'px';
    }

    const { idx, showIdx } = frameToShowAt(tick);
    if(idx !== lastShown){
      lastShown = idx;
      state.currentFrame = idx;
      // 表示フレームのキャンバス更新
      if(showIdx >= 0){
        const f = state.frames[showIdx];
        if(f && f.kind === 'draw'){
          const img = new ImageData(
            new Uint8ClampedArray(f.drawData),
            CFG.WORK_W, CFG.WORK_H
          );
          drawCtx.putImageData(img, 0, 0);
        }
      } else {
        // 表示すべきdrawがない: 白紙
        drawCtx.clearRect(0, 0, CFG.WORK_W, CFG.WORK_H);
      }
      updateStripUI();
      updateFramePos();
      // updateTimeTrack() は再生中は省略（カーソルは上で個別更新）
    }
    playRAF = requestAnimationFrame(loop);
  }
  playRAF = requestAnimationFrame(loop);
}
function stop(){
  state.playing = false;
  cancelAnimationFrame(playRAF);
  document.getElementById('btn-play').classList.remove('on');
  // オニオン復帰
  if(state._onionWasOn) state.onionOn = true;
  // 現在表示しているフレームに正式に切り替え（履歴整合）
  switchToFrame(state.currentFrame);
}

// ============================================================
// POINTER (描画 + ピンチズーム + パン + タップジェスチャー)
//
// ペン (Apple Pencil) / マウス: 常に描画
// 指1本:
//   - eraseツール: 消す（描画扱い）
//   - fillツール: 塗る
//   - penツール: パン（キャンバス移動）
// 指2本: ピンチズーム + パン
// 指Nタップ (短時間+小移動でリリース): 2=Undo, 3=Redo
// ============================================================

// ペン/マウス描画用（touch はステージレベルで処理）
let drawing = false;
let drawingPointerId = null;
let lastX = 0, lastY = 0;

let strokeBuffer = [];
const SMOOTH_WINDOW = 4;

// ============================================================
// STAGE-LEVEL TOUCH GESTURES
// 全タッチ操作（ピンチズーム・パン・2/3本指タップ・指描画）を
// stage でまとめて処理することで、キャンバス外からのピンチも動作する
// ============================================================
const touchPtrs = new Map(); // pointerId -> {x,y,startX,startY,startT}
let tPinching = false;
let tPinchStartDist = 0, tPinchStartZoom = 1;
let tPinchStartCenter = {x:0,y:0}, tPinchStartPan = {x:0,y:0};
let tPanning = false, tPanId = null;
let tPanStartClient = {x:0,y:0}, tPanStartPan = {x:0,y:0};
let tTapSessionStart = 0, tTapMaxFingers = 0;

stage.addEventListener('pointerdown', e => {
  if(e.pointerType !== 'touch') return;
  e.preventDefault();
  stage.setPointerCapture(e.pointerId);
  const now = performance.now();
  touchPtrs.set(e.pointerId, {x:e.clientX, y:e.clientY,
    startX:e.clientX, startY:e.clientY, startT:now});

  // タップセッション追跡
  if(touchPtrs.size === 1){ tTapSessionStart = now; tTapMaxFingers = 1; }
  else if(touchPtrs.size > tTapMaxFingers){ tTapMaxFingers = touchPtrs.size; }

  if(touchPtrs.size === 1){
    if(state.tool === 'fill'){
      const {x, y} = toCanvasCoord(e.clientX, e.clientY);
      floodFill(x, y, state.fillColor);
      if(state.frameLayer.editMode) pushFrameLayerHistory();
      else pushHistory();
    } else if(state.tool === 'erase'){
      drawingPointerId = e.pointerId;
      startStroke(e.clientX, e.clientY);
    } else {
      // ペンツール: 指=パン
      tPanning = true; tPanId = e.pointerId;
      tPanStartClient = {x:e.clientX, y:e.clientY};
      tPanStartPan = {x:state.panX, y:state.panY};
    }
  } else if(touchPtrs.size === 2){
    // 2本指: ピンチ開始
    if(drawing) endStroke();
    tPanning = false;
    tPinching = true;
    const pts = Array.from(touchPtrs.values());
    tPinchStartDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    tPinchStartCenter = {x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2};
    tPinchStartZoom = state.zoom;
    tPinchStartPan = {x:state.panX, y:state.panY};
  } else {
    // 3本以上: 全動作停止（タップ判定は継続）
    if(drawing) endStroke();
    tPinching = false; tPanning = false;
  }
}, {passive:false});

stage.addEventListener('pointermove', e => {
  if(e.pointerType !== 'touch') return;
  const p = touchPtrs.get(e.pointerId);
  if(!p) return;
  p.x = e.clientX; p.y = e.clientY;

  if(tPinching && touchPtrs.size >= 2){
    const pts = Array.from(touchPtrs.values());
    const d = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    const c = {x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2};
    if(tPinchStartDist > 0){
      const scale = d / tPinchStartDist;
      state.zoom = Math.max(0.05, Math.min(8, tPinchStartZoom * scale));
      state.panX = tPinchStartPan.x + (c.x - tPinchStartCenter.x);
      state.panY = tPinchStartPan.y + (c.y - tPinchStartCenter.y);
      state.fitMode = false;
      applyZoom();
    }
  } else if(tPanning && e.pointerId === tPanId){
    state.panX = tPanStartPan.x + (e.clientX - tPanStartClient.x);
    state.panY = tPanStartPan.y + (e.clientY - tPanStartClient.y);
    state.fitMode = false;
    applyZoom();
  } else if(drawing && e.pointerId === drawingPointerId){
    continueStroke(e.clientX, e.clientY);
  }
});

function stageTouchEnd(e){
  if(e.pointerType !== 'touch') return;
  const p = touchPtrs.get(e.pointerId);
  if(!p) return;
  touchPtrs.delete(e.pointerId);

  if(tPinching && touchPtrs.size < 2) tPinching = false;
  if(tPanning && e.pointerId === tPanId) tPanning = false;
  if(drawing && e.pointerId === drawingPointerId) endStroke();

  // 全指が離れたらタップ判定
  if(touchPtrs.size === 0){
    const elapsed = performance.now() - tTapSessionStart;
    const moved = Math.hypot(p.x - p.startX, p.y - p.startY);
    if(elapsed < 300 && moved < 12){
      if(tTapMaxFingers === 2){ undo(); }
      else if(tTapMaxFingers === 3){ redo(); }
    }
    tTapMaxFingers = 0;
  }
}
stage.addEventListener('pointerup', stageTouchEnd);
stage.addEventListener('pointercancel', stageTouchEnd);

function smoothPoint(x, y){
  strokeBuffer.push({x, y});
  if(strokeBuffer.length > SMOOTH_WINDOW) strokeBuffer.shift();
  if(state.smoothing === 0 || strokeBuffer.length < 2) return {x, y};
  let sx = 0, sy = 0;
  for(const p of strokeBuffer){ sx += p.x; sy += p.y; }
  return {
    x: Math.floor(sx / strokeBuffer.length),
    y: Math.floor(sy / strokeBuffer.length),
  };
}

// 描画ターゲット: FRAMEレイヤー編集モード時は frameLayerCtx
function activeDrawCtx(){
  return state.frameLayer.editMode ? frameLayerCtx : drawCtx;
}
function startStroke(clientX, clientY){
  const {x, y} = toCanvasCoord(clientX, clientY);
  lastX = x; lastY = y;
  strokeBuffer = [{x, y}];
  drawing = true;
  const ctx = activeDrawCtx();
  if(state.tool === 'pen'){
    drawDot(ctx, x, y, currentToolSize(), INK[state.inkColor]);
    if(state.mirrorOn) drawDot(ctx, mirrorX(x), y, currentToolSize(), INK[state.inkColor]);
  } else if(state.tool === 'erase'){
    eraseDot(ctx, x, y, currentToolSize());
    if(state.mirrorOn) eraseDot(ctx, mirrorX(x), y, currentToolSize());
  }
}
function continueStroke(clientX, clientY){
  const raw = toCanvasCoord(clientX, clientY);
  const {x, y} = smoothPoint(raw.x, raw.y);
  const ctx = activeDrawCtx();
  if(state.tool === 'pen'){
    drawLine(ctx, lastX, lastY, x, y, currentToolSize(), INK[state.inkColor]);
    if(state.mirrorOn) drawLine(ctx, mirrorX(lastX), lastY, mirrorX(x), y, currentToolSize(), INK[state.inkColor]);
  } else if(state.tool === 'erase'){
    eraseLine(ctx, lastX, lastY, x, y, currentToolSize());
    if(state.mirrorOn) eraseLine(ctx, mirrorX(lastX), lastY, mirrorX(x), y, currentToolSize());
  }
  lastX = x; lastY = y;
}
function endStroke(){
  if(!drawing) return;
  drawing = false;
  drawingPointerId = null;
  strokeBuffer = [];
  if(state.frameLayer.editMode){
    pushFrameLayerHistory();
  } else {
    pushHistory();
  }
}

// startPinch/endPinch/startPan/endPan は stage-level touch handler に統合済み

// ============================================================
// DRAW CANVAS — ペン/マウスのみ（タッチはstageレベルで処理）
// ============================================================
drawCanvas.addEventListener('pointerdown', e => {
  if(e.pointerType === 'touch') return; // stage側で処理
  if(e.pointerType === 'mouse' && e.button !== 0) return;
  e.preventDefault();
  drawCanvas.setPointerCapture(e.pointerId);
  drawingPointerId = e.pointerId;
  if(state.tool === 'fill'){
    const {x, y} = toCanvasCoord(e.clientX, e.clientY);
    floodFill(x, y, state.fillColor);
    if(state.frameLayer.editMode) pushFrameLayerHistory();
    else pushHistory();
  } else {
    startStroke(e.clientX, e.clientY);
  }
});

drawCanvas.addEventListener('pointermove', e => {
  if(e.pointerType === 'touch') return;
  const {x, y} = toCanvasCoord(e.clientX, e.clientY);
  document.getElementById('hud-coord').textContent = `${x} · ${y}`;
  if(drawing && e.pointerId === drawingPointerId){
    e.preventDefault();
    continueStroke(e.clientX, e.clientY);
  }
});

function onPenEnd(e){
  if(e.pointerType === 'touch') return;
  if(drawing && e.pointerId === drawingPointerId) endStroke();
}
drawCanvas.addEventListener('pointerup', onPenEnd);
drawCanvas.addEventListener('pointercancel', onPenEnd);

drawCanvas.addEventListener('contextmenu', e => e.preventDefault());

// ============================================================
// TOOL UI
// ============================================================
document.querySelectorAll('.tool').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.tool;
    if(t === 'undo'){ undo(); return; }
    if(t === 'redo'){ redo(); return; }
    state.tool = t;
    document.querySelectorAll('.tool').forEach(b => {
      const tb = b.dataset.tool;
      if(tb === 'undo' || tb === 'redo') return;
      b.classList.toggle('on', tb === t);
    });
    drawCanvas.style.cursor = (t === 'fill') ? 'cell' : 'crosshair';
    // ペン↔消しゴムでサイズUIを更新
    refreshPenSizeUI();
  });
});

document.querySelectorAll('.tb-pen').forEach(btn => {
  btn.addEventListener('click', () => {
    const size = parseInt(btn.dataset.size);
    // 現在のツールが penなら penSize、eraseなら eraseSize を更新
    if(state.tool === 'erase'){
      state.eraseSize = size;
    } else {
      state.penSize = size;
    }
    refreshPenSizeUI();
  });
});

// 現在のツールのサイズに合わせてペンサイズUIを更新
function refreshPenSizeUI(){
  const size = currentToolSize();
  document.querySelectorAll('.tb-pen').forEach(b => {
    b.classList.toggle('on', parseInt(b.dataset.size) === size);
  });
}

document.querySelectorAll('.tb-ink').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tb-ink').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    state.inkColor = btn.dataset.c;
    // ERASE中は主線フラグだけ更新してツールはERASEのまま。それ以外はPENへ自動切替
    if(state.tool !== 'erase'){
      const penBtn = document.querySelector('.tool[data-tool="pen"]');
      if(penBtn && state.tool !== 'pen') penBtn.click();
    }
  });
});

// パレット生成
const palEl = document.getElementById('palette');
PALETTE_48.forEach((c, i) => {
  const cell = document.createElement('div');
  cell.className = 'pal-cell';
  cell.style.background = c;
  cell.dataset.c = c;
  if(i === 47) cell.classList.add('on'); // 黒を初期選択
  state.fillColor = PALETTE_48[47];
  cell.addEventListener('click', () => {
    document.querySelectorAll('.pal-cell').forEach(p => p.classList.remove('on'));
    cell.classList.add('on');
    state.fillColor = c;
    // パレット選択時に自動でfillツールに切り替え
    document.querySelector('.tool[data-tool="fill"]').click();
  });
  palEl.appendChild(cell);
});

// ============================================================
// BACKGROUND 縦スライダー（カスタムUI）
// 上=明 (100), 下=暗 (50)
// ============================================================
const bgTrack = document.getElementById('tb-bg-track');
const bgThumb = document.getElementById('tb-bg-thumb');
const bgValEl = document.getElementById('tb-bg-val');

function setBgBright(v){
  v = Math.max(0, Math.min(100, v));
  state.bgBright = Math.round(v);
  // サム位置: 値100 → 上, 値0 → 下
  const pct = state.bgBright / 100; // 0..1
  bgThumb.style.bottom = (pct * 100) + '%';
  bgValEl.textContent = state.bgBright;
  // 背景を再描画
  const grey = Math.round(state.bgBright * 2.55);
  bgCtx.fillStyle = `rgb(${grey},${grey},${grey})`;
  bgCtx.fillRect(0, 0, CFG.WORK_W, CFG.WORK_H);
}

function bgTrackHandler(e){
  const r = bgTrack.getBoundingClientRect();
  const y = e.clientY - r.top;
  const ratio = 1 - Math.max(0, Math.min(1, y / r.height)); // 上=1, 下=0
  // 0..100 にマッピング（0で真っ黒）
  setBgBright(ratio * 100);
  markMetaDirty();
}
bgTrack.addEventListener('pointerdown', e => {
  e.preventDefault();
  bgTrack.setPointerCapture(e.pointerId);
  bgTrackHandler(e);
});
bgTrack.addEventListener('pointermove', e => {
  if(bgTrack.hasPointerCapture(e.pointerId)){
    bgTrackHandler(e);
  }
});
// 初期表示
setBgBright(100);

// クリア関数
function clearCanvas(){
  drawCtx.clearRect(0, 0, CFG.WORK_W, CFG.WORK_H);
  pushHistory();
}
// ERASEボタンのダブルクリック/ダブルタップでキャンバスをクリア
(function(){
  let lastEraseTap = 0;
  const eraseBtn = document.querySelector('[data-tool="erase"]');
  eraseBtn.addEventListener('click', () => {
    const now = performance.now();
    if(now - lastEraseTap < 380){
      clearCanvas();
      lastEraseTap = 0;
    } else {
      lastEraseTap = now;
    }
  });
})();

// ============================================================
// ZOOM CONTROLS
// ============================================================
// 最後にポインターが触れた画面座標を追跡（ズームボタンの焦点用）
let lastPointerClientX = 0, lastPointerClientY = 0;
stage.addEventListener('pointermove', e => {
  lastPointerClientX = e.clientX;
  lastPointerClientY = e.clientY;
}, { passive: true });

function getZoomFocal(){
  // 有効な座標があればそれを使う。なければstageの中心
  if(lastPointerClientX > 0 || lastPointerClientY > 0){
    return { x: lastPointerClientX, y: lastPointerClientY };
  }
  const r = stage.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

document.getElementById('zoom-in').addEventListener('click', () => {
  const { x, y } = getZoomFocal();
  zoomAt(x, y, state.zoom * 1.25);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  const { x, y } = getZoomFocal();
  zoomAt(x, y, state.zoom / 1.25);
});
document.getElementById('zoom-fit').addEventListener('click', fitToStage);

// ホイールズーム（Ctrl不要、Altは予約）
stage.addEventListener('wheel', e => {
  if(e.altKey) return; // Alt+ホイールはセル幅伸縮側で使用
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.111;
  zoomAt(e.clientX, e.clientY, state.zoom * factor);
}, { passive: false });

// 中ボタン（ホイール押下）でパン
let midPanning = false;
let midPanStart = {x:0, y:0};
let midPanStartPan = {x:0, y:0};
stage.addEventListener('pointerdown', e => {
  if(e.pointerType !== 'mouse' || e.button !== 1) return;
  e.preventDefault();
  stage.setPointerCapture(e.pointerId);
  midPanning = true;
  midPanStart = { x: e.clientX, y: e.clientY };
  midPanStartPan = { x: state.panX, y: state.panY };
  stage.style.cursor = 'grabbing';
});
stage.addEventListener('pointermove', e => {
  if(!midPanning) return;
  state.panX = midPanStartPan.x + (e.clientX - midPanStart.x);
  state.panY = midPanStartPan.y + (e.clientY - midPanStart.y);
  state.fitMode = false;
  applyZoom();
});
function endMidPan(e){
  if(!midPanning) return;
  midPanning = false;
  stage.style.cursor = '';
}
stage.addEventListener('pointerup', endMidPan);
stage.addEventListener('pointercancel', endMidPan);
// 中ボタンのオートスクロール抑止
stage.addEventListener('auxclick', e => { if(e.button === 1) e.preventDefault(); });
stage.addEventListener('mousedown', e => { if(e.button === 1) e.preventDefault(); });

// 指定スクリーン座標を中心にズーム
function zoomAt(screenX, screenY, newZoom){
  newZoom = Math.max(0.05, Math.min(8, newZoom));
  const wrapRect = wrap.getBoundingClientRect();
  // wrap内での相対位置
  const localX = screenX - wrapRect.left;
  const localY = screenY - wrapRect.top;
  const ratio = newZoom / state.zoom;
  // パン補正: ズーム後に同じ画面位置がカーソル下にくるよう
  state.panX -= (localX * ratio - localX);
  state.panY -= (localY * ratio - localY);
  state.zoom = newZoom;
  state.fitMode = false;
  applyZoom();
}

// EXPORT (4K書き出し)
// ImageDataを4Kにnearest-neighborアップスケール
// ============================================================
document.getElementById('btn-export').addEventListener('click', e => exportPNG({ transparentBG: e.shiftKey }));
document.getElementById('btn-export').title = 'クリック: 4K書き出し / Shift+クリック: BG透明で書き出し';

// ============================================================
// JSON EXPORT / IMPORT (COMPOSER 連携)
// ============================================================
// フォーマット PROJECT_v1（推奨）
//   {
//     format: "PROJECT_v1",
//     projectId, exportedAt: ISO,
//     fps: 24, width, height, bgBright,
//     workArea: { startFrame, endFrame },   // 0-indexed (内部基準)
//     frameLayer: { visible, opacity, image },
//     cells: [
//       { id, kind:'draw', duration, hidden, image:'data:image/png;base64,...' },
//       { id, kind:'empty', duration }
//     ],
//     composer: {                           // COMPOSER が追記、ANIMATOR は保持して再export
//       keyframes: { x:[{frame,v}], y:[], s:[], ax:[], ay:[] },  // frame は 0-indexed
//       markers:   [{ frame, label }]
//     }
//   }
// 旧 ANIMATOR_v1 (frames配列・id無し) も読み込み可能（後方互換）。
// 画像はキャンバス内部解像度(2048x1152)のBG透明PNG。COMPOSER側で4Kへnearest拡大。
function frameToPNGDataURL(frame){
  if(!frame || frame.kind !== 'draw' || !frame.drawData) return null;
  const c = document.createElement('canvas');
  c.width = CFG.WORK_W;
  c.height = CFG.WORK_H;
  const ctx = c.getContext('2d');
  const img = new ImageData(
    new Uint8ClampedArray(frame.drawData),
    CFG.WORK_W, CFG.WORK_H
  );
  ctx.putImageData(img, 0, 0);
  return c.toDataURL('image/png');
}

function ensureProjectId(){
  if(!state.projectId){
    state.projectId = (crypto.randomUUID && crypto.randomUUID()) ||
      ('p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,10));
  }
  return state.projectId;
}

function exportJSON(){
  const cur = curFrame();
  if(cur) syncFrameFromCanvas(cur); // 最新の編集中フレームを取り込む
  const out = {
    format: 'PROJECT_v1',
    projectId: ensureProjectId(),
    exportedAt: new Date().toISOString(),
    fps: 24,
    durationUnit: 'frames',
    width: CFG.WORK_W,
    height: CFG.WORK_H,
    bgBright: state.bgBright,
    workArea: {
      startFrame: state.workStart,
      endFrame: state.workEnd,
    },
    frameLayer: {
      visible: state.frameLayer.visible,
      opacity: state.frameLayer.opacity,
      image: frameLayerToPNGDataURL(),
    },
    cellCount: state.frames.length,
    cells: state.frames.map(f => {
      if(f.kind === 'empty'){
        return { id: f.id, kind: 'empty', duration: f.duration };
      }
      return {
        id: f.id,
        kind: 'draw',
        duration: f.duration,
        hidden: !!f.hidden,
        image: frameToPNGDataURL(f),
      };
    }),
    composer: state.composerData || null,
  };
  const blob = new Blob([JSON.stringify(out)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  a.href = url;
  a.download = `project_${ts}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
document.getElementById('btn-export-json').addEventListener('click', exportJSON);

// JSON 読み込み: 画像PNGをdecodeして drawData(Uint8ClampedArray) に変換、frame配列を再構築
function loadImageToDrawData(dataURL){
  return new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => {
      const c = document.createElement('canvas');
      c.width = CFG.WORK_W;
      c.height = CFG.WORK_H;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(im, 0, 0, CFG.WORK_W, CFG.WORK_H);
      const id = ctx.getImageData(0, 0, CFG.WORK_W, CFG.WORK_H);
      resolve(new Uint8ClampedArray(id.data));
    };
    im.onerror = reject;
    im.src = dataURL;
  });
}

async function applyProjectJSON(json){
  // PROJECT_v1 (cells) / 旧 ANIMATOR_v1 (frames) を両対応
  const cellList = Array.isArray(json.cells) ? json.cells
                 : Array.isArray(json.frames) ? json.frames : null;
  if(!cellList || cellList.length === 0){
    alert('フレームが含まれていません'); return;
  }
  // 新しいフレーム配列を構築
  const newFrames = [];
  for(const fj of cellList){
    if(fj.kind === 'empty'){
      const ef = createBlankFrame();
      ef.kind = 'empty';
      ef.drawData = null;
      ef.duration = Math.max(1, fj.duration | 0);
      if(fj.id) ef.id = fj.id;
      newFrames.push(ef);
    } else {
      const f = createBlankFrame();
      f.duration = Math.max(1, fj.duration | 0);
      f.hidden = !!fj.hidden;
      if(fj.id) f.id = fj.id;
      if(fj.image){
        try{
          f.drawData = await loadImageToDrawData(fj.image);
          // サムネ更新
          const c = document.createElement('canvas');
          c.width = CFG.WORK_W; c.height = CFG.WORK_H;
          const ctx = c.getContext('2d');
          ctx.putImageData(new ImageData(new Uint8ClampedArray(f.drawData), CFG.WORK_W, CFG.WORK_H), 0, 0);
          const tc = f.thumbCanvas.getContext('2d');
          tc.imageSmoothingEnabled = false;
          tc.fillStyle = '#fff';
          tc.fillRect(0, 0, CFG.THUMB_W, CFG.THUMB_H);
          tc.drawImage(c, 0, 0, CFG.THUMB_W, CFG.THUMB_H);
        } catch(e){
          console.warn('image decode failed', e);
        }
      }
      f.dirty = true;
      state.pendingSaveFrames.add(f.id);
      newFrames.push(f);
    }
  }

  state.frames = newFrames;
  state.currentFrame = 0;
  if(typeof json.fps === 'number') state.fps = json.fps;
  if(typeof json.bgBright === 'number'){
    setBgBright(json.bgBright);
  }
  // workArea 復元（PROJECT_v1）
  const total = totalTicks();
  if(json.workArea && typeof json.workArea === 'object'){
    state.workStart = Math.max(0, Math.min(total, json.workArea.startFrame | 0));
    state.workEnd   = Math.max(state.workStart, Math.min(total, json.workArea.endFrame | 0));
    if(state.workEnd <= state.workStart) state.workEnd = total;
  } else {
    state.workStart = 0;
    state.workEnd = total;
  }
  // projectId / composer セクション保持
  if(typeof json.projectId === 'string') state.projectId = json.projectId;
  state.composerData = (json.composer && typeof json.composer === 'object') ? json.composer : null;
  loadFrameToCanvas(curFrame());
  buildStrip();
  updateDurInfo();
  updateTimeTrack();
  // FRAMEレイヤー復元
  if(json.frameLayer && typeof json.frameLayer === 'object'){
    if(typeof json.frameLayer.visible === 'boolean') state.frameLayer.visible = json.frameLayer.visible;
    if(typeof json.frameLayer.opacity === 'number') state.frameLayer.opacity = json.frameLayer.opacity;
    state.frameLayer.editMode = false;
    const slider = document.getElementById('frame-opacity');
    if(slider) slider.value = Math.round(state.frameLayer.opacity * 100);
    await loadFrameLayerFromDataURL(json.frameLayer.image || null);
  } else {
    await loadFrameLayerFromDataURL(null);
  }
  applyFrameLayerStyle();
  scheduleSave();
  pushTimelineHistory();
}

async function importJSON(file){
  if(!file) return;
  let json;
  try{ json = JSON.parse(await file.text()); }
  catch(e){ alert('JSONの解析に失敗しました: ' + e.message); return; }

  if(!confirm('現在のプロジェクトを上書きします。よろしいですか？')) return;
  await applyProjectJSON(json);
}

// EXCHANGE DB (両アプリ共有のクリップボードDB / Phase 2.2)
// ============================================================
const EX_DB = 'tdr_exchange', EX_STORE = 'projects', EX_VERSION = 1;
function exOpenDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(EX_DB, EX_VERSION);
    r.onupgradeneeded = e => {
      const _db = e.target.result;
      if(!_db.objectStoreNames.contains(EX_STORE)) _db.createObjectStore(EX_STORE, {keyPath:'projectId'});
    };
    r.onsuccess = e=>res(e.target.result);
    r.onerror = e=>rej(e.target.error);
  });
}
async function exPut(record){
  const _db = await exOpenDB();
  return new Promise((res,rej)=>{
    const tx = _db.transaction(EX_STORE,'readwrite');
    tx.objectStore(EX_STORE).put(record);
    tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error);
  });
}
async function exGet(id){
  const _db = await exOpenDB();
  return new Promise((res,rej)=>{
    const tx = _db.transaction(EX_STORE,'readonly');
    const r = tx.objectStore(EX_STORE).get(id);
    r.onsuccess=()=>res(r.result||null); r.onerror=()=>rej(r.error);
  });
}

function buildProjectPayload(){
  const cur = curFrame();
  if(cur) syncFrameFromCanvas(cur);
  return {
    format: 'PROJECT_v1',

    fps: 24, durationUnit: 'frames',
    width: CFG.WORK_W, height: CFG.WORK_H,

    frameLayer: {
      visible: state.frameLayer.visible,
      opacity: state.frameLayer.opacity,
      image: frameLayerToPNGDataURL(),
    },
    cellCount: state.frames.length,
    cells: state.frames.map(f => f.kind === 'empty'
      ? { id: f.id, kind: 'empty', duration: f.duration }
      : { id: f.id, kind: 'draw', duration: f.duration, hidden: !!f.hidden, image: frameToPNGDataURL(f) }
    ),
    composer: state.composerData || null,
  };
}
