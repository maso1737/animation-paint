<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ANIMATOR — EDIT</title>
<style>
:root{
  --acid:#36FF00;
  --neon:#F9FF47;
  --grey:#888;
  --dim:#444;
  --black:#000;
  --white:#fff;
  --panel:#0C0C0C;
  --panel2:#161616;
  --border:rgba(255,255,255,0.08);
  --border-bright:rgba(54,255,0,0.3);
  --mono:'Menlo','Consolas',monospace;
  --jp:-apple-system,'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:var(--black);color:var(--white);
  font-family:var(--mono);font-size:11px;
  overflow:hidden;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  touch-action:none;
  overscroll-behavior:none;
}

#app{
  display:grid;
  grid-template-columns:72px 1fr 240px;
  grid-template-rows:36px 1fr 130px 32px;
  height:100vh;width:100vw;
}

/* ── トップバー ── */
#topbar{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  border-bottom:1px solid var(--border);
  background:var(--panel);
  font-size:10px;letter-spacing:0.25em;
  color:rgba(54,255,0,0.6);
}
#topbar .left,#topbar .right{display:flex;gap:14px;align-items:center;}
#topbar .title{color:var(--acid);font-weight:700;}
#topbar .sep{color:var(--dim);}
#topbar button{
  background:transparent;border:1px solid var(--border);
  color:rgba(255,255,255,0.7);
  font-family:var(--mono);font-size:9px;letter-spacing:0.15em;
  padding:4px 10px;cursor:pointer;
  transition:all 0.15s;
}
#topbar button:hover{border-color:var(--border-bright);color:var(--acid);}
#topbar button:active{background:rgba(54,255,0,0.1);}

/* ── 左ツールバー ── */
#toolbar{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0;gap:4px;
  border-right:1px solid var(--border);
  background:var(--panel);
  overflow-y:auto;
}
#toolbar::-webkit-scrollbar{width:0;}
.tool{
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid transparent;
  background:transparent;color:rgba(255,255,255,0.5);
  cursor:pointer;
  transition:all 0.12s;
  position:relative;
}
.tool:hover{color:var(--white);background:rgba(255,255,255,0.04);}
.tool.on{
  color:var(--acid);
  background:rgba(54,255,0,0.08);
  border-color:rgba(54,255,0,0.3);
}
.tool svg{width:22px;height:22px;}
.tool .lbl{
  position:absolute;bottom:2px;left:0;right:0;
  font-size:8px;text-align:center;color:rgba(255,255,255,0.3);
  letter-spacing:0.05em;
}
.tool.on .lbl{color:var(--acid);}
.tool-sep{
  width:32px;height:1px;
  background:var(--border);
  margin:6px 0;
}

/* ── 左ツールバー内 縦UI ── */

/* PEN SIZE 縦 */
.tb-pen-stack{
  display:flex;flex-direction:column;gap:3px;
  align-items:center;
  padding:2px 0;
}
.tb-pen{
  width:44px;height:30px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--border);
  color:rgba(255,255,255,0.5);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:8px;
  letter-spacing:0.1em;
  transition:all 0.12s;
  position:relative;
}
.tb-pen:hover{border-color:rgba(54,255,0,0.3);color:var(--white);}
.tb-pen.on{
  border-color:var(--acid);
  background:rgba(54,255,0,0.08);
  color:var(--acid);
}
.tb-pen .dot{
  border-radius:50%;background:currentColor;
  margin-right:5px;display:block;flex-shrink:0;
}

/* INK COLOR 縦 */
.tb-ink-stack{
  display:flex;flex-direction:column;gap:3px;
  align-items:center;padding:2px 0;
}
.tb-ink{
  width:44px;height:24px;
  border:1px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;letter-spacing:0.1em;
  font-family:var(--jp);
  transition:all 0.12s;
}
.tb-ink:hover{border-color:rgba(54,255,0,0.3);}
.tb-ink.on{
  border-color:var(--acid);
  box-shadow:inset 0 0 0 1px var(--acid);
}
.tb-ink[data-c="black"]{background:#000;color:#fff;}
.tb-ink[data-c="blue"]{background:#a8d8ff;color:#003;}
.tb-ink[data-c="orange"]{background:#ffb060;color:#420;}

/* BACKGROUND 縦スライダー */
.tb-bg{
  display:flex;flex-direction:column;align-items:center;
  gap:6px;padding:6px 0;
  width:44px;
}
.tb-bg .lbl{
  font-size:8px;letter-spacing:0.15em;
  color:rgba(54,255,0,0.5);
}
.tb-bg .val{
  font-size:9px;color:var(--acid);
  font-family:var(--mono);
}
.tb-bg-track{
  width:24px;height:80px;
  background:linear-gradient(to top,#666,#fff);
  border:1px solid var(--border);
  position:relative;
  cursor:pointer;
}
.tb-bg-thumb{
  position:absolute;left:-4px;right:-4px;
  height:6px;
  background:var(--acid);
  border-radius:1px;
  transform:translateY(50%);
  pointer-events:none;
}

/* ── ステージ ── */
#stage{
  position:relative;
  background:#070707;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
#stage-info{
  position:absolute;top:8px;left:10px;
  font-size:9px;color:rgba(255,255,255,0.3);
  letter-spacing:0.2em;pointer-events:none;
  z-index:10;
}
#stage-info b{color:var(--acid);font-weight:400;}

#canvas-wrap{
  position:relative;
  background:transparent;
  /* 描画領域は中央に */
}
.layer{
  position:absolute;top:0;left:0;
  image-rendering:pixelated;
  image-rendering:-moz-crisp-edges;
  image-rendering:crisp-edges;
  -ms-interpolation-mode:nearest-neighbor;
  touch-action:none;
}
#bg-layer{background:#fff;}
#draw-layer{cursor:crosshair;}

#stage-hud{
  position:absolute;bottom:8px;left:10px;
  font-size:9px;color:rgba(255,255,255,0.4);
  letter-spacing:0.15em;pointer-events:none;
  z-index:10;
}

/* ズームコントロール */
#zoom-ctl{
  position:absolute;bottom:8px;right:10px;
  display:flex;gap:4px;align-items:center;
  z-index:10;
}
#zoom-ctl button{
  width:24px;height:24px;
  background:rgba(0,0,0,0.6);
  border:1px solid var(--border);
  color:var(--acid);font-family:var(--mono);
  cursor:pointer;
}
#zoom-ctl .zval{
  font-size:9px;color:var(--acid);
  min-width:46px;text-align:center;
  letter-spacing:0.1em;
}

/* ── 右パネル ── */
#side{
  border-left:1px solid var(--border);
  background:var(--panel);
  overflow-y:auto;
  display:flex;flex-direction:column;
}
#side::-webkit-scrollbar{width:4px;}
#side::-webkit-scrollbar-thumb{background:rgba(54,255,0,0.3);}
.pnl{
  border-bottom:1px solid var(--border);
  padding:12px 14px;
}
.pnl-h{
  font-size:9px;letter-spacing:0.3em;
  color:rgba(54,255,0,0.6);
  margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.pnl-h .v{color:var(--white);font-size:10px;letter-spacing:0.05em;}

/* ペンサイズ */
.pen-row{display:flex;gap:6px;}
.pen-btn{
  flex:1;
  height:38px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--border);
  color:rgba(255,255,255,0.5);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;
  font-family:var(--mono);font-size:9px;
  transition:all 0.12s;
}
.pen-btn:hover{border-color:rgba(54,255,0,0.3);}
.pen-btn.on{
  border-color:var(--acid);
  background:rgba(54,255,0,0.08);
  color:var(--acid);
}
.pen-btn .dot{
  background:currentColor;
  border-radius:50%;
  display:block;
}

/* インクカラー（線色） */
.ink-row{display:flex;gap:6px;margin-bottom:6px;}
.ink-btn{
  flex:1;height:32px;
  border:1px solid var(--border);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;
  transition:all 0.12s;
  position:relative;
}
.ink-btn:hover{border-color:rgba(54,255,0,0.3);}
.ink-btn.on{
  border-color:var(--acid);
  box-shadow:inset 0 0 0 1px var(--acid);
}
.ink-btn[data-c="black"]{background:#000;color:#fff;}
.ink-btn[data-c="blue"]{background:#a8d8ff;color:#003;}
.ink-btn[data-c="orange"]{background:#ffb060;color:#420;}

/* パレット（塗りつぶし48色） */
.palette{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:2px;
}
.pal-cell{
  aspect-ratio:1;
  cursor:pointer;
  border:1px solid transparent;
  transition:all 0.1s;
  position:relative;
}
.pal-cell:hover{transform:scale(1.15);z-index:2;}
.pal-cell.on{
  border-color:var(--acid);
  box-shadow:0 0 0 1px var(--acid);
  z-index:3;
}

/* 明度スライダー */
.slider-row{
  display:flex;align-items:center;gap:8px;
  font-size:9px;color:rgba(255,255,255,0.5);
  letter-spacing:0.1em;
}
.slider-row .lbl{flex:0 0 36px;}
.slider-row .val{flex:0 0 28px;text-align:right;color:var(--acid);}
input[type=range]{
  -webkit-appearance:none;
  flex:1;height:2px;
  background:rgba(255,255,255,0.1);
  outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--acid);cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:var(--acid);cursor:pointer;border:none;
}

/* ── モーダルダイアログ ── */
#modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  display:none;align-items:center;justify-content:center;
  z-index:1000;
  font-family:var(--mono);
}
#modal-overlay.show{display:flex;}
.modal-box{
  background:var(--panel);
  border:1px solid var(--acid);
  box-shadow:0 0 24px rgba(54,255,0,0.2);
  min-width:280px;max-width:400px;
  padding:24px;
}
.modal-msg{
  font-size:12px;
  color:var(--white);
  letter-spacing:0.05em;
  line-height:1.6;
  margin-bottom:20px;
  font-family:var(--jp);
}
.modal-btns{
  display:flex;gap:8px;justify-content:flex-end;
}
.modal-btn{
  background:transparent;
  border:1px solid var(--border);
  color:rgba(255,255,255,0.7);
  font-family:var(--mono);font-size:10px;letter-spacing:0.2em;
  padding:8px 16px;cursor:pointer;
  transition:all 0.15s;
}
.modal-btn:hover{border-color:var(--border-bright);color:var(--acid);}
.modal-btn.danger{
  border-color:rgba(229,80,80,0.4);
  color:rgba(229,80,80,0.9);
}
.modal-btn.danger:hover{
  background:rgba(229,80,80,0.1);
  border-color:rgba(229,80,80,1);
  color:rgba(255,150,150,1);
}
.modal-btn.primary{
  border-color:var(--acid);
  color:var(--acid);
}
.modal-btn.primary:hover{
  background:rgba(54,255,0,0.1);
}

/* ── ボトムバー ── */
#bottombar{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  border-top:1px solid var(--border);
  background:var(--panel);
  font-size:9px;color:rgba(255,255,255,0.4);
  letter-spacing:0.15em;
}

/* ── フレームストリップ ── */
#strip-area{
  grid-column:1/-1;
  background:var(--panel);
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:auto 1fr auto;
  grid-template-rows:24px 22px 1fr 14px;
  padding:0;
  overflow:hidden;
}
#strip-toolbar{
  grid-column:1/-1;
  display:flex;align-items:center;gap:8px;
  padding:0 12px;
  border-bottom:1px solid var(--border);
  font-size:9px;letter-spacing:0.2em;
  color:rgba(255,255,255,0.4);
  background:#0a0a0a;
  overflow-x:auto;
  white-space:nowrap;
  scrollbar-width:none;
}
#strip-toolbar::-webkit-scrollbar{display:none;}

/* ── 時間メモリ + ワークエリアトラック ── */
#time-track{
  grid-column:1/-1;
  position:relative;
  background:#080808;
  border-bottom:1px solid var(--border);
  overflow:hidden;
  height:22px;
  /* スクロール同期はJSで */
}
#time-track-inner{
  position:absolute;
  top:0;left:0;height:100%;
  /* widthはJSで設定、frame-stripと同期 */
}
.time-tick{
  position:absolute;top:0;
  height:100%;
  border-left:1px solid rgba(255,255,255,0.12);
  font-family:var(--mono);
  font-size:8px;
  color:rgba(255,255,255,0.4);
  letter-spacing:0.05em;
  padding:3px 0 0 3px;
  pointer-events:none;
  white-space:nowrap;
}
.time-tick.major{
  border-left-color:rgba(54,255,0,0.4);
  color:rgba(54,255,0,0.7);
}
.time-tick.tick-sec{
  border-left-color:rgba(255,255,255,0.25);
  color:rgba(255,255,255,0.55);
}

/* ワークエリア */
#work-area{
  position:absolute;
  top:0;height:100%;
  background:rgba(54,255,0,0.08);
  border-left:2px solid var(--neon);
  border-right:2px solid var(--neon);
  pointer-events:none;
  z-index:2;
}
.work-handle{
  position:absolute;
  top:0;height:100%;width:10px;
  background:rgba(249,255,71,0.3);
  cursor:ew-resize;
  pointer-events:auto;
  z-index:3;
  /* タッチでも掴みやすく不可視ヒット領域を広げる */
}
.work-handle::after{
  content:'';
  position:absolute;inset:0 -8px;
}
.work-handle:hover{background:rgba(249,255,71,0.6);}
.work-handle.active{background:var(--neon);}
#work-handle-l{left:-2px;}
#work-handle-r{right:-2px;}
#work-area-body{
  position:absolute;
  top:0;height:100%;
  left:8px;right:8px;
  pointer-events:auto;
  cursor:grab;
}
#work-area-body:active{cursor:grabbing;}

/* タイムライン上の現在位置インジケータ */
#timeline-cursor{
  position:absolute;top:0;
  width:1px;height:100%;
  background:var(--acid);
  pointer-events:none;
  z-index:4;
  box-shadow:0 0 6px var(--acid);
}

#strip-toolbar .seg{display:flex;gap:4px;align-items:center;}
#strip-toolbar .sep{color:var(--dim);}
#strip-toolbar .lbl{color:rgba(54,255,0,0.5);}
#strip-toolbar button{
  background:transparent;border:1px solid var(--border);
  color:rgba(255,255,255,0.6);
  font-family:var(--mono);font-size:9px;letter-spacing:0.1em;
  padding:3px 8px;cursor:pointer;
  transition:all 0.12s;
}
#strip-toolbar button:hover{border-color:var(--border-bright);color:var(--acid);}
#strip-toolbar button.on{background:rgba(54,255,0,0.1);border-color:var(--acid);color:var(--acid);}
#strip-toolbar .play-btn{
  width:24px;height:18px;display:flex;align-items:center;justify-content:center;
  padding:0;
}
#strip-toolbar .play-btn svg{width:10px;height:10px;}
#strip-toolbar .fps-input{
  width:36px;background:#000;border:1px solid var(--border);
  color:var(--acid);text-align:center;font-family:var(--mono);
  font-size:10px;height:18px;
}
#strip-toolbar .frame-pos{
  color:var(--acid);min-width:60px;
}
#strip-toolbar .right{margin-left:auto;display:flex;gap:8px;align-items:center;}

#strip-prev,#strip-next{
  width:24px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;color:rgba(255,255,255,0.4);
  cursor:pointer;font-size:14px;
}
#strip-prev:hover,#strip-next:hover{color:var(--acid);}

#strip-wrap{
  position:relative;
  overflow:hidden;
}
#frame-strip{
  display:flex;align-items:stretch;gap:3px;
  padding:8px 4px;
  height:100%;
  overflow-x:scroll;overflow-y:hidden;
  scrollbar-width:none;
  scroll-behavior:auto;
  /* 指タッチでネイティブの横スクロール + ピンチを許可。
     ペン/マウスのみJSハンドラで操作する */
  touch-action:pan-x pinch-zoom;
  -webkit-overflow-scrolling:touch;
}
#frame-strip::-webkit-scrollbar{display:none;}

/* タイムラインの空白タッチ領域（最後のフレームの後ろ） */
.fc-empty-tail{
  flex-shrink:0;
  flex-grow:0;
  background:repeating-linear-gradient(
    90deg,
    transparent 0 7px,
    rgba(255,255,255,0.04) 7px 8px
  );
  border:1px dashed rgba(255,255,255,0.08);
  cursor:cell;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.fc-empty-tail:hover{
  background:repeating-linear-gradient(
    90deg,
    transparent 0 7px,
    rgba(54,255,0,0.08) 7px 8px
  );
  border-color:rgba(54,255,0,0.4);
}
.fc-empty-tail .lbl{
  font-size:8px;letter-spacing:0.2em;
  color:rgba(255,255,255,0.25);
  pointer-events:none;
}
.fc-empty-tail:hover .lbl{color:var(--acid);}

.fc{
  flex-shrink:0;
  width:80px;          /* JSで動的にwidthを上書き */
  position:relative;
  background:#050505;
  border:1px solid rgba(255,255,255,0.08);
  cursor:pointer;
  transition:border-color 0.1s, box-shadow 0.1s;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.fc:hover{border-color:rgba(54,255,0,0.4);}
.fc.active{
  border-color:var(--acid);
  box-shadow:0 0 0 1px var(--acid),0 0 12px rgba(54,255,0,0.3);
}
.fc.dragging{
  opacity:0.4;
  border-color:var(--neon);
}
.fc.drop-target-left{
  box-shadow:-3px 0 0 0 var(--neon);
}
.fc.drop-target-right{
  box-shadow:3px 0 0 0 var(--neon);
}
.fc-thumb{
  flex:1;
  background:#fff;
  position:relative;
  overflow:hidden;
}
.fc-thumb canvas{
  width:100%;height:100%;
  display:block;
  image-rendering:pixelated;
}
/* 内側仕切り線（コマ打ち2,3用） */
.fc-divs{
  position:absolute;inset:0;
  pointer-events:none;
  display:flex;
}
.fc-divs span{
  flex:1;
  border-left:1px dashed rgba(0,0,0,0.18);
}
.fc-divs span:first-child{border-left:none;}

/* 空ブロックセル */
.fc-empty{
  flex-shrink:0;
  position:relative;
  background:repeating-linear-gradient(
    135deg,
    rgba(255,255,255,0.02) 0 6px,
    rgba(255,255,255,0.06) 6px 12px
  );
  border:1px dashed rgba(255,255,255,0.15);
  cursor:cell;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.fc-empty:hover{
  border-color:rgba(54,255,0,0.4);
  background:repeating-linear-gradient(
    135deg,
    rgba(54,255,0,0.04) 0 6px,
    rgba(54,255,0,0.08) 6px 12px
  );
}
.fc-empty.active{
  border-color:var(--neon);
  box-shadow:0 0 0 1px var(--neon);
}
.fc-empty .fc-meta{
  margin-top:auto;
}
.fc-empty .fc-num{color:rgba(255,255,255,0.3);}
.fc-empty .fc-dur{color:rgba(249,255,71,0.5);}
/* duration 4以上のときの目盛り表示 */
.fc-ruler{
  position:absolute;left:0;right:0;bottom:18px;
  height:6px;
  display:flex;
  pointer-events:none;
}
.fc-ruler span{
  flex:1;
  border-left:1px solid rgba(54,255,0,0.25);
  border-bottom:1px solid rgba(54,255,0,0.25);
}
.fc-ruler span:first-child{border-left:none;}
/* スクラブ用 右端ハンドル */
.fc-handle{
  position:absolute;
  right:-1px;top:0;bottom:0;
  width:8px;
  cursor:ew-resize;
  background:transparent;
  z-index:5;
}
.fc-handle::after{
  /* タッチ環境用の不可視ヒットエリア拡張 */
  content:'';
  position:absolute;inset:-4px -6px;
}
.fc-handle:hover{background:rgba(54,255,0,0.3);}
.fc-handle.active{background:var(--acid);}
.fc-meta{
  height:18px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4px;
  font-size:8px;letter-spacing:0.1em;
  color:rgba(255,255,255,0.5);
  background:rgba(0,0,0,0.6);
  border-top:1px solid rgba(255,255,255,0.05);
}
.fc.active .fc-meta{color:var(--acid);}
.fc-num{font-weight:400;}
.fc-dur{
  color:rgba(249,255,71,0.6);
  cursor:ew-resize;
  padding:0 2px;
}
.fc.active .fc-dur{color:var(--neon);}

/* "+" 追加ボタン */
.fc-add{
  flex-shrink:0;width:40px;
  background:transparent;
  border:1px dashed rgba(255,255,255,0.15);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.3);
  font-size:18px;
  transition:all 0.12s;
}
.fc-add:hover{
  border-color:var(--acid);
  color:var(--acid);
  background:rgba(54,255,0,0.04);
}

/* カスタムスクロールバー */
#strip-scrollbar{
  grid-column:1/-1;
  height:14px;
  background:rgba(255,255,255,0.03);
  border-top:1px solid var(--border);
  position:relative;
  cursor:default;
}
#strip-thumb{
  position:absolute;top:3px;height:8px;
  background:rgba(54,255,0,0.3);border-radius:4px;
  cursor:grab;min-width:24px;
  transition:background 0.15s;
}
#strip-thumb:hover{background:rgba(54,255,0,0.6);}
#strip-thumb:active{cursor:grabbing;background:var(--acid);}

/* オニオンスキンキャンバス */
#onion-prev,#onion-next{
  position:absolute;top:0;left:0;
  pointer-events:none;
  opacity:0.35;
  image-rendering:pixelated;
}
#onion-prev{filter:hue-rotate(0deg);}
#onion-next{filter:hue-rotate(0deg);}

#bottombar{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  border-top:1px solid var(--border);
  background:var(--panel);
  font-size:9px;color:rgba(255,255,255,0.4);
  letter-spacing:0.15em;
}
#bottombar .stat{display:flex;gap:14px;}
#bottombar .stat b{color:var(--acid);font-weight:400;}
#bottombar .save-state{
  font-size:9px;letter-spacing:0.2em;
}
#bottombar .save-state.saved{color:rgba(54,255,0,0.6);}
#bottombar .save-state.dirty{color:var(--neon);}
#bottombar .save-state.saving{color:rgba(255,255,255,0.6);}

/* タッチ最適化 */
@media (pointer:coarse){
  .tool{width:54px;height:54px;}
  .tool svg{width:26px;height:26px;}
  .tb-pen{height:34px;}
  .tb-ink{height:28px;}
  .pen-btn{height:44px;}
  .ink-btn{height:38px;}
  #app{grid-template-columns:78px 1fr 240px;}
}

/* iPad縦持ち時はサイドパネルを下に */
@media (max-width:900px) and (orientation:portrait){
  #app{
    grid-template-columns:78px 1fr;
    grid-template-rows:36px 1fr 180px 130px 32px;
  }
  #side{
    grid-column:1/-1;
    border-left:none;
    border-top:1px solid var(--border);
    flex-direction:row;
    overflow-x:auto;overflow-y:hidden;
  }
  .pnl{
    border-bottom:none;
    border-right:1px solid var(--border);
    flex-shrink:0;min-width:200px;
  }
}
</style>

<!-- MODAL DIALOG -->

<script>
// ============================================================
// CONFIG
// ============================================================
const CFG = {
  // 内部作業解像度 (16:9, 2K相当)
  WORK_W: 2048,
  WORK_H: 1152,
  // 書き出し解像度 (4K)
  EXPORT_W: 3840,
  EXPORT_H: 2160,
  // 履歴保持数（フレーム単位）
  HISTORY_MAX: 50,
  // 自動保存遅延 (ms)
  AUTOSAVE_DELAY: 800,
  // サムネイルサイズ
  THUMB_W: 80,
  THUMB_H: 45,
  // タイムライン最大尺（秒）
  MAX_DURATION_SEC: 15,
  // IndexedDB
  DB_NAME: 'animator',
  DB_VERSION: 2,
  STORE_FRAMES: 'frames',
  STORE_META:   'meta',
};

// 48色パレット (アニメ塗りでよく使う系統)
const PALETTE_48 = [
  // 肌系 (5)
  '#FFF0E0','#FCE5CE','#F8C99B','#E8A87C','#C68863',
  // 髪・赤系 (8)
  '#3B2C2A','#5C3A36','#8B4543','#C04848','#E55B47','#F08A6E','#FFB89B','#FFD8C2',
  // 黄〜橙 (4)
  '#FFD93D','#FFC857','#FFA94D','#FF8730',
  // 緑系 (7)
  '#E8F5D0','#C5E384','#9DCB5C','#6FAF3A','#4A8B2D','#2E5F1F','#1F3F12',
  // 青系（影・空） (7)
  '#F0F8FF','#E8F4FF','#BFDFFF','#8BB8E8','#5C8FCC','#3D6FA8','#1F4A7C',
  // 紫 (4)
  '#D4B6E8','#A881C5','#7C5BA0','#553B7A',
  // 赤系（影・口） (5)
  '#FFE0E0','#FFD0D0','#FF9090','#E55050','#A02020',
  // ニュートラル (8)
  '#FFFFFF','#E0DDD5','#B5B0A4','#888373','#4F4B40','#2A2722','#1A1815','#000000',
];

// インクカラー
const INK = {
  black:  '#000000',
  blue:   '#A8D8FF',  // 下書き用うすい水色
  orange: '#FFB060',  // 指示用オレンジ
};

// ============================================================
// MODAL DIALOG (confirm/alertの代替)
// iPadのHTMLビューアアプリで confirm() がブロックされる対策
// ============================================================
function showModal({msg, buttons}){
  return new Promise(resolve => {
    const overlay = document.getElementById('modal-overlay');
    const msgEl = document.getElementById('modal-msg');
    const btnsEl = document.getElementById('modal-btns');
    msgEl.textContent = msg;
    btnsEl.innerHTML = '';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'modal-btn ' + (b.variant || '');
      btn.textContent = b.label;
      btn.addEventListener('click', () => {
        overlay.classList.remove('show');
        resolve(b.value);
      });
      btnsEl.appendChild(btn);
    });
    overlay.classList.add('show');
  });
}
async function modalConfirm(msg){
  const r = await showModal({
    msg,
    buttons: [
      { label: 'CANCEL', value: false },
      { label: 'OK',     value: true, variant: 'primary' },
    ]
  });
  return r === true;
}
async function modalAlert(msg){
  await showModal({
    msg,
    buttons: [{ label: 'OK', value: true, variant: 'primary' }]
  });
}

// ============================================================
// STATE
// ============================================================
const state = {
  tool: 'pen',          // 'pen'|'erase'|'fill'
  // ツールごとに独立したサイズ記憶
  penSize: 2,           // 1|2|20
  eraseSize: 20,        // 1|2|20
  inkColor: 'black',    // 'black'|'blue'|'orange'
  fillColor: '#000000',
  bgBright: 100,
  // ズームとパン
  zoom: 1,
  fitMode: true,
  panX: 0,              // 表示オフセット (px)
  panY: 0,
  // フレーム管理
  frames: [],
  currentFrame: 0,
  fps: 24,
  strokeCount: 0,
  dirty: false,
  saveTimer: null,
  pendingSaveFrames: new Set(),
  // 再生
  playing: false,
  playStartTime: 0,
  playStartFrame: 0,
  loop: true,
  // オニオンスキン
  onionOn: false,
  // ストローク補正の強さ (0=なし, 推奨: 3)
  smoothing: 3,
  // セル基準幅 (px)。Alt+ホイール で変更可能
  cellBaseW: 80,
  // duration 4以上のときの「1コマあたり伸びる量」 (px)
  cellStretchPerTick: 20,
  // ワークエリア（再生・書き出し範囲）: コマ単位
  workStart: 0,    // 開始コマ番号（0始まり）
  workEnd: 0,      // 終了コマ番号（exclusive）
  // 'select' | 'edit' などモード判別。当面 edit のみ
  mode: 'edit',
};

// ツール現在サイズ取得（ツールに応じて切替）
function currentToolSize(){
  return state.tool === 'erase' ? state.eraseSize : state.penSize;
}

let frameIdCounter = 0;
function newFrameId(){ return ++frameIdCounter; }

// ============================================================
// DOM
// ============================================================
const stage      = document.getElementById('stage');
const wrap       = document.getElementById('canvas-wrap');
const bgCanvas   = document.getElementById('bg-layer');
const drawCanvas = document.getElementById('draw-layer');
const onionPrev  = document.getElementById('onion-prev');
const onionNext  = document.getElementById('onion-next');
const bgCtx      = bgCanvas.getContext('2d');
const drawCtx    = drawCanvas.getContext('2d', { willReadFrequently: true });
const onionPrevCtx = onionPrev.getContext('2d');
const onionNextCtx = onionNext.getContext('2d');

// 内部解像度設定
function setupCanvas(){
  [bgCanvas, drawCanvas, onionPrev, onionNext].forEach(c => {
    c.width  = CFG.WORK_W;
    c.height = CFG.WORK_H;
  });
  // 背景白
  bgCtx.fillStyle = '#fff';
  bgCtx.fillRect(0, 0, CFG.WORK_W, CFG.WORK_H);
  // アンチエイリアスOFF
  [drawCtx, bgCtx, onionPrevCtx, onionNextCtx].forEach(c => {
    c.imageSmoothingEnabled = false;
  });
}
setupCanvas();

// ============================================================
// FIT / ZOOM
// ============================================================
function fitToStage(){
  const sw = stage.clientWidth;
  const sh = stage.clientHeight;
  const margin = 24;
  const scale = Math.min(
    (sw - margin * 2) / CFG.WORK_W,
    (sh - margin * 2) / CFG.WORK_H
  );
  state.zoom = scale;
  state.fitMode = true;
  state.panX = 0;
  state.panY = 0;
  applyZoom();
}
function applyZoom(){
  const w = CFG.WORK_W * state.zoom;
  const h = CFG.WORK_H * state.zoom;
  wrap.style.width  = w + 'px';
  wrap.style.height = h + 'px';
  // パンによるオフセット (中央配置 + pan)
  wrap.style.transform = `translate(${state.panX}px, ${state.panY}px)`;
  [bgCanvas, drawCanvas, onionPrev, onionNext].forEach(c => {
    c.style.width  = w + 'px';
    c.style.height = h + 'px';
  });
  document.getElementById('info-zoom').textContent =
    state.fitMode ? 'FIT' : Math.round(state.zoom*100)+'%';
  document.getElementById('zoom-val').textContent =
    Math.round(state.zoom*100)+'%';
}

// ============================================================
// COORDINATE TRANSFORM
// 画面座標 → キャンバス座標（整数）
// ============================================================
function toCanvasCoord(clientX, clientY){
  const r = drawCanvas.getBoundingClientRect();
  const x = (clientX - r.left) / r.width  * CFG.WORK_W;
  const y = (clientY - r.top)  / r.height * CFG.WORK_H;
  // 整数化（アンチエイリアスOFFのため）
  return { x: Math.floor(x), y: Math.floor(y) };
}

// ============================================================
// PIXEL DRAWING (アンチエイリアスOFF)
// ============================================================

// 1pxドット（中心1pxのみ）
function drawDot1(ctx, x, y, color){
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 1, 1);
}
// 2pxドット（2x2正方形）
function drawDot2(ctx, x, y, color){
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 2, 2);
}
// 20pxドット（円形、ピクセル単位）
function drawDot20(ctx, x, y, color){
  ctx.fillStyle = color;
  const r = 10;
  // 整数ピクセルで円を埋める
  for(let dy = -r; dy < r; dy++){
    for(let dx = -r; dx < r; dx++){
      // 中心からの距離。dx+0.5, dy+0.5 でピクセル中心
      const ddx = dx + 0.5, ddy = dy + 0.5;
      if(ddx*ddx + ddy*ddy <= r*r){
        ctx.fillRect(x + dx, y + dy, 1, 1);
      }
    }
  }
}

function drawDot(ctx, x, y, size, color){
  if(size === 1) drawDot1(ctx, x, y, color);
  else if(size === 2) drawDot2(ctx, x, y, color);
  else drawDot20(ctx, x, y, color);
}

// ブレゼンハム直線で2点間を補間
function drawLine(ctx, x0, y0, x1, y1, size, color){
  const dx = Math.abs(x1 - x0);
  const dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1;
  const sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  let x = x0, y = y0;
  while(true){
    drawDot(ctx, x, y, size, color);
    if(x === x1 && y === y1) break;
    const e2 = 2 * err;
    if(e2 > -dy){ err -= dy; x += sx; }
    if(e2 <  dx){ err += dx; y += sy; }
  }
}

// ============================================================
// ERASER (消しゴム = 透明クリア)
// ============================================================
function eraseDot(ctx, x, y, size){
  if(size === 1){
    ctx.clearRect(x, y, 1, 1);
  } else if(size === 2){
    ctx.clearRect(x, y, 2, 2);
  } else {
    const r = 10;
    for(let dy = -r; dy < r; dy++){
      for(let dx = -r; dx < r; dx++){
        const ddx = dx + 0.5, ddy = dy + 0.5;
        if(ddx*ddx + ddy*ddy <= r*r){
          ctx.clearRect(x + dx, y + dy, 1, 1);
        }
      }
    }
  }
}
function eraseLine(ctx, x0, y0, x1, y1, size){
  const dx = Math.abs(x1 - x0);
  const dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1;
  const sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  let x = x0, y = y0;
  while(true){
    eraseDot(ctx, x, y, size);
    if(x === x1 && y === y1) break;
    const e2 = 2 * err;
    if(e2 > -dy){ err -= dy; x += sx; }
    if(e2 <  dx){ err += dx; y += sy; }
  }
}

// ============================================================
// FLOOD FILL
// 描画レイヤーに対するスキャンラインフィル
// targetColorと一致するピクセルをfillColorに置換
// ============================================================
function floodFill(startX, startY, fillHex){
  if(startX < 0 || startY < 0 || startX >= CFG.WORK_W || startY >= CFG.WORK_H) return;
  const img = drawCtx.getImageData(0, 0, CFG.WORK_W, CFG.WORK_H);
  const data = img.data;
  const W = CFG.WORK_W, H = CFG.WORK_H;
  const idx = (x,y) => (y * W + x) * 4;
  const startI = idx(startX, startY);
  const tR = data[startI], tG = data[startI+1], tB = data[startI+2], tA = data[startI+3];
  // 塗る色
  const fc = hexToRgb(fillHex);
  // 既に同色なら何もしない
  if(tR === fc.r && tG === fc.g && tB === fc.b && tA === 255) return;
  // スキャンライン
  const stack = [[startX, startY]];
  const matches = (i) =>
    data[i] === tR && data[i+1] === tG && data[i+2] === tB && data[i+3] === tA;
  while(stack.length){
    const [x, y] = stack.pop();
    let lx = x;
    while(lx >= 0 && matches(idx(lx,y))) lx--;
    lx++;
    let spanAbove = false, spanBelow = false;
    while(lx < W && matches(idx(lx,y))){
      const i = idx(lx,y);
      data[i] = fc.r; data[i+1] = fc.g; data[i+2] = fc.b; data[i+3] = 255;
      if(y > 0){
        if(matches(idx(lx, y-1))){
          if(!spanAbove){ stack.push([lx, y-1]); spanAbove = true; }
        } else spanAbove = false;
      }
      if(y < H-1){
        if(matches(idx(lx, y+1))){
          if(!spanBelow){ stack.push([lx, y+1]); spanBelow = true; }
        } else spanBelow = false;
      }
      lx++;
    }
  }
  drawCtx.putImageData(img, 0, 0);
}

function hexToRgb(hex){
  const h = hex.replace('#','');
  return {
    r: parseInt(h.substr(0,2), 16),
    g: parseInt(h.substr(2,2), 16),
    b: parseInt(h.substr(4,2), 16),
  };
}

// ============================================================
// HISTORY (Undo/Redo) — カレントフレーム単位
// ImageDataのスナップショット方式
// ============================================================
function snapshot(){
  return drawCtx.getImageData(0, 0, CFG.WORK_W, CFG.WORK_H);
}
function restoreSnap(snap){
  drawCtx.putImageData(snap, 0, 0);
}
// カレントセル取得（フレーム or 空）
function curFrame(){ return state.frames[state.currentFrame]; }
// 「描画フレーム」のみが必要な箇所で使う
function curDrawFrame(){
  const f = curFrame();
  return (f && f.kind === 'draw') ? f : null;
}

function pushHistory(){
  const f = curDrawFrame();
  if(!f) return;
  if(f.histIdx < f.history.length - 1){
    f.history = f.history.slice(0, f.histIdx + 1);
  }
  f.history.push(snapshot());
  if(f.history.length > CFG.HISTORY_MAX){
    f.history.shift();
  }
  f.histIdx = f.history.length - 1;
  f.strokeCount++;
  syncFrameFromCanvas(f);
  updateStats();
  markFrameDirty(f);
}
function undo(){
  const f = curDrawFrame(); if(!f) return;
  if(f.histIdx <= 0) return;
  f.histIdx--;
  restoreSnap(f.history[f.histIdx]);
  syncFrameFromCanvas(f);
  updateStats();
  markFrameDirty(f);
}
function redo(){
  const f = curDrawFrame(); if(!f) return;
  if(f.histIdx >= f.history.length - 1) return;
  f.histIdx++;
  restoreSnap(f.history[f.histIdx]);
  syncFrameFromCanvas(f);
  updateStats();
  markFrameDirty(f);
}
function updateStats(){
  const f = curDrawFrame();
  if(!f){
    document.getElementById('hist-count').textContent = '0';
    document.getElementById('stroke-count').textContent = '0';
    return;
  }
  document.getElementById('hist-count').textContent = f.histIdx + 1;
  document.getElementById('stroke-count').textContent = f.strokeCount;
}

// ============================================================
// FRAME MANAGEMENT
// ============================================================

// 新規描画フレーム
function createBlankFrame(){
  const id = newFrameId();
  const drawData = new Uint8ClampedArray(CFG.WORK_W * CFG.WORK_H * 4);
  const thumbCanvas = document.createElement('canvas');
  thumbCanvas.width = CFG.THUMB_W;
  thumbCanvas.height = CFG.THUMB_H;
  return {
    id,
    kind: 'draw',
    drawData, thumbCanvas,
    duration: 2,
    history: [],
    histIdx: -1,
    strokeCount: 0,
    dirty: true,
  };
}

// 新規空ブロック
function createEmptyBlock(duration = 1){
  return {
    id: newFrameId(),
    kind: 'empty',
    duration,
    dirty: true,
  };
}

// drawCanvasの内容をフレームに同期（drawフレームのみ）
function syncFrameFromCanvas(frame){
  if(!frame || frame.kind !== 'draw') return;
  const img = drawCtx.getImageData(0, 0, CFG.WORK_W, CFG.WORK_H);
  frame.drawData = new Uint8ClampedArray(img.data);
  const tc = frame.thumbCanvas.getContext('2d');
  tc.imageSmoothingEnabled = false;
  tc.fillStyle = '#fff';
  tc.fillRect(0, 0, CFG.THUMB_W, CFG.THUMB_H);
  tc.drawImage(drawCanvas, 0, 0, CFG.THUMB_W, CFG.THUMB_H);
}

// フレーム→キャンバス。空ブロックの場合は白紙に
function loadFrameToCanvas(frame){
  if(!frame) return;
  if(frame.kind === 'empty'){
    drawCtx.clearRect(0, 0, CFG.WORK_W, CFG.WORK_H);
    return;
  }
  const img = new ImageData(
    new Uint8ClampedArray(frame.drawData),
    CFG.WORK_W, CFG.WORK_H
  );
  drawCtx.putImageData(img, 0, 0);
  if(frame.history.length === 0){
    frame.history.push(snapshot());
    frame.histIdx = 0;
  }
}

// 空ブロックを描画フレームに昇格させる
// 描画開始時に呼ばれる
function promoteEmptyToFrame(idx){
  const e = state.frames[idx];
  if(!e || e.kind !== 'empty') return null;
  const newF = createBlankFrame();
  newF.duration = e.duration;
  state.frames[idx] = newF;
  state.pendingSaveFrames.delete(e.id);
  state.pendingSaveFrames.add(newF.id);
  // IndexedDBから旧emptyを削除（保存されてた場合）
  if(db){
    try {
      const tx = db.transaction(CFG.STORE_FRAMES, 'readwrite');
      tx.objectStore(CFG.STORE_FRAMES).delete(e.id);
    } catch(err){}
  }
  return newF;
}

// フレーム切替
// 描画中でも安全に切り替え可能
function switchToFrame(idx){
  if(idx < 0 || idx >= state.frames.length) return;
  if(idx === state.currentFrame && state.frames[idx]){
    // 念のため再描画は行う
  }
  // 描画中ならまずストロークを確定
  if(drawing){
    endStroke();
  }
  // カレントフレームの最新状態を保存
  const cur = curFrame();
  if(cur) syncFrameFromCanvas(cur);

  state.currentFrame = idx;
  const f = state.frames[idx];
  loadFrameToCanvas(f);
  updateStripUI();
  updateOnion();
  updateStats();
  updateFramePos();
  updateDurInfo();
  updateTimeTrack();
}

// フレーム追加（カレントの直後）
function addFrame(copyFromCurrent = false){
  const newF = createBlankFrame();
  const insertAt = state.currentFrame + 1;
  if(copyFromCurrent && curFrame()){
    // 現在のフレームの内容をコピー
    const src = curFrame();
    syncFrameFromCanvas(src); // 念のため最新を吸い上げ
    newF.drawData = new Uint8ClampedArray(src.drawData);
    // サムネイルも複製
    const tc = newF.thumbCanvas.getContext('2d');
    tc.drawImage(src.thumbCanvas, 0, 0);
    newF.duration = src.duration;
  }
  state.frames.splice(insertAt, 0, newF);
  newF.dirty = true;
  state.pendingSaveFrames.add(newF.id);
  // ワークエリア更新（新規追加で範囲が伸びた場合）
  if(state.workEnd === totalTicks() - newF.duration){
    state.workEnd = totalTicks();
  }
  ensureWorkAreaValid();
  buildStrip();
  switchToFrame(insertAt);
  scrollFrameIntoView(insertAt);
  scheduleSave();
}

// 現在フレーム削除
async function deleteCurrentFrame(){
  if(state.frames.length <= 1){
    await modalAlert('最低1フレーム必要です。');
    return;
  }
  const ok = await modalConfirm(`フレーム ${state.currentFrame + 1} を削除しますか？`);
  if(!ok) return;
  // 描画中なら確定（履歴push）。ただしsyncはこの後フレームが消えるので不要
  if(drawing) endStroke();
  const removed = state.frames.splice(state.currentFrame, 1)[0];
  // IndexedDBから削除
  if(db){
    try {
      const tx = db.transaction(CFG.STORE_FRAMES, 'readwrite');
      tx.objectStore(CFG.STORE_FRAMES).delete(removed.id);
    } catch(e){ console.warn(e); }
  }
  // カレント位置調整（範囲超えていたら最後のフレームへ）
  if(state.currentFrame >= state.frames.length){
    state.currentFrame = state.frames.length - 1;
  }
  // 直接フレームをロード（switchToFrameを使うと削除前の内容がこのフレームに上書きされるバグになる）
  ensureWorkAreaValid();
  buildStrip();
  loadFrameToCanvas(curFrame());
  updateStripUI();
  updateOnion();
  updateStats();
  updateFramePos();
  updateDurInfo();
  updateTimeTrack();
  markMetaDirty();
}

// セル幅計算
function cellWidthFor(duration){
  // 1〜3コマは固定幅（仕切り線で表現）
  // 4コマ以上はセル幅を伸ばす
  if(duration <= 3) return state.cellBaseW;
  return state.cellBaseW + (duration - 3) * state.cellStretchPerTick;
}

// タイムライン総コマ数
function totalTicks(){
  return state.frames.reduce((s, f) => s + f.duration, 0);
}
// 最大コマ数（=最大15秒×fps）
function maxTicks(){
  return CFG.MAX_DURATION_SEC * state.fps;
}
// あるidxのフレームの開始ティック
function frameStartTick(idx){
  let t = 0;
  for(let i = 0; i < idx && i < state.frames.length; i++) t += state.frames[i].duration;
  return t;
}
// あるticksに対応する frame index と そのフレーム内オフセットtick
function tickToFrameIdx(tick){
  let acc = 0;
  for(let i = 0; i < state.frames.length; i++){
    if(tick < acc + state.frames[i].duration) return { idx: i, offset: tick - acc };
    acc += state.frames[i].duration;
  }
  return { idx: state.frames.length - 1, offset: 0 };
}
// タイムラインの総ピクセル幅
function timelineTotalPx(){
  let w = 0;
  for(const f of state.frames) w += cellWidthFor(f.duration) + 3; // gap=3
  return w;
}
// あるtickに対応するピクセルx位置
function tickToPx(tick){
  let acc = 0; let pxAcc = 0;
  for(const f of state.frames){
    if(tick <= acc + f.duration){
      const inCell = (tick - acc) / f.duration;
      return pxAcc + cellWidthFor(f.duration) * inCell;
    }
    acc += f.duration;
    pxAcc += cellWidthFor(f.duration) + 3;
  }
  return pxAcc;
}
// あるピクセルxに対応するtick
function pxToTick(px){
  let pxAcc = 0; let tickAcc = 0;
  for(const f of state.frames){
    const w = cellWidthFor(f.duration);
    if(px < pxAcc + w){
      const inCell = Math.max(0, (px - pxAcc) / w);
      return tickAcc + Math.round(inCell * f.duration);
    }
    pxAcc += w + 3;
    tickAcc += f.duration;
  }
  return tickAcc;
}

// ストリップDOM構築
function buildStrip(){
  const strip = document.getElementById('frame-strip');
  strip.innerHTML = '';
  state.frames.forEach((f, i) => {
    const isEmpty = f.kind === 'empty';
    const cell = document.createElement('div');
    cell.className = isEmpty ? 'fc-empty' : 'fc';
    if(i === state.currentFrame) cell.classList.add('active');
    cell.dataset.idx = i;
    cell.style.width = cellWidthFor(f.duration) + 'px';

    if(!isEmpty){
      const thumb = document.createElement('div');
      thumb.className = 'fc-thumb';
      thumb.appendChild(f.thumbCanvas);
      cell.appendChild(thumb);

      // 内側仕切り線（duration 2,3用）
      if(f.duration >= 2 && f.duration <= 3){
        const divs = document.createElement('div');
        divs.className = 'fc-divs';
        for(let k = 0; k < f.duration; k++){
          divs.appendChild(document.createElement('span'));
        }
        cell.appendChild(divs);
      }
      // 目盛り（duration 4以上用）
      if(f.duration >= 4){
        const ruler = document.createElement('div');
        ruler.className = 'fc-ruler';
        for(let k = 0; k < f.duration; k++){
          ruler.appendChild(document.createElement('span'));
        }
        cell.appendChild(ruler);
      }
    }

    const meta = document.createElement('div');
    meta.className = 'fc-meta';
    const label = isEmpty ? '空' : String(i+1).padStart(3,'0');
    meta.innerHTML =
      `<span class="fc-num">${label}</span>` +
      `<span class="fc-dur" title="コマ打ち（クリックで変更）">×${f.duration}</span>`;
    cell.appendChild(meta);

    // 右端スクラブハンドル（空でも duration 変更可能）
    const handle = document.createElement('div');
    handle.className = 'fc-handle';
    handle.title = 'ドラッグでコマ打ち変更';
    cell.appendChild(handle);
    setupScrubHandle(handle, cell, f, i);

    // セル本体: タップで切替（or 空→描画フレーム昇格）
    setupCellInteraction(cell, f, i);

    // duration変更（クリックでサイクル: 1, 2, 3）
    meta.querySelector('.fc-dur').addEventListener('click', e => {
      e.stopPropagation();
      const cycle = [1, 2, 3];
      const cur = cycle.indexOf(f.duration);
      if(cur === -1){
        f.duration = 1;
      } else {
        f.duration = cycle[(cur + 1) % cycle.length];
      }
      // 全体尺の上限チェック
      enforceMaxDuration();
      markFrameDirty(f);
      buildStrip();
      updateDurInfo();
      updateTimeTrack();
    });

    strip.appendChild(cell);
  });

  // タイムライン末尾の空タッチ領域
  const tail = document.createElement('div');
  tail.className = 'fc-empty-tail';
  tail.innerHTML = '<span class="lbl">+ TAP</span>';
  tail.style.flexGrow = '1';
  tail.style.minWidth = '200px';
  setupEmptyTail(tail);
  strip.appendChild(tail);

  updateScrollThumb();
  updateTimeTrack();
}

// 全体尺が上限超えてないか確認、超えてたら最後のフレームを縮める
function enforceMaxDuration(){
  const max = maxTicks();
  let total = totalTicks();
  if(total <= max) return;
  // 最後のフレームから順に削っていく
  for(let i = state.frames.length - 1; i >= 0 && total > max; i--){
    const reduce = Math.min(state.frames[i].duration - 1, total - max);
    state.frames[i].duration -= reduce;
    total -= reduce;
    markFrameDirty(state.frames[i]);
    if(state.frames[i].duration < 1){
      state.frames[i].duration = 1;
    }
  }
}

// セル本体: タップで切替、長押し＋移動でドラッグ
function setupCellInteraction(cell, frame, idx){
  let dragStart = null;
  let dragging = false;
  let isTouch = false;
  cell.addEventListener('pointerdown', e => {
    if(e.target.classList.contains('fc-dur')) return;
    if(e.target.classList.contains('fc-handle')) return;
    isTouch = (e.pointerType === 'touch');
    // 指の場合: ネイティブスクロールに任せる（preventDefaultしない、capture もしない）
    if(isTouch){
      // タップ判定だけ（短時間+小移動で switchToFrame）
      dragStart = { x: e.clientX, y: e.clientY, t: performance.now(), tap: true };
      dragging = false;
      return;
    }
    // ペン/マウス: 即フレーム切替 + ドラッグ並び替え準備
    e.preventDefault();
    cell.setPointerCapture(e.pointerId);
    dragStart = { x: e.clientX, y: e.clientY, t: performance.now(), tap: false };
    dragging = false;
    handleCellTap(idx);
  });
  cell.addEventListener('pointermove', e => {
    if(!dragStart) return;
    const dx = Math.abs(e.clientX - dragStart.x);
    if(isTouch){
      // 指: 動いたらタップキャンセル
      if(dx > 6) dragStart.tap = false;
      return;
    }
    // ペン/マウス: ドラッグ判定
    if(!dragging && dx > 8){
      dragging = true;
      cell.classList.add('dragging');
    }
    if(dragging){
      const target = findDropTarget(e.clientX);
      document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty').forEach(el => {
        el.classList.remove('drop-target-left', 'drop-target-right');
      });
      if(target && target.cell !== cell){
        target.cell.classList.add(target.before ? 'drop-target-left' : 'drop-target-right');
      }
    }
  });
  cell.addEventListener('pointerup', e => {
    if(!dragStart) return;
    if(isTouch){
      // 指: タップなら切替
      if(dragStart.tap){
        const elapsed = performance.now() - dragStart.t;
        if(elapsed < 400){
          handleCellTap(idx);
        }
      }
      dragStart = null;
      return;
    }
    // ペン/マウス: ドラッグなら並び替え
    if(dragging){
      const target = findDropTarget(e.clientX);
      document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty').forEach(el => {
        el.classList.remove('drop-target-left', 'drop-target-right', 'dragging');
      });
      if(target && target.cell !== cell){
        const fromIdx = idx;
        let toIdx = parseInt(target.cell.dataset.idx);
        if(!target.before) toIdx++;
        if(toIdx > fromIdx) toIdx--;
        if(toIdx !== fromIdx){
          const [moved] = state.frames.splice(fromIdx, 1);
          state.frames.splice(toIdx, 0, moved);
          state.currentFrame = toIdx;
          buildStrip();
          updateStripUI();
          updateFramePos();
          updateDurInfo();
          markMetaDirty();
        }
      }
    }
    dragStart = null;
    dragging = false;
  });
  cell.addEventListener('pointercancel', () => {
    dragStart = null;
    dragging = false;
    cell.classList.remove('dragging');
    document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty').forEach(el => {
      el.classList.remove('drop-target-left', 'drop-target-right');
    });
  });
}

// セルがタップされたときの処理（描画フレーム=切替、空=昇格）
function handleCellTap(idx){
  const f = state.frames[idx];
  if(!f) return;
  if(f.kind === 'empty'){
    // 空ブロックを描画フレームに昇格
    promoteEmptyToFrame(idx);
    buildStrip();
    switchToFrame(idx);
    markMetaDirty();
    scheduleSave();
  } else {
    switchToFrame(idx);
  }
}

// ドロップ位置検索: pointerのclientXからどのセル境界かを判定
function findDropTarget(clientX){
  const cells = document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty');
  for(const c of cells){
    const r = c.getBoundingClientRect();
    if(clientX >= r.left && clientX <= r.right){
      return { cell: c, before: clientX < r.left + r.width / 2 };
    }
  }
  return null;
}

// スクラブハンドル: ドラッグでduration増減
function setupScrubHandle(handle, cell, frame, idx){
  let scrubStart = null;
  handle.addEventListener('pointerdown', e => {
    e.stopPropagation();
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    handle.classList.add('active');
    scrubStart = {
      x: e.clientX,
      origDur: frame.duration,
      origCellW: cellWidthFor(frame.duration),
    };
  });
  handle.addEventListener('pointermove', e => {
    if(!scrubStart) return;
    const dx = e.clientX - scrubStart.x;
    let newDur = scrubStart.origDur + Math.round(dx / state.cellStretchPerTick);
    newDur = Math.max(1, Math.min(120, newDur));
    // 上限: 全体15秒
    const otherTicks = totalTicks() - frame.duration;
    const allowedMax = Math.min(120, maxTicks() - otherTicks);
    if(newDur > allowedMax) newDur = allowedMax;
    if(newDur !== frame.duration){
      frame.duration = newDur;
      cell.style.width = cellWidthFor(newDur) + 'px';
      const durEl = cell.querySelector('.fc-dur');
      if(durEl) durEl.textContent = '×' + newDur;
    }
  });
  function endScrub(e){
    if(!scrubStart) return;
    scrubStart = null;
    handle.classList.remove('active');
    buildStrip();
    markFrameDirty(frame);
    updateDurInfo();
    updateTimeTrack();
  }
  handle.addEventListener('pointerup', endScrub);
  handle.addEventListener('pointercancel', endScrub);
}

// 末尾の空タッチ領域: 任意位置タッチで「前フレームを伸ばす + 新フレーム」
function setupEmptyTail(tail){
  tail.addEventListener('pointerdown', e => {
    e.preventDefault();
    const tailRect = tail.getBoundingClientRect();
    const xInTail = e.clientX - tailRect.left;
    const existingTicks = totalTicks();
    // tail 内の 1コマあたりの想定幅
    const ticksInTail = Math.max(1, Math.round(xInTail / state.cellStretchPerTick));
    let targetTicks = existingTicks + ticksInTail;
    // 上限チェック
    const max = maxTicks();
    if(targetTicks > max) targetTicks = max;
    if(targetTicks <= existingTicks){
      // 余裕がない場合: 上限到達
      return;
    }
    // 前のフレーム/ブロックの duration を伸ばす
    const last = state.frames[state.frames.length - 1];
    if(last){
      const needed = targetTicks - existingTicks;
      // needed-1 を前のフレームに足し、1コマを新フレームに
      last.duration += Math.max(0, needed - 1);
      markFrameDirty(last);
    }
    // 新フレーム1コマ分追加（描画開始位置）
    const newF = createBlankFrame();
    newF.duration = 1;
    state.frames.push(newF);
    newF.dirty = true;
    state.pendingSaveFrames.add(newF.id);
    // ワークエリアを末尾まで広げる
    if(state.workEnd >= existingTicks){
      state.workEnd = totalTicks();
    }
    ensureWorkAreaValid();
    buildStrip();
    switchToFrame(state.frames.length - 1);
    scrollFrameIntoView(state.frames.length - 1);
    scheduleSave();
  });
}

function updateStripUI(){
  document.querySelectorAll('#frame-strip .fc, #frame-strip .fc-empty').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    el.classList.toggle('active', idx === state.currentFrame);
  });
}

function updateFramePos(){
  document.getElementById('frame-pos').textContent =
    String(state.currentFrame+1).padStart(3,'0') + ' / ' + String(state.frames.length).padStart(3,'0');
}

// 全体時間と現在時間表示
function fmtTimeMs(ms){
  const sec = Math.floor(ms/1000);
  const mm = String(Math.floor(sec/60)).padStart(2,'0');
  const ss = String(sec%60).padStart(2,'0');
  const cs = String(Math.floor((ms%1000)/10)).padStart(2,'0');
  return `${mm}:${ss}.${cs}`;
}
function ticksToMs(ticks){
  return Math.round(ticks / state.fps * 1000);
}
function updateDurInfo(){
  const total = totalTicks();
  const curT = state.frames.slice(0, state.currentFrame).reduce((s, f) => s + f.duration, 0);
  document.getElementById('dur-info').textContent =
    `${fmtTimeMs(ticksToMs(curT))} / ${fmtTimeMs(ticksToMs(total))}`;
  document.getElementById('work-info').textContent =
    `${fmtTimeMs(ticksToMs(state.workStart))} - ${fmtTimeMs(ticksToMs(state.workEnd))}`;
}

function scrollFrameIntoView(idx){
  const cell = document.querySelector(`#frame-strip [data-idx="${idx}"]`);
  if(cell && typeof cell.scrollIntoView === 'function') {
    cell.scrollIntoView({inline:'center', block:'nearest', behavior:'smooth'});
  }
}

// ============================================================
// TIME TRACK (時間メモリ + ワークエリア)
// ============================================================
function updateTimeTrack(){
  const inner = document.getElementById('time-track-inner');
  if(!inner) return;
  const totalPx = timelineTotalPx();
  inner.style.width = totalPx + 'px';
  // 既存の目盛を削除して再構築
  inner.querySelectorAll('.time-tick').forEach(el => el.remove());

  const total = totalTicks();
  const fps = state.fps;
  // 1秒ごとに「秒」目盛、6コマ（4分の1秒）ごとに小目盛
  const minorEvery = Math.max(1, Math.floor(fps / 4));
  for(let t = 0; t <= total; t += minorEvery){
    const x = tickToPx(t);
    const tick = document.createElement('div');
    tick.className = 'time-tick';
    if(t % fps === 0){
      // 秒
      tick.classList.add('major');
      const sec = Math.floor(t / fps);
      tick.textContent = sec + 's';
    } else if(t % (fps / 2) === 0){
      // 0.5秒
      tick.classList.add('tick-sec');
    }
    tick.style.left = x + 'px';
    inner.appendChild(tick);
  }
  // ワークエリア配置
  const workArea = document.getElementById('work-area');
  if(workArea){
    const sx = tickToPx(state.workStart);
    const ex = tickToPx(state.workEnd);
    workArea.style.left = sx + 'px';
    workArea.style.width = Math.max(0, ex - sx) + 'px';
  }
  // タイムラインカーソル
  const cursor = document.getElementById('timeline-cursor');
  if(cursor){
    const curT = state.frames.slice(0, state.currentFrame).reduce((s, f) => s + f.duration, 0);
    cursor.style.left = tickToPx(curT) + 'px';
  }
  syncTimeTrackScroll();
}

// ストリップのscrollLeftと time-track-inner を同期
function syncTimeTrackScroll(){
  const strip = document.getElementById('frame-strip');
  const inner = document.getElementById('time-track-inner');
  if(!strip || !inner) return;
  inner.style.transform = `translateX(${-strip.scrollLeft}px)`;
}

// ============================================================
// ONION SKIN
// 前後フレームを半透明で表示
// ============================================================
function updateOnion(){
  if(!state.onionOn){
    onionPrevCtx.clearRect(0,0,CFG.WORK_W,CFG.WORK_H);
    onionNextCtx.clearRect(0,0,CFG.WORK_W,CFG.WORK_H);
    return;
  }
  // 前: drawフレームのみを探す（空ブロックは飛ばす）
  onionPrevCtx.clearRect(0,0,CFG.WORK_W,CFG.WORK_H);
  let prevDraw = null;
  for(let i = state.currentFrame - 1; i >= 0; i--){
    if(state.frames[i].kind === 'draw'){ prevDraw = state.frames[i]; break; }
  }
  if(prevDraw){
    const img = new ImageData(
      tintImageData(prevDraw.drawData, 220, 60, 60),
      CFG.WORK_W, CFG.WORK_H
    );
    onionPrevCtx.putImageData(img, 0, 0);
  }
  // 後: drawフレームのみを探す
  onionNextCtx.clearRect(0,0,CFG.WORK_W,CFG.WORK_H);
  let nextDraw = null;
  for(let i = state.currentFrame + 1; i < state.frames.length; i++){
    if(state.frames[i].kind === 'draw'){ nextDraw = state.frames[i]; break; }
  }
  if(nextDraw){
    const img = new ImageData(
      tintImageData(nextDraw.drawData, 60, 120, 220),
      CFG.WORK_W, CFG.WORK_H
    );
    onionNextCtx.putImageData(img, 0, 0);
  }
}

// drawDataのうち不透明ピクセルを指定色に置き換えた新しいImageData配列を返す
function tintImageData(srcData, r, g, b){
  const out = new Uint8ClampedArray(srcData.length);
  for(let i = 0; i < srcData.length; i += 4){
    if(srcData[i+3] > 0){
      out[i] = r; out[i+1] = g; out[i+2] = b; out[i+3] = srcData[i+3];
    }
  }
  return out;
}

// ============================================================
// PLAYBACK
// ============================================================
let playRAF = 0;
function play(){
  if(state.frames.length === 0) return;
  // ワークエリアが妥当か確認
  ensureWorkAreaValid();
  if(state.workEnd <= state.workStart) return;
  state.playing = true;
  state.playStartTime = performance.now();
  state.playStartFrame = state.currentFrame;
  document.getElementById('btn-play').classList.add('on');
  // 再生中はオニオンスキン消す
  const onionWas = state.onionOn;
  state.onionOn = false;
  updateOnion();
  state._onionWasOn = onionWas;
  const tickMs = 1000 / state.fps;
  // ワークエリア範囲のtick
  const startTick = state.workStart;
  const endTick = state.workEnd; // exclusive
  const rangeTicks = endTick - startTick;

  // 範囲内のtickから idx と「実描画フレームidx」を返す
  // 空ブロックの場合は直前のdrawフレームを返す
  function frameToShowAt(tick){
    let acc = 0;
    let lastDrawIdx = -1;
    for(let i = 0; i < state.frames.length; i++){
      const f = state.frames[i];
      if(f.kind === 'draw') lastDrawIdx = i;
      acc += f.duration;
      if(tick < acc){
        return { idx: i, showIdx: f.kind === 'draw' ? i : lastDrawIdx };
      }
    }
    return { idx: state.frames.length - 1, showIdx: lastDrawIdx };
  }

  let lastShown = -1;
  function loop(now){
    if(!state.playing) return;
    const elapsed = now - state.playStartTime;
    let t = elapsed;
    if(state.loop){
      t = t % (rangeTicks * tickMs);
    } else if(t >= rangeTicks * tickMs){
      stop();
      return;
    }
    const tick = startTick + Math.floor(t / tickMs);
    const { idx, showIdx } = frameToShowAt(tick);
    if(idx !== lastShown){
      lastShown = idx;
      state.currentFrame = idx;
      // 表示フレームのキャンバス更新
      if(showIdx >= 0){
        const f = state.frames[showIdx];
        if(f && f.kind === 'draw'){
          const img = new ImageData(
            new Uint8ClampedArray(f.drawData),
            CFG.WORK_W, CFG.WORK_H
          );
          drawCtx.putImageData(img, 0, 0);
        }
      } else {
        // 表示すべきdrawがない: 白紙
        drawCtx.clearRect(0, 0, CFG.WORK_W, CFG.WORK_H);
      }
      updateStripUI();
      updateFramePos();
      updateTimeTrack();
    }
    playRAF = requestAnimationFrame(loop);
  }
  playRAF = requestAnimationFrame(loop);
}
function stop(){
  state.playing = false;
  cancelAnimationFrame(playRAF);
  document.getElementById('btn-play').classList.remove('on');
  // オニオン復帰
  if(state._onionWasOn) state.onionOn = true;
  // 現在表示しているフレームに正式に切り替え（履歴整合）
  switchToFrame(state.currentFrame);
}

// ============================================================
// POINTER (描画 + ピンチズーム + パン + タップジェスチャー)
//
// ペン (Apple Pencil) / マウス: 常に描画
// 指1本:
//   - eraseツール: 消す（描画扱い）
//   - fillツール: 塗る
//   - penツール: パン（キャンバス移動）
// 指2本: ピンチズーム + パン
// 指Nタップ (短時間+小移動でリリース): 2=Undo, 3=Redo
// ============================================================

const pointers = new Map(); // pointerId -> {x, y, type, startX, startY, startT}
let drawing = false;
let drawingPointerId = null;
let lastX = 0, lastY = 0;

let strokeBuffer = [];
const SMOOTH_WINDOW = 4;

let pinching = false;
let pinchStartDist = 0;
let pinchStartZoom = 1;
let pinchStartCenter = {x:0, y:0};
let pinchStartPan = {x:0, y:0};

// 1本指パン用
let panning = false;
let panPointerId = null;
let panStartClient = {x:0, y:0};
let panStartPan = {x:0, y:0};

// タップジェスチャー用
const TAP_TIME_MS = 300;
const TAP_MOVE_PX = 12;
// 直近のタッチダウンの数とタイミング（同時に多本指タップを検出するため）
let multiTouchActiveCount = 0;     // 現在指がN本以上下りた最大値
let touchSessionStart = 0;          // 最初の指が下りた時刻
let touchSessionStartIds = [];      // 関与した指IDs（最大本数記録用）
let touchSessionMaxFingers = 0;     // セッション中に観測された最大本数

function dist(p1, p2){
  const dx = p1.x - p2.x, dy = p1.y - p2.y;
  return Math.sqrt(dx*dx + dy*dy);
}
function center(p1, p2){
  return { x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2 };
}

function smoothPoint(x, y){
  strokeBuffer.push({x, y});
  if(strokeBuffer.length > SMOOTH_WINDOW) strokeBuffer.shift();
  if(state.smoothing === 0 || strokeBuffer.length < 2) return {x, y};
  let sx = 0, sy = 0;
  for(const p of strokeBuffer){ sx += p.x; sy += p.y; }
  return {
    x: Math.floor(sx / strokeBuffer.length),
    y: Math.floor(sy / strokeBuffer.length),
  };
}

function startStroke(clientX, clientY){
  const {x, y} = toCanvasCoord(clientX, clientY);
  lastX = x; lastY = y;
  strokeBuffer = [{x, y}];
  drawing = true;
  if(state.tool === 'pen'){
    drawDot(drawCtx, x, y, currentToolSize(), INK[state.inkColor]);
  } else if(state.tool === 'erase'){
    eraseDot(drawCtx, x, y, currentToolSize());
  }
}
function continueStroke(clientX, clientY){
  const raw = toCanvasCoord(clientX, clientY);
  const {x, y} = smoothPoint(raw.x, raw.y);
  if(state.tool === 'pen'){
    drawLine(drawCtx, lastX, lastY, x, y, currentToolSize(), INK[state.inkColor]);
  } else if(state.tool === 'erase'){
    eraseLine(drawCtx, lastX, lastY, x, y, currentToolSize());
  }
  lastX = x; lastY = y;
}
function endStroke(){
  if(!drawing) return;
  drawing = false;
  drawingPointerId = null;
  strokeBuffer = [];
  pushHistory();
}

function startPinch(){
  if(drawing) endStroke();
  if(panning) endPan();
  const pts = Array.from(pointers.values());
  if(pts.length < 2) return;
  pinching = true;
  pinchStartDist = dist(pts[0], pts[1]);
  pinchStartCenter = center(pts[0], pts[1]);
  pinchStartZoom = state.zoom;
  pinchStartPan = { x: state.panX, y: state.panY };
}
function updatePinch(){
  const pts = Array.from(pointers.values());
  if(pts.length < 2) return;
  const newDist = dist(pts[0], pts[1]);
  const newCenter = center(pts[0], pts[1]);
  if(pinchStartDist <= 0) return;
  const scale = newDist / pinchStartDist;
  const newZoom = Math.max(0.05, Math.min(8, pinchStartZoom * scale));
  const dx = newCenter.x - pinchStartCenter.x;
  const dy = newCenter.y - pinchStartCenter.y;
  state.zoom = newZoom;
  state.fitMode = false;
  state.panX = pinchStartPan.x + dx;
  state.panY = pinchStartPan.y + dy;
  applyZoom();
}
function endPinch(){
  pinching = false;
}

function startPan(pointerId, clientX, clientY){
  panning = true;
  panPointerId = pointerId;
  panStartClient = { x: clientX, y: clientY };
  panStartPan = { x: state.panX, y: state.panY };
}
function updatePan(clientX, clientY){
  if(!panning) return;
  state.panX = panStartPan.x + (clientX - panStartClient.x);
  state.panY = panStartPan.y + (clientY - panStartClient.y);
  state.fitMode = false;
  applyZoom();
}
function endPan(){
  panning = false;
  panPointerId = null;
}

// 指がツールの実行対象になるかを判定
function isFingerActionable(){
  // 消しゴム・塗りつぶしツール選択中なら指でも実行可
  return state.tool === 'erase' || state.tool === 'fill';
}

drawCanvas.addEventListener('pointerdown', e => {
  if(e.pointerType === 'mouse' && e.button !== 0) return;
  e.preventDefault();
  drawCanvas.setPointerCapture(e.pointerId);
  const now = performance.now();
  pointers.set(e.pointerId, {
    x: e.clientX, y: e.clientY, type: e.pointerType,
    startX: e.clientX, startY: e.clientY, startT: now,
  });

  // タッチセッション管理（タップ検出用）
  if(e.pointerType === 'touch'){
    // タッチ本数のセッション開始/拡張
    if(pointers.size === 1 && (countTouches() === 1)){
      touchSessionStart = now;
      touchSessionMaxFingers = 1;
      touchSessionStartIds = [e.pointerId];
    } else {
      const touches = countTouches();
      if(touches > touchSessionMaxFingers) touchSessionMaxFingers = touches;
      touchSessionStartIds.push(e.pointerId);
    }
  }

  // === ジェスチャールーティング ===
  if(e.pointerType === 'pen' || e.pointerType === 'mouse'){
    // ペン/マウスは常に描画
    drawingPointerId = e.pointerId;
    if(state.tool === 'fill'){
      const {x, y} = toCanvasCoord(e.clientX, e.clientY);
      floodFill(x, y, state.fillColor);
      pushHistory();
    } else {
      startStroke(e.clientX, e.clientY);
    }
    return;
  }

  // タッチ
  const touches = countTouches();
  if(touches === 1){
    // 1本目: ツールに応じて挙動分岐
    if(state.tool === 'fill'){
      const {x, y} = toCanvasCoord(e.clientX, e.clientY);
      floodFill(x, y, state.fillColor);
      pushHistory();
      // 塗りつぶしの後はタップでもジェスチャーを動かさない（既に効果が出てるので）
    } else if(state.tool === 'erase'){
      drawingPointerId = e.pointerId;
      startStroke(e.clientX, e.clientY);
    } else {
      // pen ツールでは指=パン候補（タップでなければパンに移行）
      startPan(e.pointerId, e.clientX, e.clientY);
    }
  } else if(touches === 2){
    // 2本指: ピンチに切り替え（描画もパンも止める）
    if(drawing) endStroke();
    if(panning) endPan();
    startPinch();
  } else if(touches >= 3){
    // 3本以上: ピンチ解除（タップ判定だけ残す）
    if(pinching) endPinch();
    if(drawing) endStroke();
    if(panning) endPan();
  }
});

function countTouches(){
  let n = 0;
  for(const p of pointers.values()) if(p.type === 'touch') n++;
  return n;
}

drawCanvas.addEventListener('pointermove', e => {
  const {x, y} = toCanvasCoord(e.clientX, e.clientY);
  document.getElementById('hud-coord').textContent = `${x} · ${y}`;

  if(!pointers.has(e.pointerId)) return;
  e.preventDefault();
  const p = pointers.get(e.pointerId);
  p.x = e.clientX; p.y = e.clientY;

  if(pinching){
    updatePinch();
    return;
  }
  if(panning && e.pointerId === panPointerId){
    updatePan(e.clientX, e.clientY);
    return;
  }
  if(drawing && e.pointerId === drawingPointerId){
    continueStroke(e.clientX, e.clientY);
  }
});

function onPointerEnd(e){
  if(!pointers.has(e.pointerId)) return;
  const p = pointers.get(e.pointerId);
  pointers.delete(e.pointerId);

  // タッチ系はタップ検出のため、セッション最終判定をする
  const wasTouch = p.type === 'touch';
  const remainingTouches = countTouches();

  if(pinching){
    if(remainingTouches < 2){
      endPinch();
    }
    // 続きで残った指を描画/パンに昇格はしない（混乱防止）
  } else if(panning && e.pointerId === panPointerId){
    endPan();
  } else if(drawing && e.pointerId === drawingPointerId){
    endStroke();
  }

  // タップジェスチャー判定: タッチ系で全指が離れたタイミングで判定
  if(wasTouch && remainingTouches === 0){
    const elapsed = performance.now() - touchSessionStart;
    // セッション内最大指数で判定
    const fingers = touchSessionMaxFingers;
    // 移動量: 最初の指の startX/Y と最後の x/y で判定（簡易）
    const moved = Math.hypot(p.x - p.startX, p.y - p.startY);
    if(elapsed < TAP_TIME_MS && moved < TAP_MOVE_PX){
      // タップとして処理
      if(fingers === 2){
        undo();
      } else if(fingers === 3){
        redo();
      }
      // 1本タップは現状割り当てなし（将来カスタマイズ）
    }
    // セッションリセット
    touchSessionMaxFingers = 0;
    touchSessionStartIds = [];
  }
}
drawCanvas.addEventListener('pointerup', onPointerEnd);
drawCanvas.addEventListener('pointercancel', onPointerEnd);

drawCanvas.addEventListener('contextmenu', e => e.preventDefault());

// ============================================================
// BACKGROUND 縦スライダー（カスタムUI）
// 上=明 (100), 下=暗 (50)
// ============================================================
const bgTrack = document.getElementById('tb-bg-track');
const bgThumb = document.getElementById('tb-bg-thumb');
const bgValEl = document.getElementById('tb-bg-val');

function setBgBright(v){
  v = Math.max(50, Math.min(100, v));
  state.bgBright = Math.round(v);
  // サム位置: 値100 → top:0% (上), 値50 → top:100% (下)
  // 値はtrackの高さに沿って % 表示
  const pct = (100 - state.bgBright) / 50; // 0..1
  bgThumb.style.bottom = ((1 - pct) * 100) + '%';
  bgValEl.textContent = state.bgBright;
  // 背景を再描画
  const grey = Math.round(state.bgBright * 2.55);
  bgCtx.fillStyle = `rgb(${grey},${grey},${grey})`;
  bgCtx.fillRect(0, 0, CFG.WORK_W, CFG.WORK_H);
}

function bgTrackHandler(e){
  const r = bgTrack.getBoundingClientRect();
  const y = e.clientY - r.top;
  const ratio = 1 - Math.max(0, Math.min(1, y / r.height)); // 上=1, 下=0
  // 50..100 にマッピング
  setBgBright(50 + ratio * 50);
  markMetaDirty();
}
bgTrack.addEventListener('pointerdown', e => {
  e.preventDefault();
  bgTrack.setPointerCapture(e.pointerId);
  bgTrackHandler(e);
});
bgTrack.addEventListener('pointermove', e => {
  if(bgTrack.hasPointerCapture(e.pointerId)){
    bgTrackHandler(e);
  }
});
// 初期表示
setBgBright(100);

// ピンチズーム & ホイールズーム（カーソル中心）
stage.addEventListener('wheel', e => {
  if(!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.111;
  zoomAt(e.clientX, e.clientY, state.zoom * factor);
}, { passive: false });

// 指定スクリーン座標を中心にズーム
function zoomAt(screenX, screenY, newZoom){
  newZoom = Math.max(0.05, Math.min(8, newZoom));
  const wrapRect = wrap.getBoundingClientRect();
  // wrap内での相対位置
  const localX = screenX - wrapRect.left;
  const localY = screenY - wrapRect.top;
  const ratio = newZoom / state.zoom;
  // パン補正: ズーム後に同じ画面位置がカーソル下にくるよう
  state.panX -= (localX * ratio - localX);
  state.panY -= (localY * ratio - localY);
  state.zoom = newZoom;
  state.fitMode = false;
  applyZoom();
}
