:root{
  --acid:#FF4FA8; --magenta:#B850FF; --ice:#5AE9FF; --gold:#FFD27A;
  --bg:#07030f; --panel:#100722; --fg:#F8EFFF; --dim:#9d8db3;
  --border:rgba(255,210,122,0.14);
  --bank:'Bank Gothic','Barlow Condensed',sans-serif;
  --mono:'IBM Plex Mono','Menlo','Consolas',monospace;
  --jp:-apple-system,'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:
    radial-gradient(ellipse 85% 60% at 88% -12%, rgba(184,80,255,0.22), transparent 60%),
    radial-gradient(ellipse 70% 60% at -8% 110%, rgba(90,233,255,0.10), transparent 65%),
    radial-gradient(ellipse 60% 50% at 50% 110%, rgba(255,79,168,0.10), transparent 60%),
    linear-gradient(180deg,#0c061d 0%,#07030f 100%);
  color:var(--fg);
  font-family:var(--mono);
  -webkit-user-select:none;user-select:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:44px;padding:24px;
  overflow:hidden;position:relative;
}
/* corner ticks */
.corner{position:fixed;width:16px;height:16px;pointer-events:none;z-index:5;}
.corner::before,.corner::after{content:'';position:absolute;background:linear-gradient(90deg,var(--gold),var(--acid));box-shadow:0 0 6px rgba(255,79,168,0.5);}
.corner::before{width:100%;height:1px;}
.corner::after{width:1px;height:100%;}
.corner.tl{top:14px;left:14px;}
.corner.tr{top:14px;right:14px;transform:scaleX(-1);}
.corner.bl{bottom:14px;left:14px;transform:scaleY(-1);}
.corner.br{bottom:14px;right:14px;transform:scale(-1);}
/* ghost type */
.ghost{
  position:fixed;bottom:-0.16em;right:-10px;
  font-family:var(--bank);
  font-size:clamp(120px,24vw,240px);
  line-height:1;letter-spacing:0.02em;
  color:transparent;
  -webkit-text-stroke:1.5px rgba(255,210,122,0.13);
  pointer-events:none;white-space:nowrap;
}
.lockup{text-align:center;display:flex;flex-direction:column;gap:14px;align-items:center;}
.eyebrow{font-size:11px;letter-spacing:0.5em;text-indent:0.5em;color:var(--gold);}
h1{
  font-family:var(--bank);font-weight:400;
  font-size:clamp(34px,6.5vw,58px);
  letter-spacing:0.14em;text-indent:0.14em;line-height:1;
  background:linear-gradient(120deg,#FFE9B0,#FFD27A 26%,#FF4FA8 62%,#B58EFF 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(0 0 26px rgba(255,79,168,0.3));
}
.sub{font-family:var(--jp);font-size:12px;letter-spacing:0.4em;text-indent:0.4em;color:var(--dim);}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;max-width:860px;width:100%;}
@media (max-width:820px){ .grid{grid-template-columns:1fr 1fr;} }
@media (max-width:560px){ .grid{grid-template-columns:1fr;} }
a.card{
  position:relative;display:block;
  padding:28px 24px 24px;
  background:linear-gradient(180deg,rgba(255,79,168,0.05),rgba(184,80,255,0.02)),var(--panel);
  border:1px solid var(--border);
  border-radius:5px;
  color:var(--fg);text-decoration:none;
  overflow:hidden;
  transition:border-color .15s, box-shadow .15s, transform .15s;
}
a.card:hover{
  border-color:rgba(255,79,168,0.5);
  box-shadow:0 0 16px rgba(255,79,168,0.35);
  transform:translateY(-2px);
}
.card .ord{position:absolute;top:11px;right:14px;font-size:10px;letter-spacing:0.3em;color:var(--gold);opacity:0.8;}
.card .name{
  font-family:var(--bank);font-size:24px;letter-spacing:0.2em;
  color:var(--acid);text-shadow:0 0 10px rgba(255,79,168,0.4);
  margin-bottom:10px;
}
.card .desc{font-family:var(--jp);font-size:12px;line-height:1.9;letter-spacing:0.1em;color:var(--dim);}
.card .tags{margin-top:14px;display:flex;gap:6px;flex-wrap:wrap;}
.card .tag{
  font-size:9px;letter-spacing:0.18em;
  padding:2px 8px;border:1px solid var(--border);border-radius:2px;
  color:var(--ice);
}
footer{font-size:10px;color:var(--dim);letter-spacing:0.3em;display:flex;gap:18px;}
@media (prefers-reduced-motion:reduce){ a.card{transition:none;} }
</style>
</head>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="ghost">ANIM</div>

  <div class="lockup">
    <div class="eyebrow">GEN-EX / BROWSER TOOLCHAIN</div>
