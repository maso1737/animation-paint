<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>tDR Animation Suite</title>
<style>
  :root { --acid:#36FF00; --bg:#0a0a0a; --fg:#e8e8e8; --dim:#666; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--fg);
    font-family:'SF Mono','Consolas',monospace; -webkit-user-select:none; user-select:none; }
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:48px; padding:24px; }
  h1 { font-size:14px; letter-spacing:.3em; color:var(--dim); font-weight:400; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; max-width:720px; width:100%; }
  @media (max-width:560px){ .grid{ grid-template-columns:1fr; } }
  a.card { display:block; padding:32px 24px; background:#111; border:1px solid #222;
    color:var(--fg); text-decoration:none; transition:border-color .15s, transform .15s; }
  a.card:hover { border-color:var(--acid); transform:translateY(-2px); }
  .card .name { font-size:24px; letter-spacing:.15em; color:var(--acid); margin-bottom:8px; }
  .card .desc { font-size:12px; color:var(--dim); line-height:1.6; }
  footer { font-size:11px; color:var(--dim); letter-spacing:.2em; }
</style>
</head>
<body>
  <h1>tDR / ANIMATION SUITE</h1>
  <div class="grid">
    <a class="card" href="animator.html">
      <div class="name">ANIMATOR</div>
      <div class="desc">作画 / ペイント<br>ラフ〜仕上げ</div>
    </a>
    <a class="card" href="composer.html">
      <div class="name">COMPOSER</div>
      <div class="desc">音 / PAN / タイミング確認<br>(撮影処理はAE)</div>
    </a>
  </div>
  <footer>v0 · GitHub Pages</footer>
</body>
</html>
